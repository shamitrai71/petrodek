></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">\u2699 Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div><div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">What We Offer</div>\n    <h1>Our Product<em>Range</em></h1>\n    <p class=\"ph-desc\">Specialised rim seals, seal fittings, and lightning protection systems \u2014 engineered for external floating roof petroleum storage tanks.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">\u203a</span><span class=\"cur\">Products</span></div>\n  </div>\n</div>\n<div style=\"max-width:1200px;margin:0 auto;padding:70px 5%\">\n  <div class=\"section-hd\"><span class=\"slbl\">Product Categories</span><h2>Emission Control Solutions</h2><div class=\"bar\"></div></div>\n  <div class=\"related-grid\" style=\"margin-top:2.5rem\">\n    <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\" class=\"rel-card\"><div class=\"rel-card-img\" style=\"font-size:3.5rem\">\u2b21</div><div class=\"rel-card-body\"><div class=\"rel-card-tag\">Primary & Secondary</div><h4>Rim Seals</h4><p>Full range of mechanical shoe, liquid-mounted, vapour-mounted, secondary, and wiper seals for EFR tanks.</p><span class=\"rel-card-link\">View All Rim Seals \u2192</span></div></a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\" class=\"rel-card\"><div class=\"rel-card-img\" style=\"font-size:3.5rem\">\u2699</div><div class=\"rel-card-body\"><div class=\"rel-card-tag\">Tank Roof Fittings</div><h4>Seal Fittings</h4><p>Gauging hatches, bleeder vents, deck drain valves, roof legs, and all tank roof accessories.</p><span class=\"rel-card-link\">View Seal Fittings \u2192</span></div></a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\" class=\"rel-card\"><div class=\"rel-card-img\" style=\"font-size:3.5rem\">\u26a1</div><div class=\"rel-card-body\"><div class=\"rel-card-tag\">Safety Systems</div><h4>Lightning Protection</h4><p>API 545 compliant bonding and grounding systems for floating roof tank electrical safety.</p><span class=\"rel-card-link\">View Lightning Protection \u2192</span></div></a>\n  </div>\n</div>\n<div class=\"cta-box\"><div class=\"cta-box-inner\"><h3>Need Help Selecting the Right Product?</h3><p>Our technical team can identify the correct rim seal and fitting configuration for your specific tank dimensions and stored product.</p><div class=\"cta-btns\"><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Contact Our Engineers \u2192</a></div></div></div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('ligh "rim-seals":{title:"Rim Seals \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"this.closest('nav').querySelector('.nav-links').classList.toggle('open')\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"active\">Products \u25be</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals \u25b8</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group< v class=\"rel-card-tag\">Secondary Seal</div><h4>Secondary Seals</h4><p>Additional vapour barrier installed above the primary seal \u2014 reduces combined emissions by up to 96%.</p><span class=\"rel-card-link\">View Product \u2192</span></div></a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\" class=\"rel-card\"><div class=\"rel-card-img\" style=\"font-size:3rem\">\ud83d\udd04</div><div class=\"rel-card-body\"><div class=\"rel-card-tag\">Wiper Seal</div><h4>Wiper Seals</h4><p>Periphery-mounted wiper maintains shell contact to prevent product carry-up during roof movement.</p><span class=\"rel-card-link\">View Product \u2192</span></div></a>\n  </div>\n</div>\n<div class=\"cta-box\"><div class=\"cta-box-inner\"><h3>Request a Technical Quotation</h3><p>Provide your tank diameter, annular clearance and product stored \u2014 we'll recommend the optimal seal configuration.</p><div class=\"cta-btns\"><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Get a Quote \u2192</a><a href=\"http://www.tankprotocol.com\" target=\"_blank\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">Calculate Emissions</a></div></div></div>\n\n</div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">\ud83d\udcf0 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts \u2192</a></div>\n<div id=\"prod-blog-sidebar-rim\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <d "mechanical-shoe-seals":{title:"Mechanical Shoe Seals \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"this.closest('nav').querySelector('.nav-links').classList.toggle('open')\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"active\">Products \u25be</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals \u25b8</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">\u2699 Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div>\n  <div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products \u203a Rim Seals \u203a Mechanical Shoe Seals</div>\n    <h1>Mechanical Shoe <em>Seals</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.mss.hero_desc\">Metallic primary seals using a flexible shoe plate that maintains continuous contact with the tank shell \u2014 delivering industry-leading VOC emission control across all roof travel positions.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a><span class=\"sep\">\u203a</span><span class=\"cur\">Mechanical Shoe Seals</span></div>\n  </div>\n</div>\n\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-mss\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">\ud83d\uddbc\ufe0f</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"mss\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-mss\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-mss\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">\ud83d\uddbc\ufe0f</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-mss\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div><div class=\"product-wrap\">\n  <div class=\"product-intro\">\n    <!-- IMAGE BLOCK -->\n    <div class=\"product-img-block\">\n      <div class=\"prod-main-img-wrap\" id=\"prod-img-main-mss\">\n        <span class=\"prod-main-img-placeholder-icon\" id=\"prod-img-ph-mss\">\ud83d\udd29</span>\n        <img id=\"adm-main-img-mss\" src=\"\" alt=\"Product image\" onload=\"this.classList.add(\'loaded\');document.getElementById(\'prod-img-ph-mss\').style.display=\'none\'\" onerror=\"this.classList.remove(\'loaded\')\"/>\n        <div class=\"prod-img-admin-overlay\">\n          <button class=\"prod-img-upload-btn\" onclick=\"pickProductMainImg(\'mss\')\">\n            &#128247; Change Image\n          </button>\n        </div>\n      </div>\n      <div id=\"prod-vid-mss\" style=\"display:none;position:absolute;inset:0;z-index:0\"></div>\n            <div class=\"prod-img-thumbs-row\">\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'mss\',1)\" id=\"prod-img-t1-mss\">\n          <img id=\"adm-t1-img-mss\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'mss\',2)\" id=\"prod-img-t2-mss\">\n          <img id=\"adm-t2-img-mss\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'mss\',3)\" id=\"prod-img-t3-mss\">\n          <img id=\"adm-t3-img-mss\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n      </div>\n    </div>\n    <!-- INTRO TEXT -->\n    <div class=\"product-intro-text\">\n      <div class=\"section-label\">Product Detail</div>\n      <h2 data-cms=\"products.mss.title\">Mechanical Shoe Seals</h2>\n      <div class=\"divider\"></div>\n      <p data-cms=\"products.mss.intro1\">Mechanical shoe seals are the most widely deployed primary sealing system for external floating roof tanks. The precision-formed metallic shoe plate is spring-loaded or weight-loaded to maintain continuous, firm contact with the tank shell across the full range of roof travel and under all product level variations.</p>\n      <p data-cms=\"products.mss.intro2\">The shoe assembly rides on a compression spring or counterweight mechanism, compensating for shell out-of-roundness and weld seams. The resilient wiper tip on the leading edge of the shoe ensures a tight vapour barrier at the shell interface, significantly reducing standing and working losses.</p>\n      <div class=\"product-badges\"><span class=\"prod-badge\">Spring-loaded contact</span><span class=\"prod-badge\">All tank diameters</span><span class=\"prod-badge\">In-service replaceable</span><span class=\"prod-badge\">SS or CS available</span><span class=\"prod-badge\">API MPMS 19.2</span></div>\n      <div style=\"display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem\">\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request a Quote \u2192</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\">Technical Enquiry</a>\n      </div>\n    </div>\n  </div>\n</div></div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">\ud83d\udcf0 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts \u2192</a></div>\n<div id=\"prod-blog-sidebar-mss\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n\n<!-- SPECS -->\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div>\n        <div class=\"section-label\">Technical Data</div>\n        <div class=\"specs-title\">Specifications</div>\n        <p class=\"specs-sub\">All specifications are standard values. Custom configurations available based on tank dimensions, product stored, and operating conditions.</p>\n        <div class=\"compliance-badges\">\n          <span class=\"comp-badge\">API 650</span>\n          <span class=\"comp-badge\">API MPMS 19.2</span>\n          <span class=\"comp-badge\">API 545</span>\n          <span class=\"comp-badge\">IS 10987</span>\n        </div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Parameter</th><th>Specification</th></tr></thead>\n          <tbody><tr><td>Tank Shell Clearance</td><td>12 \u2013 25 mm typical</td></tr><tr><td>Operating Temperature</td><td>-40\u00b0C to +120\u00b0C</td></tr><tr><td>Roof Travel Range</td><td>Full tank height</td></tr><tr><td>Shell Out-of-Roundness</td><td>Up to \u00b125 mm accommodated</td></tr><tr><td>Shoe Material</td><td>Carbon Steel / SS 304 / SS 316</td></tr><tr><td>Tip Seal Material</td><td>Resilient foam / PTFE wiper</td></tr><tr><td>Spring Type</td><td>Stainless steel compression spring</td></tr><tr><td>Applicable Standards</td><td>API 650, API MPMS Ch. 19.2</td></tr><tr><td>Emission Factor (Ksh)</td><td>Per API 19.2 Table</td></tr><tr><td>Surface Finish</td><td>Hot-dip galvanised or painted</td></tr></tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- FEATURES -->\n<div class=\"features-section\">\n  <div class=\"features-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Why Choose This Product</span>\n      <h2>Key Features & Benefits</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"features-grid\">\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83c\udfaf</div>\n      <h4>Maximum Shell Contact</h4>\n      <p>Spring-loaded shoe maintains continuous contact with the shell regardless of roof position, product level, or shell deviation.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udee1</div>\n      <h4>Superior Emission Control</h4>\n      <p>Lowest emission factor (Ksh) among primary seal types per API MPMS Chapter 19.2 methodology.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udd27</div>\n      <h4>In-Service Maintenance</h4>\n      <p>Individual shoe assemblies can be inspected, adjusted, and replaced without taking the tank out of service.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\u2699</div>\n      <h4>Custom Fabricated</h4>\n      <p>Each seal set is manufactured to the exact diameter and clearance of your tank, measured on-site or from drawings.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83c\udf21</div>\n      <h4>Wide Temperature Range</h4>\n      <p>Performs reliably across full petrochemical operating temperature range from cryogenic-adjacent to high-temperature crude service.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udccb</div>\n      <h4>Full Documentation</h4>\n      <p>Material test certificates, weld inspection records, and dimensional reports supplied with every order.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- APPLICATIONS -->\n<div class=\"apps-section\">\n  <div class=\"apps-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Where It's Used</span>\n      <h2>Applications</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"apps-grid\">\n    <div class=\"app-item\">\n      <div class=\"app-num\">01</div>\n      <h4>Crude Oil Storage Tanks</h4>\n      <p>Refineries and tank farms storing crude oil at all grades and viscosities.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">02</div>\n      <h4>Refined Petroleum Products</h4>\n      <p>Motor spirit, ATF, diesel, and other refined product storage.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">03</div>\n      <h4>Petrochemical Feedstocks</h4>\n      <p>Naphtha, xylene, benzene, and other aromatic storage requiring tight vapour control.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">04</div>\n      <h4>High-Temperature Service</h4>\n      <p>Hot crude and atmospheric residue storage where other seal types may be limited.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">05</div>\n      <h4>Large-Diameter Tanks</h4>\n      <p>Particularly effective on tanks over 20 m diameter where shell deviation is significant.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">06</div>\n      <h4>Regulatory Compliance</h4>\n      <p>Facilities subject to CPCB, MoEFCC, or international environmental regulations.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- RELATED -->\n<div class=\"related-section\">\n  <div class=\"related-inner\">\n    <div class=\"section-hd\" style=\"text-align:left\">\n      <span class=\"slbl\">Complete Your System</span>\n      <h2 style=\"text-align:left\">Related Products</h2>\n      <div class=\"bar\" style=\"margin-left:0\"></div>\n    </div>\n    <div class=\"related-grid\">\n    <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udca7</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Liquid Mounted Primary Seals</h4>\n        <p>Foam-filled seals that float directly on the product surface.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udee1</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Secondary Seals</h4>\n        <p>Additional vapour barrier reducing combined emission factors by up to 96%.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\u2699</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Seal Fittings</div>\n        <h4>Seal Fittings</h4>\n        <p>Gauging hatches, bleeder vents and deck drain valves for complete roof systems.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\u26a1</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Lightning Protection</div>\n        <h4>Lightning Protection Systems</h4>\n        <p>API 545 compliant bonding and grounding for floating roof tanks.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    </div>\n  </div>\n</div>\n\n<!-- CTA -->\n<div class=\"cta-box\">\n  <div class=\"cta-box-inner\">\n    <h3>Request a Technical Quotation</h3>\n    <p>Provide your tank dimensions, product stored, and operating conditions \u2014 our engineers will recommend the optimal seal configuration and provide a detailed quotation.</p>\n    <div class=\"cta-btns\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Contact Our Engineers \u2192</a>\n      <a href=\"http://www.tankprotocol.com\" target=\"_blank\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">Calculate Emissions</a>\n    </div>\n  </div>\n</div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\" target=\"_blank\">Buy Spares</a></li>\n        <li><a href=\"http://www.tankprotocol.com\" target=\"_blank\">Tank Protocol</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Connect</div>\n      <ul>\n        <li><a href=\"https://facebook.com\" target=\"_blank\">Facebook</a></li>\n        <li><a href=\"https://twitter.com\" target=\"_blank\">Twitter / X</a></li>\n        <li><a href=\"https://youtube.com\" target=\"_blank\">YouTube</a></li>\n        <li><a href=\"https://instagram.com\" target=\"_blank\">Instagram</a></li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\">&copy; 2026 Petrodek Systems &middot; All Rights Reserved &middot; An ESRAI GROUP Enterprise</div>\n    <div class=\"social-links\">\n      <a href=\"https://facebook.com\" target=\"_blank\">f</a>\n      <a href=\"https://twitter.com\" target=\"_blank\">&#120143;</a>\n      <a href=\"https://youtube.com\" target=\"_blank\">&#9654;</a>\n      <a href=\"https://instagram.com\" target=\"_blank\">&#9678;</a>\n    </div>\n  </div>\n</footer>"},
"liquid-mounted-primary-seals":{title:"Liquid Mounted Primary Seals \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"this.closest('nav').querySelector('.nav-links').classList.toggle('open')\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"active\">Products \u25be</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals \u25b8</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">\u2699 Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div>\n  <div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products \u203a Rim Seals \u203a Liquid Mounted</div>\n    <h1>Liquid Mounted <em>Primary Seals</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.lmp.hero_desc\">Foam-filled or liquid-filled seals that float directly on the stored product surface \u2014 providing a continuous vapour barrier across the full annular space between roof rim and tank shell.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a><span class=\"sep\">\u203a</span><span class=\"cur\">Liquid Mounted Primary Seals</span></div>\n  </div>\n</div>\n\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-lmp\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">\ud83d\uddbc\ufe0f</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"lmp\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-lmp\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-lmp\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">\ud83d\uddbc\ufe0f</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-lmp\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div><div class=\"product-wrap\">\n  <div class=\"product-intro\">\n    <!-- IMAGE BLOCK -->\n    <div class=\"product-img-block\">\n      <div class=\"prod-main-img-wrap\" id=\"prod-img-main-lmp\">\n        <span class=\"prod-main-img-placeholder-icon\" id=\"prod-img-ph-lmp\">\ud83d\udca7</span>\n        <img id=\"adm-main-img-lmp\" src=\"\" alt=\"Product image\" onload=\"this.classList.add(\'loaded\');document.getElementById(\'prod-img-ph-lmp\').style.display=\'none\'\" onerror=\"this.classList.remove(\'loaded\')\"/>\n        <div class=\"prod-img-admin-overlay\">\n          <button class=\"prod-img-upload-btn\" onclick=\"pickProductMainImg(\'lmp\')\">\n            &#128247; Change Image\n          </button>\n        </div>\n      </div>\n      <div id=\"prod-vid-lmp\" style=\"display:none;position:absolute;inset:0;z-index:0\"></div>\n            <div class=\"prod-img-thumbs-row\">\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'lmp\',1)\" id=\"prod-img-t1-lmp\">\n          <img id=\"adm-t1-img-lmp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'lmp\',2)\" id=\"prod-img-t2-lmp\">\n          <img id=\"adm-t2-img-lmp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'lmp\',3)\" id=\"prod-img-t3-lmp\">\n          <img id=\"adm-t3-img-lmp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n      </div>\n    </div>\n    <!-- INTRO TEXT -->\n    <div class=\"product-intro-text\">\n      <div class=\"section-label\">Product Detail</div>\n      <h2 data-cms=\"products.lmp.title\">Liquid Mounted Primary Seals</h2>\n      <div class=\"divider\"></div>\n      <p data-cms=\"products.lmp.intro1\">Liquid mounted primary seals are designed to rest directly on the stored liquid product, filling the annular rim space between the floating roof deck rim and the tank shell. The foam batt or liquid-filled envelope provides positive buoyancy and maintains the seal profile under all product level changes.</p>\n      <p data-cms=\"products.lmp.intro2\">The outer cover \u2014 fabricated from reinforced fabric, stainless steel, or PTFE-coated material \u2014 wipes the tank shell and forms the primary vapour barrier. These seals are particularly suited to tanks with larger annular rim spaces and where primary-only sealing is sufficient for regulatory compliance.</p>\n      <div class=\"product-badges\"><span class=\"prod-badge\">Floats on product</span><span class=\"prod-badge\">Wide annular clearance</span><span class=\"prod-badge\">Reinforced fabric cover</span><span class=\"prod-badge\">PTFE option available</span><span class=\"prod-badge\">Low maintenance</span></div>\n      <div style=\"display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem\">\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request a Quote \u2192</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\">Technical Enquiry</a>\n      </div>\n    </div>\n  </div>\n</div></div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">\ud83d\udcf0 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts \u2192</a></div>\n<div id=\"prod-blog-sidebar-lmp\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n\n<!-- SPECS -->\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div>\n        <div class=\"section-label\">Technical Data</div>\n        <div class=\"specs-title\">Specifications</div>\n        <p class=\"specs-sub\">All specifications are standard values. Custom configurations available based on tank dimensions, product stored, and operating conditions.</p>\n        <div class=\"compliance-badges\">\n          <span class=\"comp-badge\">API 650</span>\n          <span class=\"comp-badge\">API MPMS 19.2</span>\n          <span class=\"comp-badge\">API 545</span>\n          <span class=\"comp-badge\">IS 10987</span>\n        </div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Parameter</th><th>Specification</th></tr></thead>\n          <tbody><tr><td>Seal Type</td><td>Foam-filled / Liquid-filled</td></tr><tr><td>Annular Clearance</td><td>100 \u2013 300 mm</td></tr><tr><td>Cover Material</td><td>Reinforced fabric / PTFE coated / SS</td></tr><tr><td>Foam Density</td><td>24 \u2013 48 kg/m\u00b3 (foam type)</td></tr><tr><td>Operating Temperature</td><td>-20\u00b0C to +80\u00b0C</td></tr><tr><td>Roof Travel</td><td>Full stroke accommodated</td></tr><tr><td>Standards</td><td>API 650 Appendix C</td></tr><tr><td>Emission Factor</td><td>Per API MPMS Ch. 19.2</td></tr><tr><td>Shell Compatibility</td><td>All standard shell materials</td></tr><tr><td>Replacement</td><td>In-service foam replacement possible</td></tr></tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- FEATURES -->\n<div class=\"features-section\">\n  <div class=\"features-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Why Choose This Product</span>\n      <h2>Key Features & Benefits</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"features-grid\">\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udca7</div>\n      <h4>Floats on Product</h4>\n      <p>Self-buoyant design rests on the stored liquid, automatically adjusting to product level changes without mechanical actuation.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\u2b21</div>\n      <h4>Large Clearance Coverage</h4>\n      <p>Ideal for tanks with annular rim spaces from 100 mm to 300 mm where shoe-type seals may not be practical.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udd04</div>\n      <h4>Simple Construction</h4>\n      <p>Fewer moving parts than mechanical shoe seals, reducing maintenance requirements and inspection points.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udee1</div>\n      <h4>Compatible with Secondary Seals</h4>\n      <p>Designed to accept a secondary seal above it, achieving combined emission factors compliant with strictest regulations.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83c\udf21</div>\n      <h4>Product Compatibility</h4>\n      <p>Available in materials compatible with crude oil, diesel, naphtha, and most other petroleum products.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udccb</div>\n      <h4>Cost Effective</h4>\n      <p>Lower fabrication cost than mechanical shoe seals while still achieving good primary seal emission performance.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- APPLICATIONS -->\n<div class=\"apps-section\">\n  <div class=\"apps-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Where It's Used</span>\n      <h2>Applications</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"apps-grid\">\n    <div class=\"app-item\">\n      <div class=\"app-num\">01</div>\n      <h4>Refined Product Tanks</h4>\n      <p>Diesel, kerosene, and motor spirit storage with moderate annular clearances.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">02</div>\n      <h4>Crude Oil Terminals</h4>\n      <p>Large crude oil storage tanks at import/export terminals.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">03</div>\n      <h4>Petrochemical Plants</h4>\n      <p>Naphtha and feedstock storage where product contact sealing is appropriate.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">04</div>\n      <h4>Older Tank Refurbishment</h4>\n      <p>Replacing worn primary seals during scheduled tank inspection outages.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">05</div>\n      <h4>Wide Rim Space Tanks</h4>\n      <p>Tanks with larger annular clearances where shoe-type seals are not specified.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">06</div>\n      <h4>Budget-Constrained Projects</h4>\n      <p>Cost-effective primary sealing solution when operating budgets require optimisation.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- RELATED -->\n<div class=\"related-section\">\n  <div class=\"related-inner\">\n    <div class=\"section-hd\" style=\"text-align:left\">\n      <span class=\"slbl\">Complete Your System</span>\n      <h2 style=\"text-align:left\">Related Products</h2>\n      <div class=\"bar\" style=\"margin-left:0\"></div>\n    </div>\n    <div class=\"related-grid\">\n    <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udd29</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Mechanical Shoe Seals</h4>\n        <p>High-efficiency metallic primary seals for all floating roof tank types.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udee1</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Secondary Seals</h4>\n        <p>Additional vapour barrier reducing combined emission factors by up to 96%.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\u2699</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Seal Fittings</div>\n        <h4>Seal Fittings</h4>\n        <p>Gauging hatches, bleeder vents and deck drain valves for complete roof systems.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udd04</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Wiper Seals</h4>\n        <p>Shell-contact wiper prevents product carry-up during roof travel.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    </div>\n  </div>\n</div>\n\n<!-- CTA -->\n<div class=\"cta-box\">\n  <div class=\"cta-box-inner\">\n    <h3>Request a Technical Quotation</h3>\n    <p>Provide your tank dimensions, product stored, and operating conditions \u2014 our engineers will recommend the optimal seal configuration and provide a detailed quotation.</p>\n    <div class=\"cta-btns\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Contact Our Engineers \u2192</a>\n      <a href=\"http://www.tankprotocol.com\" target=\"_blank\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">Calculate Emissions</a>\n    </div>\n  </div>\n</div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\" target "vapour-mounted-primary-seals":{title:"Vapour Mounted Primary Seals \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"this.closest('nav').querySelector('.nav-links').classList.toggle('open')\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"active\">Products \u25be</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals \u25b8</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">\u2699 Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div>\n  <div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products \u203a Rim Seals \u203a Vapour Mounted</div>\n    <h1>Vapour Mounted <em>Primary Seals</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.vmp.hero_desc\">Mounted above the product liquid surface in the rim space vapour zone \u2014 offering a cost-effective primary sealing solution for floating roof tanks with appropriate annular configurations.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a><span class=\"sep\">\u203a</span><span class=\"cur\">Vapour Mounted Primary Seals</span></div>\n  </div>\n</div>\n\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-vmp\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">\ud83d\uddbc\ufe0f</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"vmp\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-vmp\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-vmp\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">\ud83d\uddbc\ufe0f</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-vmp\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div><div class=\"product-wrap\">\n  <div class=\"product-intro\">\n    <!-- IMAGE BLOCK -->\n    <div class=\"product-img-block\">\n      <div class=\"prod-main-img-wrap\" id=\"prod-img-main-vmp\">\n        <span class=\"prod-main-img-placeholder-icon\" id=\"prod-img-ph-vmp\">\u2601</span>\n        <img id=\"adm-main-img-vmp\" src=\"\" alt=\"Product image\" onload=\"this.classList.add(\'loaded\');document.getElementById(\'prod-img-ph-vmp\').style.display=\'none\'\" onerror=\"this.classList.remove(\'loaded\')\"/>\n        <div class=\"prod-img-admin-overlay\">\n          <button class=\"prod-img-upload-btn\" onclick=\"pickProductMainImg(\'vmp\')\">\n            &#128247; Change Image\n          </button>\n        </div>\n      </div>\n      <div id=\"prod-vid-vmp\" style=\"display:none;position:absolute;inset:0;z-index:0\"></div>\n            <div class=\"prod-img-thumbs-row\">\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'vmp\',1)\" id=\"prod-img-t1-vmp\">\n          <img id=\"adm-t1-img-vmp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'vmp\',2)\" id=\"prod-img-t2-vmp\">\n          <img id=\"adm-t2-img-vmp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'vmp\',3)\" id=\"prod-img-t3-vmp\">\n          <img id=\"adm-t3-img-vmp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n      </div>\n    </div>\n    <!-- INTRO TEXT -->\n    <div class=\"product-intro-text\">\n      <div class=\"section-label\">Product Detail</div>\n      <h2 data-cms=\"products.vmp.title\">Vapour Mounted Primary Seals</h2>\n      <div class=\"divider\"></div>\n      <p data-cms=\"products.vmp.intro1\">Vapour mounted primary seals sit above the stored liquid product in the rim space, sealing against vapour rather than making contact with the liquid surface. The seal assembly is mounted on the roof rim structure and extends outward to contact the tank shell.</p>\n      <p data-cms=\"products.vmp.intro2\">This configuration avoids product contact, making it suitable for certain product types and simplifying inspection and replacement procedures. The seal is typically fabricated from resilient foam or fabric-encased foam, providing a continuous vapour barrier across the annular space.</p>\n      <div class=\"product-badges\"><span class=\"prod-badge\">No product contact</span><span class=\"prod-badge\">Above-surface mounting</span><span class=\"prod-badge\">Easy inspection access</span><span class=\"prod-badge\">Fabric or foam options</span><span class=\"prod-badge\">Cost effective</span></div>\n      <div style=\"display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem\">\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request a Quote \u2192</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\">Technical Enquiry</a>\n      </div>\n    </div>\n  </div>\n</div></div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">\ud83d\udcf0 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts \u2192</a></div>\n<div id=\"prod-blog-sidebar-vmp\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n\n<!-- SPECS -->\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div>\n        <div class=\"section-label\">Technical Data</div>\n        <div class=\"specs-title\">Specifications</div>\n        <p class=\"specs-sub\">All specifications are standard values. Custom configurations available based on tank dimensions, product stored, and operating conditions.</p>\n        <div class=\"compliance-badges\">\n          <span class=\"comp-badge\">API 650</span>\n          <span class=\"comp-badge\">API MPMS 19.2</span>\n          <span class=\"comp-badge\">API 545</span>\n          <span class=\"comp-badge\">IS 10987</span>\n        </div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Parameter</th><th>Specification</th></tr></thead>\n          <tbody><tr><td>Mounting Position</td><td>Above liquid surface in vapour zone</td></tr><tr><td>Annular Clearance</td><td>150 \u2013 400 mm typical</td></tr><tr><td>Seal Material</td><td>Resilient foam / reinforced fabric</td></tr><tr><td>Operating Temperature</td><td>-20\u00b0C to +90\u00b0C</td></tr><tr><td>Applicable Products</td><td>Crude, refined products, petrochemicals</td></tr><tr><td>Standards</td><td>API 650 Appendix C</td></tr><tr><td>Emission Factor</td><td>Per API MPMS Ch. 19.2</td></tr><tr><td>Roof Attachment</td><td>Bolted to roof rim structure</td></tr><tr><td>Replacement</td><td>Can be replaced without product removal</td></tr><tr><td>Shell Requirement</td><td>Smooth shell surface preferred</td></tr></tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- FEATURES -->\n<div class=\"features-section\">\n  <div class=\"features-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Why Choose This Product</span>\n      <h2>Key Features & Benefits</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"features-grid\">\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\u2601</div>\n      <h4>No Product Contact</h4>\n      <p>Seal is mounted above the product surface, eliminating compatibility concerns with stored liquid and reducing contamination risk.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udd27</div>\n      <h4>Simplified Maintenance</h4>\n      <p>Easier to inspect, adjust, and replace compared to liquid-immersed seal types, with reduced safety exposure during maintenance.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udcb0</div>\n      <h4>Lower Installed Cost</h4>\n      <p>Simpler construction and installation compared to liquid-mounted or mechanical shoe seals.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\u2b21</div>\n      <h4>Wide Rim Space Suits</h4>\n      <p>Particularly effective on tanks where large annular clearances or shell deviation rules out other seal types.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udee1</div>\n      <h4>Secondary Seal Compatible</h4>\n      <p>Can be fitted with an additional secondary seal above to achieve lower combined emission factors when required.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udccb</div>\n      <h4>Flexible Specification</h4>\n      <p>Available in various fabric and foam material combinations to suit specific product types and temperature ranges.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- APPLICATIONS -->\n<div class=\"apps-section\">\n  <div class=\"apps-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Where It's Used</span>\n      <h2>Applications</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"apps-grid\">\n    <div class=\"app-item\">\n      <div class=\"app-num\">01</div>\n      <h4>Crude Oil Storage</h4>\n      <p>Atmospheric crude oil storage tanks at refineries and import terminals.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">02</div>\n      <h4>Fuel Oil Storage</h4>\n      <p>Heavy fuel oil and residue tanks where liquid-contact sealing is less critical.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">03</div>\n      <h4>Wide Clearance Tanks</h4>\n      <p>Tanks with annular clearances exceeding 250 mm where other types are impractical.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">04</div>\n      <h4>Low-Volatility Products</h4>\n      <p>Products with lower vapour pressure where vapour-zone sealing achieves compliance.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">05</div>\n      <h4>Retrofit Applications</h4>\n      <p>Cost-effective replacement option during scheduled tank maintenance outages.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">06</div>\n      <h4>Emerging Market Projects</h4>\n      <p>Budget-optimised projects where vapour-mounted sealing meets local regulatory requirements.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- RELATED -->\n<div class=\"related-section\">\n  <div class=\"related-inner\">\n    <div class=\"section-hd\" style=\"text-align:left\">\n      <span class=\"slbl\">Complete Your System</span>\n      <h2 style=\"text-align:left\">Related Products</h2>\n      <div class=\"bar\" style=\"margin-left:0\"></div>\n    </div>\n    <div class=\"related-grid\">\n    <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udd29</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Mechanical Shoe Seals</h4>\n        <p>High-efficiency metallic primary seals for all floating roof tank types.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udca7</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Liquid Mounted Primary Seals</h4>\n        <p>Foam-filled seals that float directly on the product surface.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udee1</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Secondary Seals</h4>\n        <p>Additional vapour barrier reducing combined emission factors by up to 96%.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\u2699</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Seal Fittings</div>\n        <h4>Seal Fittings</h4>\n        <p>Gauging hatches, bleeder vents and deck drain valves for complete roof systems.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    </div>\n  </div>\n</div>\n\n<!-- CTA -->\n<div class=\"cta-box\">\n  <div class=\"cta-box-inner\">\n    <h3>Request a Technical Quotation</h3>\n    <p>Provide your tank dimensions, product stored, and operating conditions \u2014 our engineers will recommend the optimal seal configuration and provide a detailed quotation.</p>\n    <div class=\"cta-btns\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Contact Our Engineers \u2192</a>\n      <a href=\"http://www.tankprotocol.com\" target=\"_blank\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">Calculate Emissions</a>\n    </div>\n  </div>\n</div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\" target=\"_blank\">Buy Spares</a></li>\n        <li><a href=\"http://www.tankprotocol.com\" target=\"_blank\">Tank Protocol</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Connect</div>\n      <ul>\n        <li><a href=\"https://facebook.com\" target=\"_blank\">Facebook</a></li>\n        <li><a href=\"https://twitter.com\" target=\"_blank\">Twitter / X</a></li>\n        <li><a href=\"https://youtube.com\" target=\"_blank\">YouTube</a></li>\n        <li><a href=\"https://instagram.com\" target=\"_blank\">Instagram</a></li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\">&copy; 2026 Petrodek Systems &middot; All Rights Reserved &middot; An ESRAI GROUP Enterprise</div>\n    <div class=\"social-links\">\n      <a href=\"https://facebook.com\" target=\"_blank\">f</a>\n      <a href=\"https://twitter.com\" target=\"_blank\">&#120143;</a>\n      <a href=\"https://youtube.com\" target=\"_blank\">&#9654;</a>\n      <a href=\"https://instagram.com\" target=\"_blank\">&#9678;</a>\n    </div>\n  </div>\n</footer>"},
"secondary-seals":{title:"Secondary Seals \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"this.closest('nav').querySelector('.nav-links').classList.toggle('open')\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"active\">Products \u25be</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals \u25b8</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">\u2699 Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div>\n  <div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products \u203a Rim Seals \u203a Secondary Seals</div>\n    <h1>Secondary <em>Seals</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.sec.hero_desc\">Installed above the primary seal, secondary seals provide an additional vapour barrier at the tank shell \u2014 dramatically reducing combined emission factors by up to 96% compared to an open-top tank.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a><span class=\"sep\">\u203a</span><span class=\"cur\">Secondary Seals</span></div>\n  </div>\n</div>\n\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-sec\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">\ud83d\uddbc\ufe0f</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"sec\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-sec\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-sec\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">\ud83d\uddbc\ufe0f</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-sec\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div><div class=\"product-wrap\">\n  <div class=\"product-intro\">\n    <!-- IMAGE BLOCK -->\n    <div class=\"product-img-block\">\n      <div class=\"prod-main-img-wrap\" id=\"prod-img-main-sec\">\n        <span class=\"prod-main-img-placeholder-icon\" id=\"prod-img-ph-sec\">\ud83d\udee1</span>\n        <img id=\"adm-main-img-sec\" src=\"\" alt=\"Product image\" onload=\"this.classList.add(\'loaded\');document.getElementById(\'prod-img-ph-sec\').style.display=\'none\'\" onerror=\"this.classList.remove(\'loaded\')\"/>\n        <div class=\"prod-img-admin-overlay\">\n          <button class=\"prod-img-upload-btn\" onclick=\"pickProductMainImg(\'sec\')\">\n            &#128247; Change Image\n          </button>\n        </div>\n      </div>\n      <div id=\"prod-vid-sec\" style=\"display:none;position:absolute;inset:0;z-index:0\"></div>\n            <div class=\"prod-img-thumbs-row\">\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'sec\',1)\" id=\"prod-img-t1-sec\">\n          <img id=\"adm-t1-img-sec\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'sec\',2)\" id=\"prod-img-t2-sec\">\n          <img id=\"adm-t2-img-sec\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'sec\',3)\" id=\"prod-img-t3-sec\">\n          <img id=\"adm-t3-img-sec\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n      </div>\n    </div>\n    <!-- INTRO TEXT -->\n    <div class=\"product-intro-text\">\n      <div class=\"section-label\">Product Detail</div>\n      <h2 data-cms=\"products.sec.title\">Secondary Seals</h2>\n      <div class=\"divider\"></div>\n      <p data-cms=\"products.sec.intro1\">Secondary seals are mounted on the floating roof rim directly above the primary seal system, providing a second line of defence against vapour losses to atmosphere. The secondary seal contacts the tank shell with a resilient wiper tip, sealing the narrow gap between primary and secondary seal that would otherwise allow vapour release.</p>\n      <p data-cms=\"products.sec.intro2\">When a secondary seal is combined with a primary seal, the combined system achieves the lowest emission factors of any floating roof tank sealing configuration. Secondary seals are increasingly required by environmental regulators in India and internationally for new installations and refurbishment projects.</p>\n      <div class=\"product-badges\"><span class=\"prod-badge\">96% emission reduction</span><span class=\"prod-badge\">Above primary seal</span><span class=\"prod-badge\">PTFE or SS wiper tip</span><span class=\"prod-badge\">Spring-loaded contact</span><span class=\"prod-badge\">Mandatory for many projects</span></div>\n      <div style=\"display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem\">\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request a Quote \u2192</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\">Technical Enquiry</a>\n      </div>\n    </div>\n  </div>\n</div></div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">\ud83d\udcf0 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts \u2192</a></div>\n<div id=\"prod-blog-sidebar-sec\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n\n<!-- SPECS -->\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div>\n        <div class=\"section-label\">Technical Data</div>\n        <div class=\"specs-title\">Specifications</div>\n        <p class=\"specs-sub\">All specifications are standard values. Custom configurations available based on tank dimensions, product stored, and operating conditions.</p>\n        <div class=\"compliance-badges\">\n          <span class=\"comp-badge\">API 650</span>\n          <span class=\"comp-badge\">API MPMS 19.2</span>\n          <span class=\"comp-badge\">API 545</span>\n          <span class=\"comp-badge\">IS 10987</span>\n        </div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Parameter</th><th>Specification</th></tr></thead>\n          <tbody><tr><td>Position</td><td>Above primary seal, on roof rim</td></tr><tr><td>Emission Reduction</td><td>Up to 96% (combined with primary)</td></tr><tr><td>Wiper Tip Material</td><td>PTFE / Stainless steel blade</td></tr><tr><td>Contact Force</td><td>Adjustable spring-loaded</td></tr><tr><td>Clearance Accommodation</td><td>As per primary seal annular space</td></tr><tr><td>Operating Temperature</td><td>-40\u00b0C to +120\u00b0C</td></tr><tr><td>Standards</td><td>API MPMS Ch. 19.2</td></tr><tr><td>Emission Factor (Kss)</td><td>Per API 19.2 Table</td></tr><tr><td>Mounting</td><td>Bolted to floating roof rim structure</td></tr><tr><td>Replacement</td><td>In-service replaceable</td></tr></tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- FEATURES -->\n<div class=\"features-section\">\n  <div class=\"features-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Why Choose This Product</span>\n      <h2>Key Features & Benefits</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"features-grid\">\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udee1</div>\n      <h4>Maximum Emission Reduction</h4>\n      <p>Combined primary + secondary system achieves the lowest possible VOC emission factors under API MPMS Chapter 19.2 methodology.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\u2696</div>\n      <h4>Regulatory Compliance</h4>\n      <p>Increasingly mandated by CPCB, MoEFCC, and international standards for new tank construction and major refurbishments.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udd27</div>\n      <h4>In-Service Inspection</h4>\n      <p>Secondary seal can be inspected, adjusted, and replaced without tank shutdown or product removal.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83c\udf21</div>\n      <h4>Material Choices</h4>\n      <p>PTFE wiper provides chemical resistance for aggressive products; stainless steel blade suits general hydrocarbon service.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\u2699</div>\n      <h4>Compatible with All Primary Types</h4>\n      <p>Designed to fit above mechanical shoe, liquid-mounted, and vapour-mounted primary seal systems.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udccb</div>\n      <h4>Proven Track Record</h4>\n      <p>Installed at major refinery and petrochemical facilities across India, achieving measurable VOC reductions.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- APPLICATIONS -->\n<div class=\"apps-section\">\n  <div class=\"apps-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Where It's Used</span>\n      <h2>Applications</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"apps-grid\">\n    <div class=\"app-item\">\n      <div class=\"app-num\">01</div>\n      <h4>High-Volatility Products</h4>\n      <p>Light crude, motor spirit, naphtha, and aromatics storage where vapour control is critical.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">02</div>\n      <h4>Regulatory Compliance Projects</h4>\n      <p>Facilities upgrading to meet latest CPCB or MoEFCC emission standards.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">03</div>\n      <h4>New Tank Construction</h4>\n      <p>Standard specification on all new floating roof tanks at modern Indian refineries.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">04</div>\n      <h4>Refinery Tanks</h4>\n      <p>Process feed and product tanks where VOC losses impact both environment and product value.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">05</div>\n      <h4>Import/Export Terminals</h4>\n      <p>Coastal terminals handling high-turnover product storage with strict environmental monitoring.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">06</div>\n      <h4>ISO 14001 Certified Sites</h4>\n      <p>Facilities with formal environmental management systems requiring lowest achievable emission levels.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- RELATED -->\n<div class=\"related-section\">\n  <div class=\"related-inner\">\n    <div class=\"section-hd\" style=\"text-align:left\">\n      <span class=\"slbl\">Complete Your System</span>\n      <h2 style=\"text-align:left\">Related Products</h2>\n      <div class=\"bar\" style=\"margin-left:0\"></div>\n    </div>\n    <div class=\"related-grid\">\n    <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\" class=\"rel-card\">\n      <div class=\"
