body{font-family:'Barlow',sans-serif;color:var(--text);background:var(--white)}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,22,40,0.96);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:68px;border-bottom:2px solid var(--accent)}
.page-hero{padding:120px 5% 70px;background:linear-gradient(160deg,var(--navy),var(--steel));position:relative;overflow:hidden}
.page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(232,160,32,.1),transparent 55%)}
.page-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(232,160,32,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(232,160,32,.04) 1px,transparent 1px);background-size:60px 60px;animation:gm 22s linear infinite}
@keyframes gm{to{transform:translateY(60px)}}
.page-hero-inner{position:relative;z-index:1;max-width:1100px;margin:0 auto}
.page-hero-label{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:.7rem}
.page-hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(2.5rem,6vw,5rem);line-height:.95;color:var(--white);text-transform:uppercase;letter-spacing:.02em;margin-bottom:1rem}
.page-hero h1 em{font-style:normal;color:var(--accent)}
.page-hero p{font-size:1rem;color:rgba(255,255,255,.6);max-width:580px;line-height:1.8}
.breadcrumb{display:flex;align-items:center;gap:.5rem;margin-top:1.5rem;font-size:.72rem;color:rgba(255,255,255,.35);letter-spacing:.05em}
.breadcrumb a{color:rgba(255,255,255,.35);text-decoration:none;transition:color .2s}
.breadcrumb a:hover{color:var(--accent)}
.breadcrumb span{color:var(--accent)}
.page-body{padding:70px 5%;max-width:1100px;margin:0 auto}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem}
.section-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(1.8rem,3vw,2.8rem);text-transform:uppercase;letter-spacing:.03em;color:var(--navy);margin-bottom:.5rem;line-height:1.05}
.section-divider{width:48px;height:3px;background:var(--accent);margin:.7rem 0 2rem}
.section-divider.center{margin:.7rem auto 2rem}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-top:2rem}
.card{background:var(--white);border:1px solid #e8eef4;border-top:3px solid transparent;padding:1.8rem;transition:transform .25s,box-shadow .25s,border-top-color .25s}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(10,22,40,.1);border-top-color:var(--accent)}
.card-icon{font-size:1.6rem;margin-bottom:1rem}
.card h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.2rem;text-transform:uppercase;letter-spacing:.05em;color:var(--navy);margin-bottom:.7rem}
.card p{font-size:.87rem;color:var(--mid);line-height:1.75}
.card a{display:inline-flex;align-items:center;gap:.3rem;margin-top:1.2rem;color:var(--accent);font-size:.76rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;text-decoration:none}
.card a:hover{gap:.6rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;margin:3rem 0}
@media(max-width:768px){.two-col{grid-template-columns:1fr;gap:2rem}}
.prose h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.5rem;text-transform:uppercase;letter-spacing:.05em;color:var(--navy);margin:1.8rem 0 .8rem}
.prose h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;text-transform:uppercase;letter-spacing:.05em;color:var(--navy);margin:1.4rem 0 .5rem;border-left:3px solid var(--accent);padding-left:.8rem}
.prose p{font-size:.92rem;color:var(--text);line-height:1.85;margin-bottom:1rem}
.prose ul{padding-left:1.4rem;margin-bottom:1rem}
.prose ul li{font-size:.9rem;color:var(--text);line-height:1.7;margin-bottom:.4rem}
.prose ul li::marker{color:var(--accent)}
.spec-table{width:100%;border-collapse:collapse;margin:1.5rem 0}
.spec-table th{background:var(--navy);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;padding:.7rem 1rem;text-align:left}
.spec-table td{padding:.7rem 1rem;font-size:.86rem;border-bottom:1px solid #e8eef4;color:var(--text)}
.spec-table tr:nth-child(even) td{background:#f8fafc}
.cta-box{background:var(--navy);padding:3rem;text-align:center;position:relative;overflow:hidden;margin-top:3rem}
.cta-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(232,160,32,.08),transparent 65%)}
.cta-box h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.8rem;text-transform:uppercase;color:var(--white);margin-bottom:.6rem;position:relative}
.cta-box p{color:#8899aa;font-size:.9rem;margin-bottom:1.8rem;position:relative}
.btn-primary{display:inline-flex;align-items:center;gap:.5rem;background:var(--accent);color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;padding:.9rem 2.4rem;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:background .2s,transform .2s}
.btn-primary:hover{background:#f0b535;transform:translateY(-2px)}
.btn-outline{display:inline-flex;align-items:center;gap:.5rem;border:1.5px solid rgba(232,160,32,.5);color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;padding:.88rem 2.4rem;transition:border-color .2s,color .2s,background .2s}
.btn-outline:hover{border-color:var(--accent);color:var(--navy);background:var(--accent)}
.blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.8rem;margin-top:2rem}
.blog-card{background:var(--white);border:1px solid #e8eef4;overflow:hidden;transition:transform .25s,box-shadow .25s}
.blog-card:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(10,22,40,.1)}
.blog-card-img{height:160px;background:linear-gradient(135deg,var(--navy),var(--steel));display:flex;align-items:center;justify-content:center;font-size:3rem;color:rgba(255,255,255,.2)}
.blog-card-body{padding:1.4rem}
.blog-tag{font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem}
.blog-card-body h3{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.04em;text-transform:uppercase;color:var(--navy);margin-bottom:.5rem;line-height:1.2}
.blog-card-body p{font-size:.81rem;color:var(--mid);line-height:1.7;margin-bottom:.8rem}
.blog-meta{font-size:.68rem;color:var(--mid);letter-spacing:.06em}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.form-row.full{grid-template-columns:1fr}
.form-group label{display:block;font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:.4rem}
.form-group input,.form-group select,.form-group textarea{width:100%;border:1px solid #dde5ee;background:var(--white);color:var(--text);font-family:'Barlow',sans-serif;font-size:.88rem;padding:.65rem .9rem;outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:rgba(232,160,32,.6)}
.form-group textarea{min-height:120px;resize:vertical}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;margin-top:2rem}
.contact-info-item{display:flex;gap:1rem;margin-bottom:1.5rem;align-items:flex-start}
.contact-info-icon{width:40px;height:40px;background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.25);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.contact-info-label{font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:.2rem}
.contact-info-value{font-size:.9rem;color:var(--text)}
footer{background:#060f1c;padding:50px 5% 28px;border-top:2px solid rgba(232,160,32,.2)}
.footer-main{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:2.5rem}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.65rem;color:var(--white);letter-spacing:.1em;white-space:nowrap;margin-bottom:.8rem}
.footer-logo span{color:var(--accent)}
.footer-tagline{font-size:.78rem;color:#445566;line-height:1.7;max-width:220px}
.footer-col-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem}
.footer-col ul{list-style:none}
.footer-col ul li{margin-bottom:.5rem}
.footer-col ul li a{font-size:.8rem;color:#445566;text-decoration:none;transition:color .2s}
.footer-col ul li a:hover{color:var(--accent)}
.footer-bottom{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;padding-top:1.8rem;border-top:1px solid rgba(255,255,255,.05)}
.footer-copy{color:#334455;font-size:.75rem;letter-spacing:.04em}
.social-links{display:flex;gap:.6rem}
.social-links a{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#6688aa;text-decoration:none;font-size:.82rem;transition:background .2s,color .2s}
.social-links a:hover{background:var(--accent);color:var(--navy)}
@media(max-width:1024px){.footer-main{grid-template-columns:1fr 1fr;gap:2rem}}
@media(max-width:768px){.footer-main{grid-template-columns:1fr;gap:2rem}.contact-grid{grid-template-columns:1fr}}


*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0a1628;--steel:#1c2e4a;--accent:#e8a020;--light:#f4f6f9;--mid:#8899aa;--white:#fff;--text:#2c3e50;--sw:268px;--ok:#27ae60;--bad:#e74c3c;--warn:#f39c12;--info:#3498db}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--light);color:var(--text)}
/* ── LOGIN ── */
#lp{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 50%,rgba(232,160,32,.1),transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(192,57,43,.08),transparent 50%),linear-gradient(160deg,#0a1628,#1c2e4a 60%,#0d1f35);position:relative;overflow:hidden}
.lgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(232,160,32,.05)1px,transparent 1px),linear-gradient(90deg,rgba(232,160,32,.05)1px,transparent 1px);background-size:60px 60px;animation:gm 25s linear infinite}
@keyframes gm{to{transform:translateY(60px)}}
.lbox{position:relative;z-index:2;background:rgba(255,255,255,.04);border:1px solid rgba(232,160,32,.2);backdrop-filter:blur(12px);padding:3rem 2.5rem;width:100%;max-width:420px;margin:1rem;animation:fu .6s ease both}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lbrand{text-align:center;margin-bottom:2rem}.lbn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:.1em;color:#fff}.lbn span{color:var(--accent)}.lbs{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);margin-top:.3rem}
.ldiv{width:40px;height:2px;background:var(--accent);margin:.8rem auto 1.5rem}
.ltit{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.15em;text-transform:uppercase;color:#8899aa;text-align:center;margin-bottom:1.8rem}
.fg{margin-bottom:1.1rem}.fg label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:.4rem}
.fg input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:'Barlow',sans-serif;font-size:.9rem;padding:.75rem 1rem;outline:none;transition:border-color .2s}
.fg input:focus{border-color:rgba(232,160,32,.5)}.fg input::placeholder{color:#445566}
.lerr{display:none;background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:#e74c3c;font-size:.82rem;padding:.6rem 1rem;margin-bottom:1.2rem;text-align:center}
.lbtn{width:100%;background:var(--accent);color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.15em;text-transform:uppercase;border:none;padding:.9rem;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:background .2s}
.lbtn:hover{background:#f0b535}.lback{display:block;text-align:center;margin-top:1.5rem;color:#445566;font-size:.78rem;text-decoration:none}.lback:hover{color:var(--accent)}
/* ── SHELL ── */
#sh{display:none;height:100vh;flex-direction:row;overflow:hidden}
/* ── SIDEBAR ── */
.sb{width:var(--sw);background:var(--navy);border-right:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sbbrand{padding:1rem 1.2rem;border-bottom:2px solid var(--accent)}.sbbrand .bn{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.15rem;letter-spacing:.1em;color:#fff;white-space:nowrap}.sbbrand .bn span{color:var(--accent)}.sbbrand .bt{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:#334455;margin-top:.1rem}
.sbsec{font-size:.56rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#334455;padding:.85rem 1.2rem .22rem}
.sbn{list-style:none;padding:0 .45rem}.sbn li{margin-bottom:1px}
.sbn a{display:flex;align-items:center;gap:.55rem;padding:.5rem .7rem;color:#6688aa;text-decoration:none;font-size:.79rem;font-weight:500;border-radius:2px;transition:background .15s,color .15s;cursor:pointer;white-space:nowrap}
.sbn a:hover{background:rgba(255,255,255,.05);color:#ccd8e8}.sbn a.on{background:rgba(232,160,32,.1);color:var(--accent);border-left:2px solid var(--accent);padding-left:calc(.7rem - 2px)}
.ni{font-size:.85rem;width:15px;text-align:center;flex-shrink:0}
.sbfoot{margin-top:auto;padding:.85rem 1.2rem;border-top:1px solid rgba(255,255,255,.05)}
.upill{display:flex;align-items:center;gap:.55rem}.uav{width:28px;height:28px;background:rgba(232,160,32,.15);border:1.5px solid rgba(232,160,32,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:var(--accent);font-weight:700;flex-shrink:0}
.un{font-size:.72rem;font-weight:600;color:#ccd8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.ur{font-size:.58rem;color:#334455;text-transform:uppercase;letter-spacing:.08em}
.lobtn{background:none;border:none;color:#334455;cursor:pointer;font-size:.88rem;padding:3px;margin-left:auto;transition:color .2s;flex-shrink:0}.lobtn:hover{color:var(--bad)}
/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{height:52px;background:#fff;border-bottom:1px solid #e0e8f0;display:flex;align-items:center;justify-content:space-between;padding:0 1.4rem;flex-shrink:0;gap:1rem}
.tbtit{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.98rem;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);white-space:nowrap}
.tbr{display:flex;align-items:center;gap:.65rem;flex-shrink:0}
.tbadge{background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.3);color:var(--accent);font-size:.63rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .5rem}
.ttime{font-size:.7rem;color:var(--mid)}.vsite{font-size:.7rem;color:var(--mid);text-decoration:none}.vsite:hover{color:var(--accent)}
.ac{flex:1;overflow-y:auto;padding:1.4rem}
/* ── PANELS ── */
.pn{display:none}.pn.on{display:block}
/* ── LAYOUT ── */
.ph{margin-bottom:1.2rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.ph-l h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.55rem;text-transform:uppercase;letter-spacing:.04em;color:var(--navy);margin-bottom:.1rem}.ph-l p{font-size:.77rem;color:var(--mid)}
.card{background:#fff;padding:1.15rem;margin-bottom:1.15rem}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;padding-bottom:.65rem;border-bottom:1px solid #e8eef4;gap:.7rem;flex-wrap:wrap}
.ct{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;text-transform:uppercase;letter-spacing:.08em;color:var(--navy)}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.9rem;margin-bottom:1.2rem}
.sc{background:#fff;border-top:3px solid var(--accent);padding:.95rem;position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.sc:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.sc::after{content:attr(data-i);position:absolute;right:.6rem;top:50%;transform:translateY(-50%);font-size:1.7rem;opacity:.07}
.sl{font-size:.6rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:.28rem}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:1.75rem;font-weight:800;color:var(--navy);line-height:1}
.ss{font-size:.66rem;color:var(--mid);margin-top:.18rem}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
@media(max-width:900px){.tc{grid-template-columns:1fr}}
/* ── TABLE ── */
.dt{width:100%;border-collapse:collapse}
.dt th{text-align:left;font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);padding:.48rem .6rem;border-bottom:2px solid #e8eef4;white-space:nowrap}
.dt td{padding:.6rem .6rem;font-size:.79rem;border-bottom:1px solid #f0f4f8;color:var(--text);vertical-align:middle}
.dt tr:last-child td{border-bottom:none}.dt tr:hover td{background:#f8fafc}
/* ── BADGES ── */
.b{display:inline-block;padding:.13rem .46rem;font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.bg{background:rgba(39,174,96,.1);color:var(--ok)}.ba{background:rgba(243,156,18,.1);color:var(--warn)}.br{background:rgba(231,76,60,.1);color:var(--bad)}.bb{background:rgba(52,152,219,.1);color:var(--info)}.bp{background:rgba(142,68,173,.1);color:#8e44ad}
/* ── BUTTONS ── */
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;padding:.5rem 1.25rem;border:none;cursor:pointer;transition:opacity .18s,transform .12s;display:inline-flex;align-items:center;gap:.3rem}
.btn:hover{opacity:.86;transform:translateY(-1px)}
.btn-a{background:var(--accent);color:var(--navy)}.btn-g{background:transparent;border:1px solid #dde5ee;color:var(--mid)}.btn-d{background:var(--bad);color:#fff}.btn-b{background:var(--info);color:#fff}.btn-ok{background:var(--ok);color:#fff}.btn-navy{background:var(--navy);color:#fff}
.btn-s{padding:.24rem .72rem;font-size:.64rem}.btn-xs{padding:.14rem .46rem;font-size:.58rem}
/* ── FORMS ── */
.fr{display:grid;gap:.75rem;margin-bottom:.75rem}.fr2{grid-template-columns:1fr 1fr}.fr3{grid-template-columns:1fr 1fr 1fr}.fr4{grid-template-columns:1fr 1fr 1fr 1fr}
.f label{display:block;font-size:.61rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:.26rem}
.f input,.f select,.f textarea{width:100%;border:1px solid #dde5ee;background:#fff;color:var(--text);font-family:'Barlow',sans-serif;font-size:.82rem;padding:.56rem .8rem;outline:none;transition:border-color .2s;resize:vertical}
.f input:focus,.f select:focus,.f textarea:focus{border-color:rgba(232,160,32,.6)}.f textarea{min-height:70px}
.fa{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap}
/* ── RICH TEXT EDITOR ── */
.rte-bar{display:flex;flex-wrap:wrap;gap:2px;padding:.4rem;background:#f8fafc;border:1px solid #dde5ee;border-bottom:none}
.rte-bar button{background:none;border:1px solid transparent;padding:.22rem .42rem;font-size:.78rem;cursor:pointer;color:var(--text);border-radius:2px;font-weight:600;min-width:26px}
.rte-bar button:hover{background:#e8eef4;border-color:#dde5ee}.rte-bar .sep{width:1px;background:#dde5ee;margin:0 2px}
.rte{min-height:180px;border:1px solid #dde5ee;padding:.85rem;outline:none;font-size:.86rem;line-height:1.75;background:#fff}
.rte:focus{border-color:rgba(232,160,32,.5)}
/* ── TABS ── */
.tabs{display:flex;border-bottom:2px solid #e8eef4;margin-bottom:1rem;overflow-x:auto}
.tab{padding:.45rem .95rem;font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--mid);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s;white-space:nowrap}
.tab.on{color:var(--accent);border-color:var(--accent)}.tab-pane{display:none}.tab-pane.on{display:block}
/* ── SECTIONS EDITOR ── */
.sect{background:#fff;border:1px solid #e8eef4;margin-bottom:.5rem;overflow:hidden}
.sect-hd{display:flex;align-items:center;gap:.65rem;padding:.65rem .9rem;cursor:pointer;user-select:none}
.sect-hd:hover{background:#f8fafc}
.sect-nm{font-weight:600;font-size:.84rem;color:var(--navy);flex:1}
.sect-tp{font-size:.6rem;color:var(--mid);background:#f0f4f8;padding:.08rem .38rem}
.sect-tg{color:var(--mid);font-size:.76rem;transition:transform .2s}
.sect-bd{display:none;border-top:1px solid #e8eef4;padding:.95rem}
.sect-bd.open{display:block}
/* ── PAGES TREE ── */
.pg-item{background:#fff;border:1px solid #e8eef4;margin-bottom:3px}
.pg-hd{display:flex;align-items:center;gap:.6rem;padding:.58rem .85rem;cursor:pointer}
.pg-hd:hover{background:#f8fafc}
.pg-nm{flex:1;font-size:.83rem;font-weight:600;color:var(--navy)}
.pg-meta{font-size:.68rem;color:var(--mid)}
.pg-children{padding-left:1.4rem;border-left:2px solid #e8eef4;margin-left:1.1rem;margin-top:2px}
/* ── MENU BUILDER ── */
.menu-item{background:#fff;border:1px solid #e8eef4;margin-bottom:3px}
.mi-hd{display:flex;align-items:center;gap:.55rem;padding:.55rem .8rem;cursor:move}
.mi-hd:hover{background:#f8fafc}
.mi-drag{color:#ccd8e8;flex-shrink:0}
.mi-lbl{flex:1;font-size:.82rem;font-weight:600;color:var(--text)}
.mi-type{font-size:.6rem;color:var(--mid);background:#f0f4f8;padding:.08rem .35rem}
.mi-lvl{font-size:.58rem;background:rgba(232,160,32,.12);color:var(--accent);padding:.06rem .32rem;font-weight:700}
.mi-edit{background:#f8fafc;border-top:1px solid #e8eef4;padding:.7rem;display:none}
.mi-edit.open{display:block}
.mi-children{padding-left:1.3rem;border-left:2px solid rgba(232,160,32,.2);margin-left:1rem;margin-top:2px;display:none}
.mi-children.open{display:block}
/* ── WIDGET GRID ── */
.wgt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.85rem}
.wgt-card{background:#fff;border:1px solid #e8eef4;padding:.95rem;cursor:pointer;transition:border-color .2s,box-shadow .2s;text-align:center}
.wgt-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(232,160,32,.12)}
.wgt-icon{font-size:1.6rem;margin-bottom:.45rem}
.wgt-name{font-weight:700;font-size:.8rem;color:var(--navy)}
.wgt-desc{font-size:.68rem;color:var(--mid);margin-top:.18rem}
.awi{background:#fff;border:1px solid #e8eef4;padding:.75rem 1rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.75rem}
/* ── IMAGE GRID ── */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:.65rem;margin-top:.75rem}
.img-thumb{aspect-ratio:1;background:#e8eef4;border:2px solid transparent;overflow:hidden;position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.6rem;transition:border-color .2s}
.img-thumb img{width:100%;height:100%;object-fit:cover}.img-thumb:hover{border-color:var(--accent)}
.img-del{position:absolute;top:2px;right:2px;background:rgba(231,76,60,.9);border:none;color:#fff;font-size:.56rem;cursor:pointer;padding:2px 4px;display:none}
.img-thumb:hover .img-del{display:block}
.img-name{font-size:.6rem;color:var(--mid);text-align:center;margin-top:.22rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drop-zone{border:2px dashed #dde5ee;padding:1.6rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:#fafbfc;margin-bottom:.9rem}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:rgba(232,160,32,.03)}
.drop-zone input{display:none}.dz-icon{font-size:1.8rem;opacity:.32;margin-bottom:.45rem}.dz-txt{font-size:.78rem;color:var(--mid)}.dz-txt strong{color:var(--accent)}
/* ── VIDEO ── */
.vid-prev{background:#000;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:.82rem;margin-top:.8rem;overflow:hidden}
.vid-prev iframe{width:100%;height:100%;border:none}
.vid-item{background:#f8fafc;border:1px solid #e8eef4;padding:.75rem 1rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.8rem}
/* ── LINK ITEM ── */
.li{background:#fff;border:1px solid #e8eef4;padding:.65rem .85rem;margin-bottom:.38rem;display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}
.li-lbl{font-size:.8rem;font-weight:600;color:var(--navy);min-width:90px}
.li-url{font-size:.74rem;color:var(--info);flex:1;word-break:break-all;text-decoration:none}.li-url:hover{text-decoration:underline}
/* ── CTA PREVIEW ── */
.cta-prev{background:linear-gradient(135deg,#0a1628,#1c2e4a);padding:1.8rem;text-align:center;margin-top:.75rem;border:1px solid rgba(232,160,32,.2)}
.cpv-tag{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(232,160,32,.3);padding:.18rem .65rem;display:inline-block;margin-bottom:.65rem}
.cpv-ttl{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.5rem;text-transform:uppercase;color:#fff;margin-bottom:.38rem}
.cpv-sub{font-size:.8rem;color:#8899aa;margin-bottom:.9rem}
.cpv-btn{display:inline-block;background:var(--accent);color:var(--navy);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;padding:.5rem 1.4rem;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%)}
/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:600;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;padding:1.4rem;max-width:540px;width:92%;max-height:88vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:.7rem;right:.8rem;background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--mid)}.modal-close:hover{color:var(--bad)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;text-transform:uppercase;letter-spacing:.06em;color:var(--navy);margin-bottom:.85rem;padding-right:2rem}
/* ── TOGGLE ── */
.tgl-row{display:flex;align-items:center;justify-content:space-between;padding:.65rem 0;border-bottom:1px solid #f0f4f8;gap:1rem}
.tgl-row:last-child{border-bottom:none}.tgl-lbl{font-size:.82rem;color:var(--text)}.tgl-sub{font-size:.68rem;color:var(--mid);margin-top:.08rem}
.tgl{position:relative;width:36px;height:18px;flex-shrink:0}.tgl input{opacity:0;width:0;height:0}
.tgl-t{position:absolute;inset:0;background:#dde5ee;cursor:pointer;transition:background .2s;border-radius:18px}.tgl input:checked+.tgl-t{background:var(--accent)}
.tgl-t::before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}.tgl input:checked+.tgl-t::before{transform:translateX(18px)}
/* ── ACTIVITY ── */
.act-item{display:flex;gap:.65rem;padding:.55rem 0;border-bottom:1px solid #f0f4f8;align-items:flex-start}
.act-item:last-child{border-bottom:none}
.act-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dot-g{background:var(--ok)}.dot-a{background:var(--warn)}.dot-b{background:var(--info)}.dot-r{background:var(--bad)}
.act-txt{font-size:.78rem;color:var(--text);line-height:1.5}.act-time{font-size:.65rem;color:var(--mid);margin-top:.08rem}
/* ── TOAST ── */
.toast{position:fixed;bottom:1.3rem;right:1.3rem;background:var(--navy);color:#fff;padding:.7rem 1.1rem;font-size:.78rem;z-index:9999;animation:tsi .3s ease,tso .4s 2.7s ease forwards;pointer-events:none;max-width:270px;border-left:3px solid var(--ok)}
@keyframes tsi{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes tso{to{opacity:0;transform:translateX(28px)}}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#dde5ee;border-radius:2px}
/* ── STATUS INDICATOR ── */
.status-bar{background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.2);border-left:3px solid var(--ok);padding:.75rem 1rem;margin-bottom:1.1rem;font-size:.8rem;color:var(--text)}



/* ═══════════ ADMIN v2 CSS ═══════════ */

/* ══════ PETRODEK ADMIN v2 — Industrial command-centre ══════ */
/* Fonts via <link> in <head> */

:root{
  --ink:#0d1520; --ink2:#1a2535; --ink3:#243045;
  --gold:#e8a020; --gold2:#f0b840; --gold3:rgba(232,160,32,.12);
  --slate:#f0f4f8; --slate2:#e2e8f0; --slate3:#cbd5e1;
  --text:#1e293b; --mid:#64748b; --dim:#94a3b8;
  --ok:#22c55e; --warn:#f59e0b; --err:#ef4444; --info:#3b82f6;
  --radius:7px; --shadow:0 2px 8px rgba(0,0,0,.08);
  --sb-width:230px;
}

/* Reset for admin only */
#adm{display:flex;height:100vh;width:100%;overflow:hidden;
  font-family:'DM Sans',sans-serif;font-size:14px;color:#344054;
  background:#f0f4f8;box-sizing:border-box;
  margin:0;padding:0;border:0;float:none;position:static}
#adm *{box-sizing:border-box}
#adm input,#adm select,#adm textarea,#adm button{font-family:'DM Sans',sans-serif}

/* ── SIDEBAR ───────────────────────────────────── */
.asb{
  width:var(--sb-width);flex-shrink:0;
  background:var(--ink);display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  border-right:1px solid rgba(255,255,255,.06);
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
.asb-brand{
  padding:16px 18px 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;
  display:flex;align-items:center;gap:10px
}
.asb-logo{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;
  letter-spacing:.08em;color:#fff;line-height:1
}
.asb-logo em{color:var(--gold);font-style:normal}
.asb-badge{
  margin-left:auto;font-size:9px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;background:rgba(232,160,32,.15);color:var(--gold);
  padding:2px 7px;border-radius:10px;border:1px solid rgba(232,160,32,.25)
}
.asb-section{
  font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.2);padding:14px 18px 5px;margin-top:4px
}
.asb-nav{list-style:none;padding:0 8px;margin:0}
.asb-nav li{margin-bottom:1px}
.asb-nav a{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  color:rgba(255,255,255,.42);text-decoration:none;font-size:12.5px;font-weight:500;
  border-radius:5px;cursor:pointer;transition:all .15s;
}
.asb-nav a:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.78)}
.asb-nav a.active{
  background:rgba(232,160,32,.14);color:var(--gold);
  box-shadow:inset 3px 0 0 var(--gold)
}
.asb-nav .ico{width:15px;text-align:center;font-size:13px;flex-shrink:0;opacity:.7}
.asb-nav a.active .ico{opacity:1}
.asb-nav .cnt{
  margin-left:auto;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);
  font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:8px;min-width:18px;text-align:center
}
.asb-nav a.active .cnt{background:rgba(232,160,32,.2);color:var(--gold)}
.asb-nav .new-cnt{background:rgba(34,197,94,.2);color:#4ade80}

.asb-foot{
  margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0
}
.asb-user{display:flex;align-items:center;gap:9px}
.asb-av{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,rgba(232,160,32,.3),rgba(232,160,32,.1));
  border:1.5px solid rgba(232,160,32,.35);display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;color:var(--gold);flex-shrink:0
}
.asb-uinfo{flex:1;min-width:0}
.asb-uname{font-size:11.5px;color:rgba(255,255,255,.65);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asb-urole{font-size:9.5px;color:rgba(255,255,255,.22);text-transform:uppercase;letter-spacing:.08em}
.asb-logout{
  background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;
  font-size:14px;padding:4px;transition:color .2s;flex-shrink:0;border-radius:4px
}
.asb-logout:hover{color:var(--err);background:rgba(239,68,68,.1)}

/* ── LOGIN ─────────────────────────────────────── */
#adm-login{
  position:fixed;inset:0;z-index:999;background:var(--ink);
  display:flex;align-items:center;justify-content:center;
}
.alog-box{
  width:380px;padding:2.4rem 2rem;position:relative;
  background:var(--ink2);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.4)
}
.alog-brand{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;
  letter-spacing:.1em;color:#fff;text-align:center;margin-bottom:.2rem
}
.alog-brand em{color:var(--gold);font-style:normal}
.alog-sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.25);text-align:center;margin-bottom:1.8rem}
.alog-err{
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  color:#fca5a5;font-size:12px;padding:.5rem .8rem;border-radius:5px;
  margin-bottom:1rem;display:none
}
.alog-label{font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:.4rem;display:block}
.alog-input{
  width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  color:#fff;padding:.65rem .9rem;border-radius:6px;font-size:13.5px;outline:none;
  transition:border-color .2s;margin-bottom:1rem
}
.alog-input:focus{border-color:rgba(232,160,32,.5);background:rgba(255,255,255,.07)}
.alog-btn{
  width:100%;background:var(--gold);color:var(--ink);
  font-family:'Barlow Condensed',sans-serif;font-weight:800;
  font-size:13px;letter-spacing:.14em;text-transform:uppercase;
  padding:.75rem;border:none;border-radius:6px;cursor:pointer;
  transition:opacity .2s,transform .12s;margin-top:.4rem
}
.alog-btn:hover{opacity:.88;transform:translateY(-1px)}
.alog-back{
  display:block;text-align:center;margin-top:.9rem;font-size:12px;
  color:rgba(255,255,255,.3);cursor:pointer;text-decoration:none;transition:color .2s
}
.alog-back:hover{color:var(--gold)}

/* ── TOPBAR ────────────────────────────────────── */
.atop{
  height:50px;background:var(--ink2);border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;
  position:sticky;top:0;z-index:100
}
.atop-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;
  letter-spacing:.1em;text-transform:uppercase;color:#fff;flex:1
}
.atop-viewsite{
  display:inline-flex;align-items:center;gap:5px;padding:5px 12px;
  background:rgba(232,160,32,.1);border:1px solid rgba(232,160,32,.25);
  border-radius:5px;color:var(--gold);font-size:11.5px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;
  text-decoration:none;font-family:'Barlow Condensed',sans-serif
}
.atop-viewsite:hover{background:rgba(232,160,32,.18);border-color:rgba(232,160,32,.4)}
.atop-time{font-size:11px;color:rgba(255,255,255,.25);min-width:42px;text-align:right;font-variant-numeric:tabular-nums}

/* ── MAIN AREA ─────────────────────────────────── */
.amain{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--ink)}
.acontent{flex:1;overflow-y:auto;background:var(--slate);scrollbar-width:thin}
.apad{padding:22px 24px}

/* ── PANES ─────────────────────────────────────── */
.apane{display:none}.apane.on{display:block}
.apane-head{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:12px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:14px;
  border-bottom:2px solid var(--slate2)
}
.apane-head h1{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;
  text-transform:uppercase;letter-spacing:.05em;color:var(--text);margin:0
}
.apane-head p{font-size:12.5px;color:var(--mid);margin:.2rem 0 0}
.apane-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center}

/* ── CARDS ─────────────────────────────────────── */
.acard{
  background:#fff;border:1px solid var(--slate2);border-radius:var(--radius);
  overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)
}
.acard-head{
  display:flex;align-items:center;gap:10px;padding:11px 16px;
  border-bottom:1px solid var(--slate2);flex-wrap:wrap;gap:8px;
  background:linear-gradient(to right,#fff,#fafbfc)
}
.acard-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;
  text-transform:uppercase;letter-spacing:.1em;color:var(--text);flex:1
}
.acard-body{padding:16px}

/* ── GRID LAYOUTS ──────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.ga{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start}
@media(max-width:900px){.g2,.g3,.g4,.ga{grid-template-columns:1fr}}

/* ── STAT CARDS ────────────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.scard{
  background:#fff;border:1px solid var(--slate2);border-radius:var(--radius);
  padding:14px 15px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden
}
.scard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)}
.scard.g::after{background:var(--ok)}.scard.b::after{background:var(--info)}.scard.r::after{background:var(--err)}
.scard:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.scard-lbl{font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.scard-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--text);line-height:1}
.scard-sub{font-size:10.5px;color:var(--mid);margin-top:3px}

/* ── QUICK ACTIONS ─────────────────────────────── */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qa{
  display:flex;align-items:center;gap:9px;padding:10px 12px;
  background:var(--slate);border:1px solid var(--slate2);border-radius:6px;
  cursor:pointer;transition:all .18s;text-decoration:none
}
.qa:hover{background:#fff;border-color:var(--gold);box-shadow:0 2px 10px rgba(0,0,0,.06)}
.qa-ic{width:32px;height:32px;background:#fff;border:1px solid var(--slate2);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.qa:hover .qa-ic{border-color:var(--gold)}
.qa-lbl{font-size:12px;font-weight:600;color:var(--text)}
.qa-sub{font-size:10px;color:var(--mid);margin-top:1px}

/* ── SITE PAGES QUICKNAV ───────────────────────── */
.spnav-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:7px 10px;background:var(--slate);border:1px solid var(--slate2);
  border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text);
  text-align:left;transition:all .15s;gap:6px;margin-bottom:4px
}
.spnav-btn:hover{background:#fff;border-color:var(--gold);color:var(--gold)}
.spnav-arr{font-size:10px;color:var(--dim);flex-shrink:0}
.spnav-btn:hover .spnav-arr{color:var(--gold)}

/* ── FORMS ─────────────────────────────────────── */
.fg{margin-bottom:11px}
.fg label{
  display:block;font-size:10.5px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--mid);margin-bottom:4px
}
.fg input,.fg select,.fg textarea{
  width:100%;border:1px solid var(--slate2);background:#fff;color:var(--text);
  font-size:13px;padding:7px 10px;outline:none;transition:border-color .2s;
  border-radius:5px;font-family:'DM Sans',sans-serif;resize:vertical
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,160,32,.09)
}
.fg textarea{min-height:72px}
.frow{display:grid;gap:10px;margin-bottom:4px}
.frow.c2{grid-template-columns:1fr 1fr}
.frow.c3{grid-template-columns:1fr 1fr 1fr}
.frow.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.fact{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap;align-items:center}

/* ── BUTTONS ───────────────────────────────────── */
.abtn{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11.5px;
  letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;
  border:none;cursor:pointer;border-radius:5px;
  transition:opacity .18s,transform .12s;display:inline-flex;align-items:center;gap:5px
}
.abtn:hover{opacity:.88;transform:translateY(-1px)}
.abtn-gold{background:var(--gold);color:var(--ink)}
.abtn-ghost{background:transparent;border:1px solid var(--slate2);color:var(--mid)}
.abtn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.abtn-dark{background:var(--ink);color:#fff}
.abtn-ok{background:var(--ok);color:#fff}
.abtn-err{background:var(--err);color:#fff}
.abtn-info{background:var(--info);color:#fff}
.abtn-sm{padding:5px 11px;font-size:10.5px}
.abtn-xs{padding:3px 8px;font-size:9.5px}

/* ── TABS ──────────────────────────────────────── */
.atabs{display:flex;border-bottom:2px solid var(--slate2);margin-bottom:14px;overflow-x:auto;gap:0}
.atab{
  padding:7px 14px;font-size:11.5px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;cursor:pointer;color:var(--mid);
  border:none;background:none;border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .18s;white-space:nowrap
}
.atab:hover{color:var(--gold)}
.atab.on{color:var(--gold);border-bottom-color:var(--gold)}
.atpane{display:none}.atpane.on{display:block}

/* ── RICH TEXT ─────────────────────────────────── */
.rte-bar{
  display:flex;flex-wrap:wrap;gap:2px;padding:6px 8px;
  background:var(--slate);border:1px solid var(--slate2);
  border-bottom:none;border-radius:5px 5px 0 0
}
.rte-bar button{
  background:none;border:1px solid transparent;padding:3px 7px;
  font-size:12px;cursor:pointer;color:var(--text);border-radius:3px;
  font-weight:600;min-width:26px;transition:background .12s
}
.rte-bar button:hover{background:rgba(0,0,0,.06)}
.rte-bar .sep{width:1px;background:var(--slate2);margin:0 3px;align-self:stretch}
.rte{min-height:150px;border:1px solid var(--slate2);padding:10px 12px;
  outline:none;font-size:13.5px;line-height:1.75;background:#fff;
  border-radius:0 0 5px 5px}
.rte:focus{border-color:var(--gold)}

/* ── TABLE ─────────────────────────────────────── */
.atable{width:100%;border-collapse:collapse}
.atable th{
  font-size:9.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--mid);padding:8px 10px;border-bottom:2px solid var(--slate2);
  text-align:left;background:var(--slate);white-space:nowrap
}
.atable td{padding:9px 10px;font-size:12.5px;border-bottom:1px solid var(--slate2);color:var(--text);vertical-align:middle}
.atable tr:last-child td{border-bottom:none}
.atable tr:hover td{background:#fafbfc}

/* ── BADGE ─────────────────────────────────────── */
.abadge{display:inline-flex;align-items:center;padding:2px 7px;font-size:10px;
  font-weight:700;letter-spacing:.05em;border-radius:4px}
.abadge-g{background:rgba(34,197,94,.1);color:#16a34a}
.abadge-a{background:rgba(232,160,32,.1);color:#b45309}
.abadge-r{background:rgba(239,68,68,.1);color:#dc2626}
.abadge-b{background:rgba(59,130,246,.1);color:#2563eb}
.abadge-n{background:rgba(100,116,139,.1);color:var(--mid)}

/* ── TOGGLE ────────────────────────────────────── */
.tgl-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--slate2);gap:10px}
.tgl-row:last-child{border-bottom:none}
.tgl{position:relative;width:38px;height:21px;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tgl-t{position:absolute;inset:0;background:#cbd5e1;cursor:pointer;
  transition:background .2s;border-radius:21px}
.tgl input:checked+.tgl-t{background:var(--gold)}
.tgl-t::before{content:'';position:absolute;width:15px;height:15px;
  left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.18)}
.tgl input:checked+.tgl-t::before{transform:translateX(17px)}

/* ── DROP ZONE ─────────────────────────────────── */
.adz{
  border:2px dashed var(--slate2);border-radius:var(--radius);
  padding:22px;text-align:center;cursor:pointer;
  transition:all .2s;background:#fafbfc
}
.adz:hover,.adz.drag{border-color:var(--gold);background:rgba(232,160,32,.03)}
.adz input{display:none}
.adz-ic{font-size:22px;opacity:.28;margin-bottom:6px}
.adz-txt{font-size:12.5px;color:var(--mid)}
.adz-txt strong{color:var(--gold)}

/* ── IMG GRID ──────────────────────────────────── */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px}
.igt{border:2px solid transparent;border-radius:6px;overflow:hidden;
  cursor:pointer;aspect-ratio:1;background:var(--slate);
  transition:border-color .18s;position:relative}
.igt:hover{border-color:var(--gold)}
.igt img{width:100%;height:100%;object-fit:cover;display:block}
.igt-del{position:absolute;top:3px;right:3px;background:rgba(239,68,68,.9);
  border:none;color:#fff;font-size:9px;cursor:pointer;padding:2px 5px;
  border-radius:3px;display:none}
.igt:hover .igt-del{display:block}
.igt-name{font-size:10px;color:var(--mid);margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── MENU TREE ─────────────────────────────────── */
.mti{background:#fff;border:1px solid var(--slate2);border-radius:5px;
  margin-bottom:3px;transition:border-color .18s;overflow:hidden}
.mti:hover{border-color:rgba(232,160,32,.4)}
.mti-hd{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer}
.mti-drag{color:var(--slate3);font-size:13px}
.mti-lbl{flex:1;font-size:13px;font-weight:500;color:var(--text)}
.mti-type{font-size:9.5px;color:var(--mid);background:var(--slate);
  padding:1px 6px;border-radius:3px}
.mti-lvl{font-size:9px;font-weight:700;background:rgba(232,160,32,.12);
  color:#b45309;padding:1px 5px;border-radius:3px}
.mti-acts{display:flex;gap:3px}
.mti-ed{display:none;border-top:1px solid var(--slate2);padding:10px;background:var(--slate)}
.mti-ed.open{display:block}
.mti-kids{padding-left:18px;border-left:3px solid rgba(232,160,32,.2);margin:3px 0 3px 16px}

/* ── PAGE BUILDER ──────────────────────────────── */
.pb-canvas{
  min-height:360px;padding:14px;
  background:repeating-linear-gradient(90deg,rgba(59,130,246,.03) 0,rgba(59,130,246,.03) 1px,transparent 1px,transparent 8.33%),var(--slate);
  border:2px dashed var(--slate2);border-radius:var(--radius);
  display:flex;flex-direction:column;gap:10px
}
.pb-empty{text-align:center;padding:40px 20px;color:var(--dim)}
.pb-empty-ic{font-size:26px;margin-bottom:8px;opacity:.35}
.pb-row{
  background:#fff;border:1px solid var(--slate2);border-radius:6px;
  display:grid;gap:8px;padding:10px;
  transition:border-color .2s,box-shadow .2s;position:relative
}
.pb-row:hover{border-color:rgba(232,160,32,.4);box-shadow:0 2px 12px rgba(0,0,0,.07)}
.pb-row-toolbar{
  display:flex;gap:5px;margin-bottom:6px;align-items:center
}
.pb-row-label{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);flex:1}
.pb-col{
  background:var(--slate);border:1.5px dashed var(--slate2);border-radius:5px;
  min-height:70px;display:flex;align-items:center;justify-content:center;
  font-size:11.5px;color:var(--dim);transition:all .18s;padding:8px;
}
.pb-col.over{border-color:var(--gold);background:rgba(232,160,32,.06)}
.pb-widget{
  width:100%;background:#fff;border:1px solid var(--slate2);border-radius:5px;
  padding:9px 11px;display:flex;align-items:center;gap:9px;cursor:grab
}
.pb-w-ic{width:28px;height:28px;background:var(--slate);border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pb-w-info{flex:1}
.pb-w-name{font-size:12px;font-weight:600;color:var(--text)}
.pb-w-type{font-size:10px;color:var(--mid)}
.pb-w-del{background:none;border:none;color:var(--dim);cursor:pointer;
  font-size:13px;padding:3px;border-radius:3px;transition:all .18s}
.pb-w-del:hover{color:var(--err);background:rgba(239,68,68,.08)}

.wlib{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px}
.wlitem{
  background:#fff;border:1px solid var(--slate2);border-radius:6px;
  padding:11px 9px;text-align:center;cursor:grab;transition:all .18s;
  user-select:none
}
.wlitem:hover{border-color:var(--gold);box-shadow:0 2px 12px rgba(232,160,32,.14);transform:translateY(-2px)}
.wlitem:active{cursor:grabbing}
.wl-ic{font-size:18px;margin-bottom:4px}
.wl-n{font-size:11px;font-weight:600;color:var(--text)}

/* ── MODAL ─────────────────────────────────────── */
.amodal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:800;align-items:center;justify-content:center}
.amodal-bg.open{display:flex}
.amodal{
  background:#fff;border-radius:10px;padding:22px;max-width:520px;
  width:92%;max-height:88vh;overflow-y:auto;position:relative;
  box-shadow:0 24px 80px rgba(0,0,0,.2)
}
.amodal-close{position:absolute;top:12px;right:14px;background:none;border:none;
  font-size:16px;cursor:pointer;color:var(--mid);padding:4px 6px;border-radius:4px;transition:all .15s}
.amodal-close:hover{background:var(--slate);color:var(--err)}
.amodal-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;
  text-transform:uppercase;letter-spacing:.06em;color:var(--text);margin-bottom:14px;padding-right:24px}

/* ── TOAST ─────────────────────────────────────── */
.atst{
  position:fixed;bottom:18px;right:18px;
  background:var(--ink2);color:#fff;padding:10px 16px;font-size:12.5px;z-index:9999;
  animation:atin .28s ease,atout .35s 2.5s ease forwards;pointer-events:none;
  max-width:260px;border-radius:8px;border-left:3px solid var(--ok);
  box-shadow:0 8px 32px rgba(0,0,0,.3);display:flex;align-items:center;gap:8px
}
.atst.warn{border-left-color:var(--warn)}.atst.bad{border-left-color:var(--err)}
@keyframes atin{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
@keyframes atout{to{opacity:0;transform:translateX(28px)}}

/* ── VIDEO PREVIEW ─────────────────────────────── */
.vid-prev{
  background:#000;aspect-ratio:16/9;border-radius:6px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.3);font-size:12px;margin-top:8px;max-height:180px
}
.vid-prev iframe,.vid-prev video{width:100%;height:100%;border:none;object-fit:cover}



/* ── PRODUCT PAGE 3-COLUMN SIDEBAR LAYOUT ── */
.prod-page-layout{display:grid;grid-template-columns:210px 1fr 250px;gap:1.8rem;
  max-width:1340px;margin:0 auto;padding:0 3% 2rem;align-items:start}
@media(max-width:1100px){.prod-page-layout{grid-template-columns:1fr}
  .prod-sidebar-left,.prod-sidebar-right{order:99}}
.prod-sidebar-left,.prod-sidebar-right{position:sticky;top:82px}

/* LEFT — Factsheet Sidebar Widget */
.prod-img-sidebar-widget{background:#fff;border:1px solid rgba(10,22,40,.1);border-radius:8px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.pisw-body{display:flex;flex-direction:column}
.pisw-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;padding:1.4rem;background:#f8fafc}
.pisw-img{width:100%;height:auto;display:block}

/* LEFT — Documents widget */
.prod-doc-widget{background:#fff;border:1px solid rgba(10,22,40,.1);border-radius:8px;
  overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.prod-doc-wh{background:var(--navy);padding:.65rem 1rem;display:flex;
  align-items:center;gap:.5rem}
.prod-doc-wt{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;
  letter-spacing:.14em;text-transform:uppercase;color:#fff;flex:1}
.prod-doc-wb{padding:.85rem}
.prod-doc-item{display:flex;align-items:center;gap:.6rem;padding:.55rem .7rem;
  border:1px solid rgba(10,22,40,.08);border-radius:5px;margin-bottom:.45rem;
  transition:all .18s;cursor:pointer;text-decoration:none}
.prod-doc-item:hover{border-color:var(--accent);background:rgba(232,160,32,.04);transform:translateX(3px)}
.prod-doc-ic{width:32px;height:32px;border-radius:4px;background:var(--light);
  display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.prod-doc-info{flex:1;min-width:0}
.prod-doc-name{font-size:.73rem;font-weight:600;color:var(--navy);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.prod-doc-meta{font-size:.6rem;color:var(--mid);margin-top:.08rem}
.prod-doc-empty{text-align:center;padding:1.3rem .75rem;color:var(--mid);font-size:.75rem;
  border:2px dashed rgba(10,22,40,.1);border-radius:6px}
.prod-doc-empty-ic{font-size:1.5rem;opacity:.28;margin-bottom:.35rem}

/* RIGHT — Blog sidebar widget */
.prod-blog-widget{background:#fff;border:1px solid rgba(10,22,40,.1);border-radius:8px;
  overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.prod-bw-head{background:var(--steel);padding:.65rem 1rem;display:flex;
  align-items:center;justify-content:space-between}
.prod-bw-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;
  letter-spacing:.14em;text-transform:uppercase;color:#fff}
.prod-bw-all{font-size:.6rem;color:var(--accent);font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;cursor:pointer;text-decoration:none;transition:opacity .2s}
.prod-bw-all:hover{opacity:.75}
.prod-blog-item{display:flex;gap:.65rem;padding:.8rem 1rem;border-bottom:1px solid
  rgba(10,22,40,.06);cursor:pointer;transition:background .18s;text-decoration:none}
.prod-blog-item:last-child{border-bottom:none}
.prod-blog-item:hover{background:rgba(10,22,40,.025)}
.prod-blog-thumb{width:52px;height:52px;border-radius:5px;background:var(--light);
  flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.prod-blog-thumb img{width:100%;height:100%;object-fit:cover}
.prod-blog-info{flex:1;min-width:0}
.prod-blog-tag{font-size:.57rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);margin-bottom:.18rem}
.prod-blog-ttl{font-size:.76rem;font-weight:600;color:var(--navy);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-blog-dt{font-size:.6rem;color:var(--mid);margin-top:.22rem}
.prod-bw-empty{padding:1.2rem 1rem;text-align:center;color:var(--mid);font-size:.76rem}


/* ── ADMIN MODE VISIBILITY ── */
.admin-only { display: none !important; }
body.admin-active .admin-only { display: flex !important; }
body.admin-active .pisw-add-btn { display: inline-block !important; }
.pisw-add-btn { display: none; }

/* ── PRODUCT MAIN IMAGE BLOCK (redesigned) ── */
.product-img-block { position: relative; }
.prod-main-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 4/3;
  background: linear-gradient(135deg, var(--navy), var(--steel));
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; border-radius: 4px;
}
.prod-main-img-wrap img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  display: none;
}
.prod-main-img-wrap img.loaded { display: block; }
.prod-main-img-placeholder-icon {
  font-size: 4rem; opacity: .15; pointer-events: none;
}
.prod-img-admin-overlay {
  position: absolute; inset: 0;
  background: rgba(10,22,40,.55);
  display: none;
  align-items: center; justify-content: center;
  opacity: 0; transition: opacity .2s;
}
body.admin-active .prod-main-img-wrap:hover .prod-img-admin-overlay { display: flex; opacity: 1; }
.prod-img-upload-btn {
  background: var(--accent,#e8a020);
  color: var(--navy,#0a1628);
  border: none; border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: .85rem;
  letter-spacing: .08em; text-transform: uppercase;
  padding: .55rem 1.2rem; cursor: pointer;
  display: flex; align-items: center; gap: .4rem;
}
.prod-img-upload-btn:hover { background: #d4911a; }

/* Thumbs */
.prod-img-thumbs-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: .5rem; margin-top: .5rem;
}
.prod-img-thumb-cell {
  aspect-ratio: 4/3;
  background: var(--light, #f4f6f9);
  border-radius: 4px; overflow: hidden;
  position: relative; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; opacity: .5;
  transition: opacity .2s;
}
.prod-img-thumb-cell img {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  display: none;
}
.prod-img-thumb-cell img.loaded { display: block; opacity: 1; }
.prod-img-thumb-cell:hover { opacity: .8; }
.prod-img-thumb-overlay {
  position: absolute; inset: 0;
  background: rgba(10,22,40,.5);
  display: flex;
  align-items: center; justify-content: center;
  font-size: .6rem; color: #e8a020; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  opacity: 0; transition: opacity .15s; cursor: pointer;
}
body.admin-active .prod-img-thumb-cell:hover .prod-img-thumb-overlay { opacity: 1; }



/* ── ADMIN v3 ── */
#adm-shell{display:none;}
#adm-shell.active{display:flex !important;}
.atab{background:none;border:none;border-bottom:2px solid transparent;padding:.4rem .8rem;font-size:.78rem;cursor:pointer;color:#6677aa;font-family:'DM Sans',sans-serif;}
.atab.on{border-bottom-color:#e8a020;color:#0a1628;font-weight:600;}
.atpane{display:none;}.atpane.on{display:block;}

/* ── KEBAB NAVIGATION ── */
nav.kebab-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 5%;height:68px;
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(10,22,40,0.97);backdrop-filter:blur(10px);
  border-bottom:2px solid var(--accent);
}
nav.kebab-nav .logo{
  font-size:1.5rem;font-weight:800;letter-spacing:-.5px;color:#fff;text-decoration:none;
  font-family:'DM Sans',sans-serif;
}
nav.kebab-nav .logo span{color:var(--accent);}

/* Kebab button (3 vertical dots) */
.kebab-btn{
  position:relative;
  width:44px;height:44px;
  background:transparent;border:1px solid rgba(232,160,32,.35);border-radius:8px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  transition:background .18s,border-color .18s,transform .18s;
  padding:0;
}
.kebab-btn:hover{background:rgba(232,160,32,.12);border-color:var(--accent);}
.kebab-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.kebab-btn span{
  display:block;width:5px;height:5px;border-radius:50%;
  background:var(--accent);transition:transform .25s,background .18s;
}
.kebab-btn[aria-expanded="true"]{background:rgba(232,160,32,.18);border-color:var(--accent);}
.kebab-btn[aria-expanded="true"] span:nth-child(1){transform:translateY(2px) scale(1.15);}
.kebab-btn[aria-expanded="true"] span:nth-child(3){transform:translateY(-2px) scale(1.15);}

/* Dropdown panel */
.kebab-panel{
  position:absolute;top:calc(100% + 12px);right:5%;
  width:min(380px, calc(100vw - 10%));
  max-height:calc(100vh - 100px);overflow-y:auto;
  background:linear-gradient(180deg, rgba(15,28,50,0.98) 0%, rgba(10,22,40,0.98) 100%);
  border:1px solid rgba(232,160,32,.25);border-radius:12px;
  box-shadow:0 20px 60px -10px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
  backdrop-filter:blur(20px);
  opacity:0;transform:translateY(-12px) scale(.97);pointer-events:none;
  transition:opacity .22s ease-out, transform .22s ease-out;
  padding:.6rem;
}
.kebab-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.kebab-panel::before{
  content:'';position:absolute;top:-7px;right:18px;width:14px;height:14px;
  background:rgba(15,28,50,0.98);border-left:1px solid rgba(232,160,32,.25);border-top:1px solid rgba(232,160,32,.25);
  transform:rotate(45deg);
}
.kn-list{list-style:none;margin:0;padding:0;}
.kn-li{margin:0;}
.kn-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:.55rem 1rem;border-radius:8px;
  transition:background .15s;
}
.kn-row:hover{background:rgba(232,160,32,.08);}
.kn-link{
  flex:1;color:#e8eef5;text-decoration:none;font-size:.94rem;font-weight:500;
  font-family:'DM Sans',sans-serif;letter-spacing:.01em;
  display:block;
}
.kn-li-top > .kn-row > .kn-link{font-weight:600;}
.kn-row:hover .kn-link{color:var(--accent);}
.kn-expand{
  background:transparent;border:none;color:#aabbc8;cursor:pointer;
  width:28px;height:28px;border-radius:6px;font-size:.85rem;
  display:flex;align-items:center;justify-content:center;
  transition:transform .25s, color .15s, background .15s;
  flex-shrink:0;
}
.kn-expand:hover{background:rgba(232,160,32,.15);color:var(--accent);}
.kn-li.kn-open > .kn-row > .kn-expand{transform:rotate(180deg);color:var(--accent);}
.kn-sub{
  list-style:none;margin:0;padding:0;
  max-height:0;overflow:hidden;
  transition:max-height .3s ease-out;
}
.kn-li.kn-open > .kn-sub{max-height:1200px;}
.kn-li.kn-open > .kn-sub > .kn-li > .kn-row{font-size:.88rem;opacity:.92;}
.kn-li-admin{margin-top:.4rem;padding-top:.4rem;border-top:1px solid rgba(255,255,255,.08);}
.kn-li-admin .kn-link{color:var(--accent);font-size:.86rem;}

/* Tighter spacing on mobile */
@media (max-width:640px){
  nav.kebab-nav{padding:0 4%;height:62px;}
  nav.kebab-nav .logo{font-size:1.25rem;}
  .kebab-panel{right:4%;width:calc(100vw - 8%);}
}

false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">&#9881; Admin</a></li>\n  </ul>\n</nav>\n\n<!-- HERO -->\n<section class=\"hero\">\n  <!-- VIDEO BACKGROUND — replace src=\"\" with your MP4 URL or local file e.g. src=\"hero.mp4\" -->\n  <video class=\"hero-video\" id=\"hero-video\" autoplay muted loop playsinline\n    onerror=\"this.style.display='none'\">\n    <source src=\"\" type=\"video/mp4\"/>\n  </video>\n  <div class=\"hero-bg\"></div>\n  <div class=\"hero-grid\"></div>\n  <div class=\"hero-content\">\n    <div class=\"hero-eyebrow\" data-cms=\"hero.eyebrow\">Best Available Emission Control Technologies</div>\n    <h1><span data-cms=\"hero.h1\">Floating</span><em data-cms=\"hero.h1em\">Roof Tanks</em></h1>\n    <p class=\"hero-sub\" data-cms=\"hero.sub\">Rim Seals &amp; Seal Fittings &nbsp;·&nbsp; Lightning Protection &nbsp;·&nbsp; ESRAI GROUP</p>\n    <div class=\"hero-stats\">\n      <div class=\"hero-stat\"><div class=\"hero-stat-num\" data-cms=\"hero.stat1_num\">25+</div><div class=\"hero-stat-lbl\" data-cms=\"hero.stat1_lbl\">Years Experience</div></div>\n      <div class=\"hero-stat\"><div class=\"hero-stat-num\" data-cms=\"hero.stat2_num\">200+</div><div class=\"hero-stat-lbl\" data-cms=\"hero.stat2_lbl\">Installations</div></div>\n      <div class=\"hero-stat\"><div class=\"hero-stat-num\" data-cms=\"hero.stat3_num\">4</div><div class=\"hero-stat-lbl\" data-cms=\"hero.stat3_lbl\">Major Clients</div></div>\n      <div class=\"hero-stat\"><div class=\"hero-stat-num\" data-cms=\"hero.stat4_num\">100%</div><div class=\"hero-stat-lbl\" data-cms=\"hero.stat4_lbl\">API Compliant</div></div>\n    </div>\n    <div class=\"hero-cta\">\n      <a href=\"http://www.astspares.com\" class=\"btn-primary\" data-cms=\"hero.btn1_url\">Buy Spares →</a>\n      <a href=\"#products\" class=\"btn-outline\">Our Products</a>\n    </div>\n  </div>\n  <div class=\"hero-scroll\"><span>Scroll</span><div class=\"scroll-line\"></div></div>\n</section>\n\n\n\n<!-- PRODUCTS -->\n<section class=\"products\" id=\"products\">\n  <div class=\"section-label\" data-cms=\"products_section.label\">What We Offer</div>\n  <h2 class=\"section-title\" data-cms=\"products_section.title\">Emission Control Solutions</h2>\n  <p class=\"section-sub\">Multi-decadal experience in design, supply and installation of rim seals, seal fittings and lightning protection systems for floating roof tanks.</p>\n  <div class=\"section-divider\"></div>\n  <div class=\"products-grid\">\n    <div class=\"product-card\">\n      <div class=\"product-card-icon\" data-cms=\"products_section.card1_icon\">⬡</div>\n      <h3 data-cms=\"products_section.card1_title\">Rim Seals</h3>\n      <p data-cms=\"products_section.card1_text\">High-performance primary and secondary rim seals engineered for floating roof tanks. Minimise VOC vapour emissions while ensuring full regulatory compliance across all operating conditions and tank diameters.</p>\n      <a href=\"javascript:void(0)\" onclick=\"showPage(\\'rim-seals\\');return false;\" class=\"product-card-link\">Explore Rim Seals</a>\n    </div>\n    <div class=\"product-card\">\n      <div class=\"product-card-icon\" data-cms=\"products_section.card2_icon\">⚙</div>\n      <h3 data-cms=\"products_section.card2_title\">Seal Fittings</h3>\n      <p data-cms=\"products_section.card2_text\">Precision-engineered fittings designed to complement and support the full range of rim seal systems. Ensuring secure installation, structural integrity, and long-term operational reliability in all tank environments.</p>\n      <a href=\"javascript:void(0)\" onclick=\"showPage(\\'seal-fittings\\');return false;\" class=\"product-card-link\">Explore Fittings</a>\n    </div>\n    <div class=\"product-card\">\n      <div class=\"product-card-icon\" data-cms=\"products_section.card3_icon\">⚡</div>\n      <h3 data-cms=\"products_section.card3_title\">Lightning Protection</h3>\n      <p data-cms=\"products_section.card3_text\">Advanced lightning protection and bonding systems for external floating roof tanks. Protecting assets, personnel, and the environment from electrical hazards in accordance with industry safety standards.</p>\n      <a href=\"javascript:void(0)\" onclick=\"showPage(\\'lightning-protection\\');return false;\" class=\"product-card-link\">Explore Protection</a>\n    </div>\n  </div>\n</section>\n\n<!-- VALUES -->\n<section class=\"values\">\n  <div class=\"section-label\">Our Promise</div>\n  <h2 class=\"section-title\">What We Stand For</h2>\n  <div class=\"section-divider\"></div>\n  <div class=\"values-grid\">\n    <div class=\"value-item\">\n      <div class=\"value-icon-wrap\">📡</div>\n      <div class=\"value-text\">\n        <h4>Responsive</h4>\n        <p>Fast turnaround on all technical enquiries, on-site assessments, and spare parts dispatch — wherever your facility is located across India.</p>\n      </div>\n    </div>\n    <div class=\"value-item\">\n      <div class=\"value-icon-wrap\">🏆</div>\n      <div class=\"value-text\">\n        <h4>Quality</h4>\n        <p>All products manufactured to international standards with rigorous quality assurance at every stage, ensuring each component meets full specification.</p>\n      </div>\n    </div>\n    <div class=\"value-item\">\n      <div class=\"value-icon-wrap\">🔧</div>\n      <div class=\"value-text\">\n        <h4>Technical Support</h4>\n        <p>Dedicated engineering teams providing installation guidance, emissions compliance advice, and ongoing maintenance support throughout the product lifecycle.</p>\n      </div>\n    </div>\n    <div class=\"value-item\">\n      <div class=\"value-icon-wrap\">📋</div>\n      <div class=\"value-text\">\n        <h4>API Compliant</h4>\n        <p>All seal systems designed and supplied in full compliance with API MPMS Chapter 19.2 emission factor calculation standards for petroleum storage tanks.</p>\n      </div>\n    </div>\n    <div class=\"value-item\">\n      <div class=\"value-icon-wrap\">🛡</div>\n      <div class=\"value-text\">\n        <h4>Safety First</h4>\n        <p>Every product and installation follows strict safety protocols — protecting your workforce, assets, and surrounding environment from operational hazards.</p>\n      </div>\n    </div>\n    <div class=\"value-item\">\n      <div class=\"value-icon-wrap\">🌱</div>\n      <div class=\"value-text\">\n        <h4>Emission Reduction</h4>\n        <p>Our sealing solutions directly reduce VOC emissions from petroleum storage — contributing to cleaner operations and environmental regulatory compliance.</p>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- ABOUT -->\n<section class=\"about\">\n  <div class=\"about-bg-text\">ESRAI</div>\n  <div class=\"about-inner\">\n    <div class=\"about-left\">\n      <div class=\"section-label\">About Us</div>\n      <h2 class=\"section-title\">About Sealworks</h2>\n      <div class=\"section-divider\" style=\"margin-left:0\"></div>\n      <p>Sealworks is an <span class=\"accent-text\">ESRAI GROUP</span> Enterprise — a trusted name in floating roof tank rim seal systems with decades of specialised engineering expertise serving India's petroleum refining and petrochemical industry.</p>\n      <p>We combine deep domain knowledge, rigorous quality standards, and hands-on installation experience to deliver best-in-class emission control solutions to refineries, petrochemical plants, and bulk liquid storage terminals across the country.</p>\n      <p>Our products are designed around API standards and real-world operational requirements — giving you sealing systems that perform reliably over the long term.</p>\n      <a href=\"javascript:void(0)\" onclick=\"showPage(\\'about\\');return false;\" class=\"btn-outline\" style=\"margin-top:.5rem\">Learn More About Us</a>\n    </div>\n    <div class=\"about-right\">\n      <div class=\"about-stat\"><div class=\"about-stat-num\" data-cms=\"about_section.stat1_num\">25+</div><div class=\"about-stat-lbl\" data-cms=\"about_section.stat1_lbl\">Years in Industry</div></div>\n      <div class=\"about-stat\"><div class=\"about-stat-num\" data-cms=\"about_section.stat2_num\">200+</div><div class=\"about-stat-lbl\" data-cms=\"about_section.stat2_lbl\">Tank Installations</div></div>\n      <div class=\"about-stat\"><div class=\"about-stat-num\" data-cms=\"about_section.stat3_num\">5+</div><div class=\"about-stat-lbl\" data-cms=\"about_section.stat3_lbl\">Seal Product Types</div></div>\n      <div class=\"about-stat\"><div class=\"about-stat-num\" data-cms=\"about_section.stat4_num\">100%</div><div class=\"about-stat-lbl\" data-cms=\"about_section.stat4_lbl\">API Compliance</div></div>\n    </div>\n  </div>\n</section>\n\n<!-- CLIENTS -->\n<section class=\"clients\">\n  <div class=\"section-label\">Who We Serve</div>\n  <h2 class=\"section-title\">Our Clients</h2>\n  <p class=\"section-sub\">Trusted by India's leading petroleum refiners, petrochemical manufacturers, and engineering contractors.</p>\n  <div class=\"section-divider\"></div>\n  <div class=\"clients-grid\">\n    <div class=\"client-card\">\n      <img src=\"https://petrodek.com/wp-content/uploads/2026/01/269711-300x300.jpg\" alt=\"Reliance Industries Limited\" class=\"client-logo\"/>\n      <h4>Reliance Industries Limited</h4>\n      <div class=\"client-country\">India</div>\n      <p>One of India's largest integrated energy and petrochemicals companies, operating extensive petroleum storage and processing infrastructure nationwide.</p>\n    </div>\n    <div class=\"client-card\">\n      <img src=\"https://petrodek.com/wp-content/uploads/2026/01/OIP.webp\" alt=\"Nayara Energy Limited\" class=\"client-logo\"/>\n      <h4>Nayara Energy Limited</h4>\n      <div class=\"client-country\">India</div>\n      <p>Operators of one of India's largest single-location refineries at Vadinar, requiring precision emission control solutions at significant scale.</p>\n    </div>\n    <div class=\"client-card\">\n      <img src=\"https://petrodek.com/wp-content/uploads/2026/01/BnR_logo_png-240x300.png\" alt=\"Bridge & Roof Co.\" class=\"client-logo\"/>\n      <h4>Bridge &amp; Roof Co. (India) Ltd.</h4>\n      <div class=\"client-country\">India</div>\n      <p>A leading construction and engineering EPC contractor with extensive experience in petroleum and petrochemical storage tank projects across India.</p>\n    </div>\n    <div class=\"client-card\">\n      <img src=\"https://petrodek.com/wp-content/uploads/2026/01/images.png\" alt=\"Haldia Petrochemicals Limited\" class=\"client-logo\"/>\n      <h4>Haldia Petrochemicals Limited</h4>\n      <div class=\"client-country\">India</div>\n      <p>A major petrochemical manufacturer at Haldia requiring best-available emission control technologies for their extensive floating roof storage infrastructure.</p>\n    </div>\n  </div>\n</section>\n\n<!-- CTA BANNER -->\n<section class=\"cta-banner\">\n  <div class=\"cta-banner-inner\">\n    <div class=\"cta-tag\" data-cms=\"cta_section.tag\">Emissions Calculator</div>\n    <h2 data-cms=\"cta_section.title\">Connect to Tank Protocol</h2>\n    <p data-cms=\"cta_section.sub\">Calculate VOC emissions from floating roof tanks based on seal type, tank geometry, and operational parameters.</p>\n    <div class=\"cta-features\">\n      <span class=\"cta-feat\">API 19.2 Methodology</span>\n      <span class=\"cta-feat\">All Seal Types</span>\n      <span class=\"cta-feat\">Instant Results</span>\n      <span class=\"cta-feat\">Export Reports</span>\n    </div>\n    <a href=\"http://www.tankprotocol.com\" class=\"btn-primary\">Connect &amp; Join →</a>\n  </div>\n</section>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\" data-cms=\"footer_section.tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\">Buy Spares</a></li>\n        <li><a href=\"http://www.tankprotocol.com\">Tank Protocol</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Connect</div>\n      <ul>\n        <li><a href=\"https://facebook.com\">Facebook</a></li>\n        <li><a href=\"https://twitter.com\">Twitter / X</a></li>\n        <li><a href=\"https://youtube.com\">YouTube</a></li>\n        <li><a href=\"https://instagram.com\">Instagram</a></li>\n        <li><a href=\"https://pinterest.com\">Pinterest</a></li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\" data-cms=\"footer_section.copy\">&copy; 2026 Petrodek Systems &middot; All Rights Reserved &middot; An ESRAI GROUP Enterprise</div>\n    <div class=\"social-links\">\n      <a href=\"https://facebook.com\" title=\"Facebook\">f</a>\n      <a href=\"https://twitter.com\" title=\"Twitter\">&#120143;</a>\n      <a href=\"https://youtube.com\" title=\"YouTube\">&#9654;</a>\n      <a href=\"https://instagram.com\" title=\"Instagram\">&#9678;</a>\n    </div>\n  </div>\n</footer>"},
