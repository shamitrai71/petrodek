var _ilCb = null, _ilSelId = null, _ilSelUrl = null;

function openImgLibModal(cb) {
  _ilCb = cb || null; _ilSelId = null; _ilSelUrl = null;
  var m = document.getElementById('imglib-modal'); if (!m) return;
  m.classList.add('open');
  var s = document.getElementById('imglib-search'); if (s) s.value = '';
  var btn = document.getElementById('imglib-insert-btn'); if (btn) btn.disabled = true;
  var prev = document.getElementById('imglib-sel-preview');
  if (prev) { prev.innerHTML = ''; var sp=document.createElement('span'); sp.style.color='#aabbc8'; sp.textContent='No image selected'; prev.appendChild(sp); }
  renderImgLibGrid('');
}

function closeImgLibModal() {
  var m = document.getElementById('imglib-modal'); if (m) m.classList.remove('open');
  _ilCb = null;
}

function renderImgLibGrid(q) {
  var grid = document.getElementById('imglib-grid'); if (!grid) return;
  q = (q || '').toLowerCase();
  var d = cmsGet();
  var imgs = (d.images || []).filter(function(i){ return !q || i.name.toLowerCase().indexOf(q) >= 0; });
  grid.innerHTML = '';
  if (!imgs.length) {
    var em = document.createElement('div'); em.className = 'imglib-empty';
    em.innerHTML = '<div class="imglib-empty-ic">\uD83D\uDDBC\uFE0F</div><p>No images yet.<br>Upload above or go to <strong>Admin \u2192 Images</strong>.</p>';
    grid.appendChild(em); return;
  }
  imgs.forEach(function(img) {
    var url = resolveImgUrl(img);
    var item = document.createElement('div'); item.className = 'imglib-item'; item.dataset.id = img.id;

    if (img.local) { var lb=document.createElement('span'); lb.className='imglib-local-badge'; lb.textContent='LOCAL'; item.appendChild(lb); }

    var imgEl = document.createElement('img'); imgEl.alt = img.name; imgEl.style.cssText='background:#eee';
    if (url) imgEl.src = url;
    item.appendChild(imgEl);

    var nm = document.createElement('div'); nm.className='imglib-item-name'; nm.textContent = img.name;
    item.appendChild(nm);

    var delb = document.createElement('button'); delb.className='imglib-item-del'; delb.textContent='\u00d7';
    delb.onclick = function(e){ e.stopPropagation(); libDeleteImg(img.id); };
    item.appendChild(delb);

    item.addEventListener('click', function() {
      document.querySelectorAll('#imglib-grid .imglib-item').forEach(function(el){ el.classList.remove('selected'); });
      item.classList.add('selected');
      _ilSelId = img.id; _ilSelUrl = url;
      var btn = document.getElementById('imglib-insert-btn'); if (btn) btn.disabled = false;
      var prev = document.getElementById('imglib-sel-preview');
      if (prev) {
        prev.innerHTML = '';
        var pi=document.createElement('img'); pi.src=url; pi.style.cssText='width:38px;height:38px;object-fit:cover;border-radius:4px;border:1px solid #dde4ed;background:#eee'; prev.appendChild(pi);
        var ps=document.createElement('span'); ps.textContent=img.name; ps.style.cssText='font-size:12px;color:#445;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis'; prev.appendChild(ps);
      }
    });
    grid.appendChild(item);
  });
}

function handleImgLibModalUpload(inp) {
  Array.from(inp.files || []).forEach(function(file) {
    if (file.size > 8*1024*1024) { showToast(file.name+' exceeds 8MB','warn'); return; }

var _adminSection = 'dashboard';

function adminGo(sec) {
  _adminSection = sec;
  // Update nav highlight
  document.querySelectorAll('#adm-nav .anl').forEach(function(a){
    var match = a.getAttribute('data-sec') === sec;
    a.classList.toggle('active', match);
    a.style.background = ''; a.style.color = '';
  });
  // Section titles
  var titles = {
    dashboard:'Dashboard', hero:'Hero Banner', 'products-sec':'Products Section',
    'about-sec':'About Section', 'cta-sec':'CTA Banner', 'footer-sec':'Footer',
    'prod-hub':'Product Pages', pages:'Pages', blog:'Blog Articles',
    menus:'Menu Builder', images:'Image Library', videos:'Videos',
    'page-builder':'Page Builder', widgets:'Widgets', links:'Links Manager',
    'cta-buttons':'CTA Buttons', settings:'Settings'
  };
  var tb = document.getElementById('adm-title');
  if(tb) tb.textContent = titles[sec] || sec;
  // Inject content
  var el = document.getElementById('adm-content');
  if(!el) return;
  var html = adminSectionHTML(sec);
  el.innerHTML = html;
  // Post-render data load
  adminSectionInit(sec);
}

function adminSectionInit(sec) {
  try {
    if(sec==='dashboard') { updateDashCounts(); buildDashSitePages(); }
    if(sec==='hero') { loadFields(); }
    if(sec==='products-sec') { loadFields(); renderProdCards(); }
    if(sec==='about-sec') { loadFields(); }
    if(sec==='cta-sec') { loadFields(); }
    if(sec==='footer-sec') { loadFields(); }
    if(sec==='prod-hub') { renderProdCards(); loadProdPages(); }
    if(sec==='pages') { renderPages(); }
    if(sec==='blog') { renderBlog(); }
    if(sec==='menus') { renderMenuList(); renderMenuTree(); }
    if(sec==='images') { renderImages(); }
    if(sec==='videos') { renderVideos(); }
    if(sec==='page-builder') { initPageBuilder(); }
    if(sec==='widgets') { renderWidgets(); renderWidgetLibrary(); }
    if(sec==='links') { renderLinks(); }
    if(sec==='cta-buttons') { renderCtaBtns(); }
    if(sec==='settings') { loadSettingsSection(); }
    if(sec.indexOf('prod-')=== 0 && sec !== 'prod-hub') {
      var pid = sec.replace('prod-','');
      loadProdPageSection(pid);
    }
    updateSbBadges();

function pbLoadPage(slug) {
  if(!slug) return;
  var iframe=document.getElementById('pb-preview-iframe');
  var ph=document.getElementById('pb-preview-ph');
  if(iframe&&ph){
    ph.style.display='none'; iframe.style.display='block';
    if(typeof PAGES!=='undefined'&&PAGES[slug]){
      var st=document.querySelector('style');
      var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+
        (st?st.outerHTML:'')+'</head><body style="margin:0;">'+PAGES[slug].html+'</body></html>';
      var blob=new Blob([html],{type:'text/html'});
      if(iframe._burl)URL.revokeObjectURL(iframe._burl);
      iframe._burl=URL.createObjectURL(blob);
      iframe.src=iframe._burl;
    } else {
      iframe.srcdoc='<html><body style="padding:2rem;font-family:sans-serif;color:#6677aa;text-align:center;"><p>Built-in page preview<br>not available in builder.</p></body></html>';
    }
  }
  var d = cmsGet();
  var layouts = d.page_layouts || {};
  var canvas = document.getElementById('pb-canvas');
  if(!canvas) return;
  pbClear();
  var layout = layouts[slug] || [];
  layout.forEach(function(row) {
    var r = pbAddRow(row.cols, true);
    row.columns.forEach(function(col, ci) {
      col.widgets.forEach(function(w) {
        if(r && r.children[ci]) {
          var cell = r.children[ci];
          pbAddWidgetToCell(cell, w);
        }
      });
    });
  });
  pbCheckEmpty();
  // Populate page builder widget lib
  var wlib = document.getElementById('pb-widget-lib');
  if(wlib) {
    var widgets = (d.widgets||[]);
    if(!widgets.length) { wlib.innerHTML='<p style="font-size:.8rem;color:#aabbc8;">No widgets added yet. Go to <a onclick="adminGo(\'widgets\')" href="javascript:void(0)" style="color:#e8a020;">Widgets</a> to add some.</p>'; return; }
    wlib.innerHTML = widgets.map(function(w){
      return '<div draggable="true" ondragstart="pbDragStart(event,\''+w.name+'\',\''+w.icon+'\',\''+w.id+'\')" style="border:1px solid #e2e8f0;border-radius:6px;padding:.7rem;background:#fff;cursor:grab;display:flex;align-items:center;gap:.5rem;">' +
        '<span style="font-size:1.2rem;">'+w.icon+'</span><div style="font-size:.78rem;font-weight:600;">'+w.name+'</div></div>';
    }).join('');
  }
}

function pbAddWidgetToCell(cell, w) {
  cell.style.minHeight = 'auto';
  var tag = document.createElement('div');
  tag.style.cssText = 'background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:.5rem .7rem;font-size:.78rem;display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem;';
  tag.innerHTML = (w.icon||'⬡')+' <span>'+w.name+'</span>' +
    '<button onclick="pbRemoveWidget(this)" style="margin-left:auto;background:none;border:none;color:#aaa;cursor:pointer;font-size:.9rem;">×</button>';
  tag.dataset.wid = w.id || w.name;
  tag.dataset.wname = w.name;
  tag.dataset.wicon = w.icon || '⬡';
  cell.appendChild(tag);
}

function openImgUrlModal() {
  var m = document.getElementById('modal-imgurl');
  if (m) { m.style.display = 'flex'; m.style.alignItems = 'center'; m.style.justifyContent = 'center'; }
  else { showToast('URL modal not found','warn'); }
}

async function doLogin(){
  var eEl = document.getElementById('adm-em') || document.getElementById('lem');
  var pEl = document.getElementById('adm-pw') || document.getElementById('lpw');
  var errEl = document.getElementById('adm-err') || document.getElementById('lerr');
  if(errEl) errEl.style.display='none';
  var email = eEl ? eEl.value.trim() : '';
  var pass  = pEl ? pEl.value : '';
  if(!email||!pass){ if(errEl){errEl.style.display='block';errEl.textContent='Please enter email and password.';} return; }

  // Show loading state
  var btn = document.getElementById('adm-login-btn') || document.querySelector('#adm-login button');
  var origText = btn ? btn.textContent : '';
  if(btn){ btn.disabled=true; btn.textContent='Signing in…'; }

  try {
    var r = await fetch(API_BASE + '/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:pass})
    });
    var data = await r.json();
    if(!r.ok || !data.token){
      if(errEl){errEl.style.display='block';errEl.textContent='Invalid email or password.';}
      if(btn){ btn.disabled=false; btn.textContent=origText; }
      return;
    }
    _setToken(data.token);
    // Load fresh CMS data now that we have auth
    await cmsLoadFromServer();
    var login = document.getElementById('adm-login');
    if(login) login.style.display='none';
    var shell = document.getElementById('adm-shell');
    if(shell){ shell.style.display='flex'; }
    try{sessionStorage.setItem('petrodek_admin_auth','1');}catch(x){}
    if(typeof setAdminMode==='function') setAdminMode(true);
    if(typeof adminGo==='function') adminGo('dashboard');
  } catch(err) {
    console.error('Login error:', err);
    if(errEl){errEl.style.display='block';errEl.textContent='Login failed. Please try again.';}
    if(btn){ btn.disabled=false; btn.textContent=origText; }
  }

function doLogout(){sessionStorage.removeItem('petrodek_admin_auth');_setToken(null);setAdminMode(false);(function(){var s=document.getElementById('adm-shell');if(s)s.style.display='none';})();(function(){var l=document.getElementById('adm-login');if(l)l.style.display='flex';})();document.getElementById('lem').value='';document.getElementById('lpw').value='';document.getElementById('lerr').style.display='none';}

let editingPageId=null;
function openPageForm(id, parentId){
  editingPageId=id||null;
  var _pf=document.getElementById('page-form');if(!_pf)return showToast('Navigate to Pages section first','warn');_pf.style.display='block';
  document.getElementById('pf-title').textContent=id?'Edit Page':'New Page';
  document.getElementById('pf-save-btn').textContent=id?'💾 Update Page':'💾 Save Page';
  // populate parent dropdown
  const sel=document.getElementById('pf_parent');sel.innerHTML='<option value="">None (top level)</option>';
  flattenPages(cmsGet().pages||[]).forEach(p=>{if(p.id!=id){const o=document.createElement('option');o.value=p.id;o.textContent=p.title;sel.appendChild(o);}});
  if(id){
    const p=findPage(cmsGet().pages||[],id);
    if(p){sf('pf_title',p.title);sf('pf_slug',p.slug);sf('pf_status',p.status||'Published');sf('pf_template',p.template||'Default');sf('pf_date',p.date||'');sf('pf_img',p.img||'');var sc=p.content||'';if(!sc&&typeof PAGES!=='undefined'&&PAGES[p.slug||p.id]){sc=PAGES[p.slug||p.id].html||'';}document.getElementById('pf_content').innerHTML=sc||'Start writing...';}
  } else {
    sf('pf_title','');sf('pf_slug','');sf('pf_status','Draft');sf('pf_template','Default');sf('pf_date','');sf('pf_img','');document.getElementById('pf_content').innerHTML='Start writing...';
  }
  document.getElementById('page-form').scrollIntoView({behavior:'smooth'});
}
function closePageForm(){var pf=document.getElementById('page-form');if(pf)pf.style.display='none';editingPageId=null;}
function savePage(){
  const title=gf('pf_title').trim();if(!title){showToast('Enter a page title','warn');return;}
  const d=cmsGet();
  const page={id:editingPageId||Date.now(),title,slug:gf('pf_slug')||title.toLowerCase().replace(/\s+/g,'-')+'.html',status:gf('pf_status'),template:gf('pf_template'),parent:parseInt(gf('pf_parent'))||0,date:gf('pf_date')||new Date().toISOString().slice(0,10),img:gf('pf_img'),content:document.getElementById('pf_content').innerHTML,children:[]};
  if(editingPageId){updatePageInTree(d.pages,editingPageId,page);}
  else{
    const parentId=parseInt(gf('pf_parent'))||0;
    if(parentId){insertIntoParent(d.pages,parentId,page);}else{d.pages.push(page);}
  }
  cmsSet(d);closePageForm();renderPages();updateDashCounts();showToast(editingPageId?'Page updated':'Page created');
}
function publishPage(){document.getElementById('pf_status').value='Published';savePage();showToast('Page published!');}
function deletePage(id){if(!confirm('Delete this page?'))return;const d=cmsGet();d.pages=removePage(d.pages,id);cmsSet(d);renderPages();updateDashCounts();showToast('Page deleted');}
function findPage(pages,id){for(const p of pages){if(p.id==id)return p;if(p.children){const f=findPage(p.children,id);if(f)return f;}}return null;}
function removePage(pages,id){return pages.filter(p=>p.id!=id).map(p=>({...p,children:removePage(p.children||[],id)}));}
function updatePageInTree(pages,id,updated){for(let i=0;i<pages.length;i++){if(pages[i].id==id){pages[i]={...updated,children:pages[i].children||[]};return true;}if(pages[i].children&&updatePageInTree(pages[i].children,id,updated))return true;}return false;}
function insertIntoParent(pages,parentId,page){for(const p of pages){if(p.id==parentId){if(!p.children)p.children=[];p.children.push(page);return true;}if(p.children&&insertIntoParent(p.children,parentId,page))return true;}return false;}

function openBuiltinPageEditor(pageId,pageTitle){
  editingPageId=null;
  var _pf=document.getElementById('page-form');if(!_pf)return showToast('Navigate to Pages section first','warn');_pf.style.display='block';
  document.getElementById('pf-title').textContent='Editing: '+pageTitle;
  document.getElementById('pf-save-btn').textContent='Save Changes';
  var tEl=document.getElementById('pf_title');if(tEl)tEl.value=pageTitle;
  var sEl=document.getElementById('pf_slug');if(sEl)sEl.value=pageId;
  var stEl=document.getElementById('pf_status');if(stEl)stEl.value='Published';
  var tmEl=document.getElementById('pf_template');if(tmEl)tmEl.value='Default';
  var cEl=document.getElementById('pf_content');
  if(cEl&&typeof PAGES!=='undefined'&&PAGES[pageId]){
    var full=PAGES[pageId].html||'';
    var s=full.indexOf('<div class="page-hero"');
    if(s<0)s=full.indexOf('<div class="page-body"');
    if(s<0)s=full.indexOf('<section ');
    var e=full.lastIndexOf('<footer');
    if(s>=0&&e>s){cEl.innerHTML=full.substring(s,e);}
    else{cEl.innerHTML=full;}
    showToast('Page content loaded into editor','ok');
  } else {cEl.innerHTML='Start writing...';}
  var pfEl=document.getElementById('page-form');
  if(pfEl)pfEl.scrollIntoView({behavior:'smooth'});
}
function renderPageNodes(pages,container,level){
  pages.forEach(page=>{
    const item=document.createElement('div');item.className='pg-item';item.style.marginLeft=level?'1.2rem':'0';
    const statusColor={published:'bg',draft:'ba',private:'br'}[page.status?.toLowerCase()]||'ba';
    item.innerHTML=`<div class="pg-hd" onclick="togglePgChildren(this)">
      ${page.children&&page.children.length?'<span style="color:var(--mid);margin-right:.3rem">▸</span>':'<span style="width:1rem;display:inline-block"></span>'}
      <span class="pg-nm">${page.title}</span>
      <span class="pg-meta">${page.slug}</span>
      <span class="b ${statusColor}" style="margin:0 .5rem">${page.status||'Draft'}</span>
      <button class="btn btn-g btn-xs" onclick="event.stopPropagation();openPageForm(${page.id})">Edit</button>
      <a href="${page.slug}" target="_blank" class="btn btn-b btn-xs" style="text-decoration:none" onclick="event.stopPropagation()">View</a>
      <button class="btn btn-d btn-xs" onclick="event.stopPropagation();deletePage(${page.id})">Del</button>
    </div>`;
    container.appendChild(item);
    if(page.children&&page.children.length){
      const ch=document.createElement('div');ch.className='pg-children';ch.style.display='none';
      renderPageNodes(page.children,ch,level+1);
      item.appendChild(ch);
    }
  });

function renderMenuItem(item,menu){
  const wrap=document.createElement('div');wrap.className='menu-item';
  const indent=item.level*18;
  const canAddChild=item.level<MAX_LEVEL;
  const hasChildren=item.children&&item.children.length>0;

  wrap.innerHTML=`
    <div class="mi-hd" style="padding-left:calc(.8rem + ${indent}px)">
      <span class="mi-drag">⠿</span>
      <span class="mi-lbl" onclick="toggleMiEdit(this.closest('.menu-item'))">${item.label}</span>
      <span class="mi-type">${item.type}</span>
      <span class="mi-lvl">L${item.level+1}</span>
      <div style="display:flex;gap:3px;flex-shrink:0">
        ${hasChildren?`<button class="btn btn-g btn-xs" onclick="toggleChildren(${item.id},${menu.id})">▸${item.open?'▲':'▼'}</button>`:''}
        ${canAddChild?`<button class="btn btn-b btn-xs" onclick="addChild(${item.id},${menu.id})">▸+ Child</button>`:''}
        <button class="btn btn-g btn-xs" onclick="toggleMiEdit(this.closest('.menu-item'))">✎ Edit</button>
        <button class="btn btn-d btn-xs" onclick="removeMenuItem(${item.id},${menu.id})">✕</button>
      </div>
    </div>
    <div class="mi-edit" id="mie-${item.id}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.55rem 0">
        <div class="f"><label>Label</label><input type="text" value="${item.label}" onchange="updateMiLabel(${item.id},${menu.id},this.value)"/></div>
        <div class="f"><label>URL</label><input type="text" value="${item.url||''}" onchange="updateMiUrl(${item.id},${menu.id},this.value)"/></div>
        <div class="f"><label>Open In</label><select onchange="updateMiTarget(${item.id},${menu.id},this.value)"><option value="_self" ${item.target!=='_blank'?'selected':''}>Same Tab</option><option value="_blank" ${item.target==='_blank'?'selected':''}>New Tab</option></select></div>
        <div class="f"><label>CSS Class</label><input type="text" value="${item.cssClass||''}" placeholder="btn-primary"/></div>
      </div>
    </div>
    <div class="mi-children" id="mic-${item.id}" style="display:${item.open?'block':'none'}"></div>
  `;

  if(hasChildren){
    const ch=wrap.querySelector(`#mic-${item.id}`);
    item.children.forEach(c=>ch.appendChild(renderMenuItem(c,menu)));
  }
  return wrap;
}

function toggleMiEdit(item){const ed=item.querySelector('.mi-edit');ed.classList.toggle('open');}
function toggleChildren(id,menuId){const d=cmsGet();const m=d.menus.find(x=>x.id===menuId);if(!m)return;const item=findMenuItem(m.items,id);if(item){item.open=!item.open;cmsSet(d);renderMenuTree();}}

function collapseItems(items){items.forEach(i=>{i.open=false;if(i.children)collapseItems(i.children);});}

function findMenuItem(items,id){for(const i of items){if(i.id===id)return i;if(i.children){const f=findMenuItem(i.children,id);if(f)return f;}}return null;}
function updateMiLabel(id,menuId,val){const d=cmsGet();const m=d.menus.find(x=>x.id===menuId);if(!m)return;const item=findMenuItem(m.items,id);if(item){item.label=val;cmsSet(d);}}
function updateMiUrl(id,menuId,val){const d=cmsGet();const m=d.menus.find(x=>x.id===menuId);if(!m)return;const item=findMenuItem(m.items,id);if(item){item.url=val;cmsSet(d);}}
function updateMiTarget(id,menuId,val){const d=cmsGet();const m=d.menus.find(x=>x.id===menuId);if(!m)return;const item=findMenuItem(m.items,id);if(item){item.target=val;cmsSet(d);}}

function addMenuItem(type){
  const d=cmsGet();const menu=d.menus.find(m=>m.id===activeMenuId);if(!menu)return;
  let label='New Item',url='#';
  if(type==='page'){const sel=gf('mi-page-sel');label=gf('mi-page-lbl')||sel;url=PAGE_URLS[sel]||'#';}
  else if(type==='custom'){label=gf('mi-cl')||'New Link';url=gf('mi-cu')||'#';}
  else if(type==='cat'){label=gf('mi-cat-sel');url='#';}
  menu.items.push({id:Date.now(),label,type,url,level:0,open:false,children:[],target:type==='custom'?gf('mi-ct'):'_self'});
  cmsSet(d);renderMenuTree();showToast(label+' added to menu');
}

function addChild(parentId,menuId){
  const d=cmsGet();const menu=d.menus.find(m=>m.id===menuId);if(!menu)return;
  function tryInsert(items){
    for(const item of items){
      if(item.id===parentId){
        if(item.level>=MAX_LEVEL){showToast('Maximum 4 levels reached','warn');return true;}
        if(!item.children)item.children=[];
        item.children.push({id:Date.now(),label:'New Sub Item',type:'custom',url:'#',level:item.level+1,open:false,children:[],target:'_self'});
        item.open=true;return true;
      }
      if(item.children&&tryInsert(item.children))return true;
    }
    return false;
  }
  tryInsert(menu.items);cmsSet(d);renderMenuTree();showToast('Sub-item added');
}

function removeMenuItem(id,menuId){
  const d=cmsGet();const menu=d.menus.find(m=>m.id===menuId);if(!menu)return;
  function rm(items){return items.filter(i=>i.id!==id).map(i=>({...i,children:rm(i.children||[])}));}
  menu.items=rm(menu.items);cmsSet(d);renderMenuTree();showToast('Item removed');
}

function prevHeroVid(url){
  if(!url || !url.trim()){
    var w0=document.getElementById('hvid-preview-wrap');if(w0)w0.style.display='none';
    return;
  }
  const wrap=document.getElementById('hvid-preview-wrap');
  if(!wrap) return;
  const vidEl=document.getElementById('hvid-preview-video');
  const iframeEl=document.getElementById('hvid-preview-iframe');
  const msgEl=document.getElementById('hvid-preview-msg');
  const type=gf('h_vid_type');

  wrap.style.display='block';
  vidEl.style.display='none';
  iframeEl.style.display='none';
  msgEl.style.display='none';

  if(type==='youtube' || url.includes('youtube.com') || url.includes('youtu.be')){
    const m=url.match(/(?:v=|youtu\.be\/)([^&?\/]+)/);
    if(m){
      iframeEl.src='https://www.youtube.com/embed/'+m[1]+'?autoplay=1&mute=1&loop=1&playlist='+m[1]+'&controls=0&modestbranding=1';
      iframeEl.style.display='block';
    } else {
      msgEl.textContent='Invalid YouTube URL';
      msgEl.style.display='flex';
    }
  } else if(type==='vimeo' || url.includes('vimeo.com')){
    const m=url.match(/vimeo\.com\/(\d+)/);
    if(m){
      iframeEl.src='https://player.vimeo.com/video/'+m[1]+'?autoplay=1&muted=1&loop=1&background=1';
      iframeEl.style.display='block';
    } else {
      msgEl.textContent='Invalid Vimeo URL';
      msgEl.style.display='flex';
    }
  } else {
    // Direct MP4/WebM
    vidEl.src=url;
    vidEl.style.display='block';
    vidEl.muted=true;vidEl.loop=true;
    vidEl.play().catch(()=>{
      vidEl.style.display='none';
      msgEl.textContent='Cannot preview — URL may be a local file. It will work on the site page.';
      msgEl.style.display='flex';
    });
  }
}

function onVidTypeChange(type){
  // Re-trigger preview when type changes
  const url=gf('h_vid_url').trim();
  if(url) prevHeroVid(url);
}

function handleHeroVidUpload(inp){
  if(!inp.files||!inp.files[0]) return;
  const file=inp.files[0];
  if(file.size>50*1024*1024){
    showToast('File is '+Math.round(file.size/1024/1024)+'MB. Max 50MB recommended. For larger files use URL tab.','warn');
  }
  if(file.size>5*1024*1024){
    showToast('Large file ('+Math.round(file.size/1024/1024)+'MB) — storing as data URL may be slow. Consider hosting externally.','warn');
  }
  const reader=new FileReader();
  reader.onload=function(e){
    sf('h_vid_url', e.target.result);
    sf('h_vid_type','mp4');
    prevHeroVid(e.target.result);
    showToast('Video loaded: '+file.name+'. Click Save Video Settings to apply.');
  };
  reader.onerror=function(){showToast('Failed to read file','bad');};
  reader.readAsDataURL(file);
  inp.value='';
}

// Write video config into the site page localStorage so petrodek.html picks it up
function applyHeroVideoToPage(url, type, auto, loop, overlay){
  // Apply immediately to live page without requiring reload
  try {
    var heroVidEl = document.getElementById('hero-video');
    if (!heroVidEl) return;
    if (!url || !url.trim()) {
      // Clear video
      var src = heroVidEl.querySelector('source');
      if (src) { src.setAttribute('src',''); }
      heroVidEl.pause(); heroVidEl.load();
      heroVidEl.style.display = 'none';
      var iframe = document.getElementById('hero-video-iframe');
      if (iframe) iframe.remove();
      return;
    }
    var isYT = url.indexOf('youtube') >= 0 || url.indexOf('youtu.be') >= 0;
    var isVimeo = url.indexOf('vimeo') >= 0;
    if (isYT || isVimeo) {
      heroVidEl.style.display = 'none';
      var existing = document.getElementById('hero-video-iframe');
      if (!existing) {
        existing = document.createElement('iframe');
        existing.id = 'hero-video-iframe';
        existing.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;border:none;';
        existing.allow = 'autoplay; muted';
        heroVidEl.parentNode.insertBefore(existing, heroVidEl);
      }
      if (isYT) {
        var ytm = url.match(/(?:v=|youtu\.be\/)([^&?\/]+)/);
        if (ytm) existing.src = 'https://www.youtube.com/embed/' + ytm[1] + '?autoplay=1&mute=1&loop=1&playlist=' + ytm[1] + '&controls=0&modestbranding=1&playsinline=1';
      } else {
        var vim = url.match(/vimeo\.com\/(\d+)/);
        if (vim) existing.src = 'https://player.vimeo.com/video/' + vim[1] + '?autoplay=1&muted=1&loop=1&background=1';
      }
    } else {
      // MP4/WebM direct
      var ifrEl = document.getElementById('hero-video-iframe');
      if (ifrEl) ifrEl.remove();
      var src = heroVidEl.querySelector('source');
      if (src) {
        src.setAttribute('src', url);
        src.setAttribute('type', type === 'webm' ? 'video/webm' : 'video/mp4');
      }
      heroVidEl.muted = true;
      heroVidEl.loop = loop !== '0';
      heroVidEl.load();
      heroVidEl.style.display = '';
      if (auto !== '0') heroVidEl.play().catch(function(){});
    }
  } catch(e) { console.warn('applyHeroVideoToPage error:', e); }
}

// Tab switching (new — for atab class)
function atab(btn, paneId) {
  // Find the tab container - walk up until we find a node containing both .atab and .atpane
  var par = btn.closest('.acard-body,.acard,.apane,.amodal');
  if (!par) {
    // Walk up the tree to find a container that has both tabs and panes
    var el = btn.parentElement;
    while(el && el !== document.body) {
      if(el.querySelector('.atab') && el.querySelector('.atpane')) { par = el; break; }
      el = el.parentElement;
    }
  }
  if(!par) par = btn.parentElement.parentElement;
  par.querySelectorAll('.atab').forEach(function(t) {
    t.classList.remove('on');
    t.style.borderBottomColor = 'transparent';
    t.style.color = '#6677aa';
  });
  par.querySelectorAll('.atpane').forEach(function(t) {
    t.classList.remove('on');
    t.style.display = 'none';
  });
  btn.classList.add('on');
  btn.style.borderBottomColor = '#e8a020';
  btn.style.color = '#0a1628';
  var pane = document.getElementById(paneId);
  if(pane) { pane.classList.add('on'); pane.style.display = 'block'; }
}

var pbDragWidget = null;

function pbDragStart(e, wid) {
  pbDragWidget = wid;
  e.dataTransfer.effectAllowed = 'copy';
}

function pbAddRow(cols) {
  cols = cols || 1;
  var canvas = document.getElementById('pb-canvas');
  var empty = canvas.querySelector('.pb-empty');
  if (empty) empty.remove();
  var row = document.createElement('div');
  row.className = 'pb-row';
  row.style.gridTemplateColumns = Array(cols).fill('1fr').join(' ');
  row.setAttribute('data-cols', cols);
  var toolbar = document.createElement('div');
  toolbar.className = 'pb-row-toolbar';
  toolbar.innerHTML = '<span class="pb-row-label">Row — ' + cols + ' col' + (cols > 1 ? 's' : '') + '</span>' +
    '<button class="abtn abtn-ghost abtn-xs" onclick="this.closest(\'.pb-row\').remove();pbCheckEmpty()">✕ Remove Row</button>';
  row.appendChild(toolbar);
  for (var i = 0; i < cols; i++) {
    var col = document.createElement('div');
    col.className = 'pb-col';
    col.setAttribute('data-col', i);
    col.innerHTML = '<span style="font-size:11px;color:var(--dim)">Drop widget here</span>';
    col.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('over'); });
    col.addEventListener('dragleave', function() { this.classList.remove('over'); });
    col.addEventListener('drop', function(e) {
      e.preventDefault(); this.classList.remove('over');
      if (pbDragWidget) pbDropInCol(this, pbDragWidget);
    });
    row.appendChild(col);
  }
  canvas.appendChild(row);
}

function pbDropInCol(col, wid) {
  var names = {
    'hero':'Hero Banner','text':'Text Block','image':'Image Block','gallery':'Gallery',
    'video':'Video Embed','cta':'CTA Banner','stats':'Stats Counter','cards':'Card Grid',
    'faq':'FAQ Accordion','contact':'Contact Form','spacer':'Spacer','divider':'Divider'
  };
  var icons = {
    'hero':'🏠','text':'📝','image':'🖼','gallery':'🗂','video':'▶','cta':'🎯',
    'stats':'📊','cards':'⬡','faq':'❓','contact':'📬','spacer':'⬜','divider':'—'
  };
  col.innerHTML = '';
  col.classList.add('has-widget');
  var w = document.createElement('div');
  w.className = 'pb-widget';
  w.setAttribute('data-widget', wid);
  w.innerHTML = '<div class="pb-w-ic">' + (icons[wid]||'⬡') + '</div>' +
    '<div class="pb-w-info"><div class="pb-w-name">' + (names[wid]||wid) + '</div><div class="pb-w-type">Widget</div></div>' +
    '<button class="pb-w-del" onclick="pbRemoveWidget(this)" title="Remove">✕</button>';
  col.appendChild(w);
}

function pbRemoveWidget(btn) {
  var col = btn.closest('.pb-col');
  col.classList.remove('has-widget');
  col.innerHTML = '<span style="font-size:11px;color:var(--dim)">Drop widget here</span>';
}

function pbCanvasDrop(e) {
  // If dropped on canvas background (not a col), add a new row
  if (e.target.id === 'pb-canvas' || e.target.classList.contains('pb-empty')) {
    e.preventDefault();
    if (pbDragWidget) { pbAddRow(1); var cols = document.querySelectorAll('#pb-canvas .pb-col'); pbDropInCol(cols[cols.length-1], pbDragWidget); }
  }
}

function pbCheckEmpty() {
  var canvas = document.getElementById('pb-canvas');
  if (!canvas.querySelector('.pb-row')) {
    canvas.innerHTML = '<div class="pb-empty"><div class="pb-empty-ic">❖</div><div style="font-size:12px">Add a row or drag a widget here</div></div>';
  }
}

function pbClear() {
  var canvas = document.getElementById('pb-canvas');
  canvas.innerHTML = '<div class="pb-empty"><div class="pb-empty-ic">❖</div><div style="font-size:12px">Add a row or drag a widget here</div></div>';
}

function savePageLayout() {
  var target = document.getElementById('pb-target');
  if (!target || !target.value) { showToast('Select a page first','warn'); return; }
  var rows = document.querySelectorAll('#pb-canvas .pb-row');
  var layout = [];
  rows.forEach(function(row) {
    var cols = [];
    row.querySelectorAll('.pb-col').forEach(function(col) {
      var w = col.querySelector('[data-widget]');
      cols.push(w ? w.getAttribute('data-widget') : null);
    });
    layout.push({ cols: parseInt(row.getAttribute('data-cols') || 1), widgets: cols });
  });
  var d = cmsGet();
  if (!d.page_layouts) d.page_layouts = {};
  d.page_layouts[target.value] = layout;
  cmsSet(d);
  showToast('Layout saved for ' + target.options[target.selectedIndex].text + '!', 'ok');
}

<script>

// ════════════════════════════════════════════
//  PRODUCT PAGE ADMIN — save/load/render
// ════════════════════════════════════════════

var PROD_KEYS = ['mss','lmp','vmp','sec','wip','rim','fit','lp'];
var PROD_ID_MAP = {
  mss:'mechanical-shoe-seals', lmp:'liquid-mounted-primary-seals',
  vmp:'vapour-mounted-primary-seals', sec:'secondary-seals',
  wip:'wiper-seals', rim:'rim-seals', fit:'seal-fittings', lp:'lightning-protection'
};

function saveProdPage(key){
  var d = cmsGet();
  if(!d.products) d.products = {};
  var fields = ['hero_desc','title','intro1','intro2',
                'img1','img2','img3','img_alt',
                'video_url','video_caption','specs','compliance'];
  d.products[key] = d.products[key] || {};
  fields.forEach(function(f){
    var el = document.getElementById(key+'_'+f);
    if(el) d.products[key][f] = el.value;
  });
  // Store related blog selections
  var checks = document.querySelectorAll('#'+key+'_blog_list input[type=checkbox]:checked');
  d.products[key].related_blog = Array.from(checks).map(function(c){return c.value;});
  cmsSet(d);
  showToast('Product page saved!','ok');
  applyProdPageChanges(key);
}

function loadProdPages(){
  var keys=['mss','lmp','vmp','sec','wip','rim','fit','lp'];
  keys.forEach(function(k){if(typeof loadProdDocs==='function')loadProdDocs(k);});

  var d = cmsGet();
  if(!d.products) return;
  PROD_KEYS.forEach(function(key){
    var data = d.products[key];
    if(!data) return;
    var fields = ['hero_desc','title','intro1','intro2',
                  'img1','img2','img3','img_alt',
                  'video_url','video_caption','specs','compliance'];
    fields.forEach(function(f){
      var el = document.getElementById(key+'_'+f);
      if(el && data[f] !== undefined) el.value = data[f];
    });
    // Update image preview
    updateProdImgPreview(key, data);
    // Update video preview
    if(data.video_url) prevProdVid(key);
    // Load blog list for this product
    loadProdBlogList(key, d, data);
  });
}

function applyProdPageChanges(key){
  // If we're currently viewing this product page, apply changes live
  var pageId = PROD_ID_MAP[key];
  var d = cmsGet();
  var data = d.products && d.products[key];
  if(!data) return;

  // Apply text via data-cms bindings (bindCMS handles this)
  bindCMS();

  // Apply main image (new DOM)
  if(data.img1){
    var mEl = document.getElementById('prod-img-main-img-'+key);
    var mPh = document.getElementById('prod-img-ph-'+key);
    if(mEl){ mEl.src=data.img1; mEl.classList.add('loaded'); }
    if(mPh) mPh.style.display='none';
    var si=document.getElementById('pisw-img-'+key);
    if(si && !si.getAttribute('data-overridden')){ si.src=data.img1; si.style.display='block'; }
  }
  [[1,'img1'],[2,'img2'],[3,'img3']].forEach(function(p){
    if(data[p[1]]){
      var t=document.getElementById('prod-img-t'+p[0]+'-img-'+key);
      if(t){ t.src=data[p[1]]; t.classList.add('loaded'); }
    }
  });

  // Apply video
  var vidDiv = document.getElementById('prod-vid-'+key);
  if(vidDiv && data.video_url){
    vidDiv.style.display = 'block';
    var url = data.video_url;
    if(url.indexOf('youtube')>=0 || url.indexOf('youtu.be')>=0){
      var m = url.match(/(?:v=|youtu\.be\/)([^&?\/]+)/);
      if(m) vidDiv.innerHTML = '<iframe src="https://www.youtube.com/embed/'+m[1]+'?autoplay=1&mute=1&loop=1&controls=0" style="width:100%;height:100%;border:none" allow="autoplay"></iframe>';
    } else if(url.indexOf('vimeo')>=0){
      var mv = url.match(/vimeo\.com\/(\d+)/);
      if(mv) vidDiv.innerHTML = '<iframe src="https://player.vimeo.com/video/'+mv[1]+'?autoplay=1&muted=1&loop=1&background=1" style="width:100%;height:100%;border:none" allow="autoplay"></iframe>';
    } else {
      vidDiv.innerHTML = '<video src="'+url+'" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover"></video>';
    }
  }
}

function applyAllProdPages(){
  // Called by router after any product page renders
  PROD_KEYS.forEach(function(key){
    applyProdPageChanges(key);
  });
  // Apply images and videos to current page
  var d = cmsGet();
  if(!d.products) return;
  PROD_KEYS.forEach(function(key){
    var data = d.products[key];
    if(!data) return;
    if(data.img1){
      var el = document.getElementById('prod-img-main-'+key);
      if(el) el.innerHTML = '<img src="'+data.img1+'" alt="'+(data.img_alt||'')+'" style="width:100%;height:100%;object-fit:cover"/>';
    }
  });
}

function prevProdVid(key){
  var urlEl = document.getElementById(key+'_video_url');
  var prevEl = document.getElementById(key+'_vid_prev');
  if(!urlEl || !prevEl) return;
  var url = urlEl.value.trim();
  if(!url){ prevEl.innerHTML = 'Video preview'; prevEl.style.background='#000'; return; }
  if(url.indexOf('youtube')>=0 || url.indexOf('youtu.be')>=0){
    var m = url.match(/(?:v=|youtu\.be\/)([^&?\/]+)/);
    if(m) prevEl.innerHTML = '<iframe src="https://www.youtube.com/embed/'+m[1]+'" style="width:100%;height:100%;border:none" allowfullscreen></iframe>';
  } else if(url.indexOf('vimeo')>=0){
    var mv = url.match(/vimeo\.com\/(\d+)/);
    if(mv) prevEl.innerHTML = '<iframe src="https://player.vimeo.com/video/'+mv[1]+'" style="width:100%;height:100%;border:none" allowfullscreen></iframe>';
  } else {
    prevEl.innerHTML = '<video src="'+url+'" controls style="width:100%;height:100%;object-fit:cover"></video>';
  }
}

function updateProdImgPreview(key, data){
  var el = document.getElementById(key+'_img_preview');
  if(!el) return;
  var imgs = [data.img1, data.img2, data.img3].filter(Boolean);
  el.innerHTML = imgs.map(function(url){
    return '<div style="width:80px;height:60px;border:1px solid var(--border);overflow:hidden;flex-shrink:0"><img src="'+url+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display=\'none\'"/></div>';
  }).join('');
}

function loadProdBlogList(key, d, prodData){
  var el = document.getElementById(key+'_blog_list');
  if(!el) return;
  var posts = (d.blog_posts || []).filter(function(p){return p.status==='published';});
  if(!posts.length){ el.innerHTML = '<p style="color:var(--mid);font-size:.8rem;padding:.5rem">No published blog posts yet. Add some in Blog Articles.</p>'; return; }
  var selected = (prodData && prodData.related_blog) || [];
  el.innerHTML = posts.map(function(p){
    var checked = selected.indexOf(String(p.id)) >= 0 ? 'checked' : '';
    return '<label style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;border-bottom:1px solid #f0f4f8;cursor:pointer;font-size:.8rem">'+
      '<input type="checkbox" value="'+p.id+'" '+checked+' style="flex-shrink:0"/> '+
      p.icon+' '+p.title+'</label>';
  }).join('');
}

// Add nav title
if(typeof TITLES !== 'undefined') TITLES['products-admin'] = 'Product Pages';

(function(){
'use strict';
window.showPage=function(id,push){
  if(push===undefined)push=true;
  if(!PAGES[id])id='home';
  var p=PAGES[id];
  document.title=p.title;
  document.getElementById('app').innerHTML=p.html;
  window.scrollTo(0,0);
  if(push){try{history.pushState({page:id},p.title,id==='home'?'./':'#'+id);}catch(e){}}
  afterRender(id);
};
function afterRender(id){
  bindCMS();
  if(typeof renderProdSidebars==='function'){
    var pp=['mechanical-shoe-seals','liquid-mounted-primary-seals','vapour-mounted-primary-seals',
      'secondary-seals','wiper-seals','rim-seals','seal-fittings','lightning-protection'];
    if(pp.indexOf(id)>=0) renderProdSidebars();
  }
  if(typeof applyAllProdPages==='function') applyAllProdPages();
  navMark(id);
  // When admin page loads, restore session or show login
  if(id==='admin'){
    // Wire login button via addEventListener (belt-and-suspenders alongside onclick attr)
    (function(){
      var btn=document.getElementById('adm-login-btn');
      if(btn&&!btn._wired){
        btn._wired=true;
        btn.addEventListener('click',function(){ doLogin(); });
      }
      ['adm-em','adm-pw'].forEach(function(eid){
        var inp=document.getElementById(eid);
        if(inp&&!inp._wired){inp._wired=true;inp.addEventListener('keydown',function(e){if(e.key==='Enter'){var b=document.getElementById('adm-login-btn');if(b)b.click();}});}
      });
      var back=document.getElementById('adm-back-link');
      if(back&&!back._wired){back._wired=true;back.addEventListener('click',function(){if(typeof goSite==='function')goSite('home');});}
    })();
    // Synchronous restore - no setTimeout race condition
    var shell = document.getElementById('adm-shell');
    var login = document.getElementById('adm-login');
    var wasLoggedIn = sessionStorage.getItem('petrodek_admin_auth') === '1';
    if(wasLoggedIn && shell && login){
      login.style.display = 'none';
      shell.style.display = 'flex';
      if(typeof initAdmin === 'function') initAdmin();
      if(typeof setAdminMode === 'function') setAdminMode(true);
    } else if(shell && login){
      shell.style.display = 'none';
      login.style.display = 'flex';
    }
    // Wire Enter key on login form
    ['lpw','lem'].forEach(function(eid){
      var el=document.getElementById(eid);
      if(el && !el._wired){el._wired=true;el.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});}
    });
  }
}
function bindCMS(){
  var data={};
  /* CMS data loaded from server via cmsGet() */
  document.querySelectorAll('[data-cms]').forEach(function(el){
    var pts=el.getAttribute('data-cms').split('.'),sec=pts[0],k=pts[1];
    if(data[sec]&&data[sec][k]!==undefined){
      var v=data[sec][k];
      if(el.tagName==='INPUT'||el.tagName==='TEXTAREA')el.value=v;
      else if(el.tagName==='A')el.href=v;
      else el.textContent=v;
    }
  });
  // Apply hero video from CMS to live page
  try {
    var heroVidUrl = (data.hero && data.hero.vid_url) ? data.hero.vid_url.trim() : '';
    var heroVidType = (data.hero && data.hero.vid_type) ? data.hero.vid_type : 'mp4';
    var heroVidEl = document.getElementById('hero-video');
    if (heroVidEl && heroVidUrl) {
      var isYT = heroVidUrl.indexOf('youtube') >= 0 || heroVidUrl.indexOf('youtu.be') >= 0;
      var isVimeo = heroVidUrl.indexOf('vimeo') >= 0;
      if (isYT || isVimeo) {
        // YouTube/Vimeo: replace video with iframe
        heroVidEl.style.display = 'none';
        var existingIframe = document.getElementById('hero-video-iframe');
        if (!existingIframe) {
          var heroIframe = document.createElement('iframe');
          heroIframe.id = 'hero-video-iframe';
          heroIframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;border:none;';
          heroIframe.allow = 'autoplay; muted';
          if (isYT) {
            var ytm = heroVidUrl.match(/(?:v=|youtu\.be\/)([^&?\/]+)/);
            if (ytm) heroIframe.src = 'https://www.youtube.com/embed/' + ytm[1] + '?autoplay=1&mute=1&loop=1&playlist=' + ytm[1] + '&controls=0&modestbranding=1&playsinline=1';
          } else {
            var vim = heroVidUrl.match(/vimeo\.com\/(\d+)/);
            if (vim) heroIframe.src = 'https://player.vimeo.com/video/' + vim[1] + '?autoplay=1&muted=1&loop=1&background=1';
          }
          heroVidEl.parentNode.insertBefore(heroIframe, heroVidEl);
        }
      } else {
        // MP4/WebM - set source src directly
        var src = heroVidEl.querySelector('source');
        if (src) {
          var mimeType = heroVidType === 'webm' ? 'video/webm' : 'video/mp4';
          if (src.getAttribute('src') !== heroVidUrl) {
            src.setAttribute('src', heroVidUrl);
            src.setAttribute('type', mimeType);
            heroVidEl.load();
          }
          heroVidEl.style.display = '';
          heroVidEl.muted = true;
          var autoplay = !data.hero.vid_auto || data.hero.vid_auto === '1';
          if (autoplay) heroVidEl.play().catch(function(){});
        }
      }
    }
  } catch(e) { console.warn('Hero video apply error:', e); }

  var grid=document.getElementById('cms-blog-grid');
  if(grid){
    var d2={};
    /* CMS data loaded from server via cmsGet() */
    if(d2.blog_posts){
      grid.innerHTML=d2.blog_posts.filter(function(p){return p.status!=='draft';})
        .map(function(p){
          return '<div class="blog-card">'+
            '<div class="blog-card-img">'+(p.icon||'')+'</div>'+
            '<div class="blog-card-body">'+
            '<div class="blog-tag">'+(p.tag||'')+' \u00b7 '+(p.time||'')+'</div>'+
            '<h3>'+p.title+'</h3><p>'+(p.excerpt||'')+'</p>'+
            '<div class="blog-meta">'+(p.date||'')+' \u00b7 By '+(p.author||'')+'</div>'+
            '</div></div>';
        }).join('');
    }
  }
}
function heroVideo(){
  var vid=document.getElementById('hero-video');if(!vid)return;
  var data={};
  /* CMS data loaded from server via cmsGet() */
  var h=(data&&data.hero)?data.hero:{};
  var url=h.vid_url||'';
  if(!url){vid.style.display='none';return;}
  if(url.indexOf('youtube')>=0||url.indexOf('youtu.be')>=0){
    var m=url.match(/(?:v=|youtu\.be\/)([^&?\/]+)/);
    if(m){var ifr=document.createElement('iframe');
      ifr.src='https://www.youtube.com/embed/'+m[1]+'?autoplay=1&mute=1&loop=1&playlist='+m[1]+'&controls=0';
      ifr.allow='autoplay;fullscreen';
      ifr.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none;z-index:0;pointer-events:none';
      var hs=document.querySelector('.hero');if(hs)hs.insertBefore(ifr,hs.firstChild);
      vid.style.display='none';}return;}
  if(url.indexOf('vimeo')>=0){
    var mv=url.match(/vimeo\.com\/(\d+)/);
    if(mv){var ifr2=document.createElement('iframe');
      ifr2.src='https://player.vimeo.com/video/'+mv[1]+'?autoplay=1&muted=1&loop=1&background=1';
      ifr2.allow='autoplay;fullscreen';
      ifr2.style.cssText='position:absolute;inset:0;width:100%;height:100%;border:none;z-index:0;pointer-events:none';
      var hs2=document.querySelector('.hero');if(hs2)hs2.insertBefore(ifr2,hs2.firstChild);
      vid.style.display='none';}return;}
  var src=vid.querySelector('source');if(src)src.setAttribute('src',url);
  vid.muted=true;vid.loop=true;
  vid.addEventListener('canplay',function(){vid.classList.add('loaded');});
  vid.addEventListener('error',function(){vid.style.display='none';});
  vid.play().catch(function(){vid.style.display='none';});
}
function navMark(id){
  document.querySelectorAll('.nav-links a').forEach(function(a){
    var oc=a.getAttribute('onclick')||'';
    a.classList[oc.indexOf("'"+id+"'")>=0?'add':'remove']('active');
  });
}
window.addEventListener('popstate',function(e){
  showPage((e.state&&e.state.page)?e.state.page:'home',false);
});
function boot(){
  var hash=window.location.hash.replace('#','').trim();
  showPage((hash&&PAGES[hash])?hash:'home',false);
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',function(){ cmsLoadFromServer().then(boot); });
}else{ cmsLoadFromServer().then(boot); }
})();
</script>

<!-- ══ IMAGE LIBRARY PICKER MODAL ══ -->
<div class="imglib-modal-bg" id="imglib-modal">
  <div class="imglib-modal">
    <div class="imglib-modal-head">
      <h3>🖼 Image Library — Choose an Image</h3>
      <button class="imglib-modal-close" onclick="closeImgLibModal()">✕</button>
    </div>
    <div class="imglib-modal-toolbar">
      <input type="text" id="imglib-search" placeholder="Search images…" oninput="renderImgLibGrid(this.value)"/>
      <label class="imglib-upload-btn" style="cursor:pointer">
        ⬆ Upload New
        <input type="file" id="imglib-modal-inp" multiple accept="image/*" style="display:none" onchange="handleImgLibModalUpload(this)"/>
      </label>
    </div>
    <div class="imglib-modal-body">
      <div class="imglib-grid" id="imglib-grid"></div>
    </div>
    <div class="imglib-modal-foot">
      <div class="imglib-sel-preview" id="imglib-sel-preview">
        <span style="color:#aabbc8">No image selected</span>
      </div>
      <button class="imglib-insert-btn" id="imglib-insert-btn" onclick="confirmImgLibSelection()" disabled>Insert Image →</button>
    </div>
  </div>
</div>


</html>
