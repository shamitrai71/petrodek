rel-card-img\">\ud83d\udd29</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Mechanical Shoe Seals</h4>\n        <p>High-efficiency metallic primary seals for all floating roof tank types.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udca7</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Liquid Mounted Primary Seals</h4>\n        <p>Foam-filled seals that float directly on the product surface.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udd04</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Wiper Seals</h4>\n        <p>Shell-contact wiper prevents product carry-up during roof travel.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\u2699</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Seal Fittings</div>\n        <h4>Seal Fittings</h4>\n        <p>Gauging hatches, bleeder vents and deck drain valves for complete roof systems.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    </div>\n  </div>\n</div>\n\n<!-- CTA -->\n<div class=\"cta-box\">\n  <div class=\"cta-box-inner\">\n    <h3>Request a Technical Quotation</h3>\n    <p>Provide your tank dimensions, product stored, and operating conditions \u2014 our engineers will recommend the optimal seal configuration and provide a detailed quotation.</p>\n    <div class=\"cta-btns\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Contact Our Engineers \u2192</a>\n      <a href=\"http://www.tankprotocol.com\" target=\"_blank\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">Calculate Emissions</a>\n    </div>\n  </div>\n</div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\" target=\"_blank\">Buy Spares</a></li>\n        <li><a href=\"http://www.tankprotocol.com\" target=\"_blank\">Tank Protocol</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Connect</div>\n      <ul>\n        <li><a href=\"https://facebook.com\" target=\"_blank\">Facebook</a></li>\n        <li><a href=\"https://twitter.com\" target=\"_blank\">Twitter / X</a></li>\n        <li><a href=\"https://youtube.com\" target=\"_blank\">YouTube</a></li>\n        <li><a href=\"https://instagram.com\" target=\"_blank\">Instagram</a></li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\">&copy; 2026 Petrodek Systems &middot; All Rights Reserved &middot; An ESRAI GROUP Enterprise</div>\n    <div class=\"social-links\">\n      <a href=\"https://facebook.com\" target=\"_blank\">f</a>\n      <a href=\"https://twitter.com\" target=\"_blank\">&#120143;</a>\n      <a href=\"https://youtube.com\" target=\"_blank\">&#9654;</a>\n      <a href=\"https://instagram.com\" target=\"_blank\">&#9678;</a>\n    </div>\n  </div>\n</footer>"},
"wiper-seals":{title:"Wiper Seals \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"this.closest('nav').querySelector('.nav-links').classList.toggle('open')\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"active\">Products \u25be</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals \u25b8</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">\u2699 Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div>\n  <div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products \u203a Rim Seals \u203a Wiper Seals</div>\n    <h1>Wiper <em>Seals</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.wip.hero_desc\">Periphery-mounted wiper seals maintain continuous contact with the tank shell during roof movement, preventing product carry-up, reducing shell contamination, and minimising vapour release.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a><span class=\"sep\">\u203a</span><span class=\"cur\">Wiper Seals</span></div>\n  </div>\n</div>\n\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-wip\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">\ud83d\uddbc\ufe0f</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"wip\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-wip\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-wip\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">\ud83d\uddbc\ufe0f</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-wip\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div><div class=\"product-wrap\">\n  <div class=\"product-intro\">\n    <!-- IMAGE BLOCK -->\n    <div class=\"product-img-block\">\n      <div class=\"prod-main-img-wrap\" id=\"prod-img-main-wip\">\n        <span class=\"prod-main-img-placeholder-icon\" id=\"prod-img-ph-wip\">\ud83d\udd04</span>\n        <img id=\"adm-main-img-wip\" src=\"\" alt=\"Product image\" onload=\"this.classList.add(\'loaded\');document.getElementById(\'prod-img-ph-wip\').style.display=\'none\'\" onerror=\"this.classList.remove(\'loaded\')\"/>\n        <div class=\"prod-img-admin-overlay\">\n          <button class=\"prod-img-upload-btn\" onclick=\"pickProductMainImg(\'wip\')\">\n            &#128247; Change Image\n          </button>\n        </div>\n      </div>\n      <div id=\"prod-vid-wip\" style=\"display:none;position:absolute;inset:0;z-index:0\"></div>\n            <div class=\"prod-img-thumbs-row\">\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'wip\',1)\" id=\"prod-img-t1-wip\">\n          <img id=\"adm-t1-img-wip\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'wip\',2)\" id=\"prod-img-t2-wip\">\n          <img id=\"adm-t2-img-wip\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\'admin-active\')&&pickProductThumb(\'wip\',3)\" id=\"prod-img-t3-wip\">\n          <img id=\"adm-t3-img-wip\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n      </div>\n    </div>\n    <!-- INTRO TEXT -->\n    <div class=\"product-intro-text\">\n      <div class=\"section-label\">Product Detail</div>\n      <h2 data-cms=\"products.wip.title\">Wiper Seals</h2>\n      <div class=\"divider\"></div>\n      <p data-cms=\"products.wip.intro1\">Wiper seals are fitted to the outermost edge of the floating roof rim and maintain physical contact with the inner tank shell surface at all times. As the roof rises and falls with changing product levels, the wiper continuously cleans the shell surface, preventing liquid hydrocarbon from being dragged upward on the shell wall.</p>\n      <p data-cms=\"products.wip.intro2\">Product carry-up on the tank shell creates contamination on the shell surface above the roof, increasing evaporative losses and creating a fire and safety hazard. Wiper seals eliminate this mechanism and are often used in conjunction with secondary seals to achieve the lowest possible total emission factors.</p>\n      <div class=\"product-badges\"><span class=\"prod-badge\">Prevents product carry-up</span><span class=\"prod-badge\">Continuous wiper contact</span><span class=\"prod-badge\">PTFE or PU wiper blade</span><span class=\"prod-badge\">In-service replaceable</span><span class=\"prod-badge\">Works with all primary seals</span></div>\n      <div style=\"display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem\">\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request a Quote \u2192</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\">Technical Enquiry</a>\n      </div>\n    </div>\n  </div>\n</div></div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">\ud83d\udcf0 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts \u2192</a></div>\n<div id=\"prod-blog-sidebar-wip\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n\n<!-- SPECS -->\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div>\n        <div class=\"section-label\">Technical Data</div>\n        <div class=\"specs-title\">Specifications</div>\n        <p class=\"specs-sub\">All specifications are standard values. Custom configurations available based on tank dimensions, product stored, and operating conditions.</p>\n        <div class=\"compliance-badges\">\n          <span class=\"comp-badge\">API 650</span>\n          <span class=\"comp-badge\">API MPMS 19.2</span>\n          <span class=\"comp-badge\">API 545</span>\n          <span class=\"comp-badge\">IS 10987</span>\n        </div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Parameter</th><th>Specification</th></tr></thead>\n          <tbody><tr><td>Wiper Material</td><td>PTFE / Polyurethane / Nitrile rubber</td></tr><tr><td>Contact Type</td><td>Continuous shell contact</td></tr><tr><td>Mounting Position</td><td>Outermost roof rim periphery</td></tr><tr><td>Application</td><td>External floating roof tanks (EFR)</td></tr><tr><td>Tank Diameter</td><td>All sizes</td></tr><tr><td>Operating Temperature</td><td>-30\u00b0C to +100\u00b0C</td></tr><tr><td>Shell Surface</td><td>Standard mill finish / smooth</td></tr><tr><td>Replacement</td><td>In-service wiper blade replacement</td></tr><tr><td>Standards</td><td>Compatible with API 650</td></tr><tr><td>Frequency of Replacement</td><td>Typically 3\u20135 years depending on service</td></tr></tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- FEATURES -->\n<div class=\"features-section\">\n  <div class=\"features-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Why Choose This Product</span>\n      <h2>Key Features & Benefits</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"features-grid\">\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udd04</div>\n      <h4>Prevents Shell Contamination</h4>\n      <p>Continuously wipes the shell surface as the roof travels, preventing product carry-up that would otherwise evaporate above the roof.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udee1</div>\n      <h4>Reduces Fire Risk</h4>\n      <p>By preventing hydrocarbon film on the shell above the roof, wiper seals reduce the risk of vapour ignition in the rim space.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udd27</div>\n      <h4>Easy Blade Replacement</h4>\n      <p>Wiper blades can be replaced individually or in sections during routine inspection without major disassembly.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\u2699</div>\n      <h4>Works with All Seal Types</h4>\n      <p>Compatible as an addition to any primary seal system \u2014 mechanical shoe, liquid, or vapour-mounted.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udcb0</div>\n      <h4>Low Operating Cost</h4>\n      <p>Inexpensive to maintain; replacement blades are readily available and quick to install during routine maintenance.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">\ud83d\udccb</div>\n      <h4>Multiple Material Options</h4>\n      <p>PTFE for chemical resistance, polyurethane for abrasion resistance, nitrile for hydrocarbon service.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- APPLICATIONS -->\n<div class=\"apps-section\">\n  <div class=\"apps-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Where It's Used</span>\n      <h2>Applications</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"apps-grid\">\n    <div class=\"app-item\">\n      <div class=\"app-num\">01</div>\n      <h4>All External Floating Roof Tanks</h4>\n      <p>Standard addition to rim seal systems on EFR tanks handling any petroleum product.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">02</div>\n      <h4>High-Throughput Tanks</h4>\n      <p>Tanks with frequent product movements and large changes in roof travel particularly benefit from wiper seals.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">03</div>\n      <h4>Hot Product Service</h4>\n      <p>Tanks storing warm products where carry-up evaporation rates are higher.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">04</div>\n      <h4>Shell Corrosion Prevention</h4>\n      <p>Wiper action removes corrosive product residues from the shell surface above the roof.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">05</div>\n      <h4>Stringent Environmental Sites</h4>\n      <p>Facilities where minimum total emission factors are mandated by environmental authorities.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">06</div>\n      <h4>Refinery Product Tanks</h4>\n      <p>Finished product storage where product contamination from shell carry-up must be prevented.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- RELATED -->\n<div class=\"related-section\">\n  <div class=\"related-inner\">\n    <div class=\"section-hd\" style=\"text-align:left\">\n      <span class=\"slbl\">Complete Your System</span>\n      <h2 style=\"text-align:left\">Related Products</h2>\n      <div class=\"bar\" style=\"margin-left:0\"></div>\n    </div>\n    <div class=\"related-grid\">\n    <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udd29</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Mechanical Shoe Seals</h4>\n        <p>High-efficiency metallic primary seals for all floating roof tank types.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\ud83d\udee1</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Secondary Seals</h4>\n        <p>Additional vapour barrier reducing combined emission factors by up to 96%.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\u2699</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Seal Fittings</div>\n        <h4>Seal Fittings</h4>\n        <p>Gauging hatches, bleeder vents and deck drain valves for complete roof systems.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">\u26a1</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Lightning Protection</div>\n        <h4>Lightning Protection Systems</h4>\n        <p>API 545 compliant bonding and grounding for floating roof tanks.</p>\n        <span class=\"rel-card-link\">Learn More \u2192</span>\n      </div>\n    </a>\n    </div>\n  </div>\n</div>\n\n<!-- CTA -->\n<div class=\"cta-box\">\n  <div class=\"cta-box-inner\">\n    <h3>Request a Technical Quotation</h3>\n    <p>Provide your tank dimensions, product stored, and operating conditions \u2014 our engineers will recommend the optimal seal configuration and provide a detailed quotation.</p>\n    <div class=\"cta-btns\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Contact Our Engineers \u2192</a>\n      <a href=\"http://www.tankprotocol.com\" target=\"_blank\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">Calculate Emissions</a>\n    </div>\n  </div>\n</div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\" target=\"_blank\">Buy Spares</a></li>\n        <li><a href=\"http://www.tankprotocol.com\" target=\"_blank\">Tank Protocol</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Connect</div>\n      <ul>\n        <li><a href=\"https://facebook.com\" target=\"_blank\">Facebook</a></li>\n        <li><a href=\"https://twitter.com\" target=\"_blank\">Twitter / X</a></li>\n        <li><a href=\"https://youtube.com\" target=\"_blank\">YouTube</a></li>\n        <li><a href=\"https://instagram.com\" target=\"_blank\">Instagram</a></li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\">&copy; 2026 Petrodek Systems &middot; All Rights Reserved &middot; An ESRAI GROUP Enterprise</div>\n    <div class=\"social-links\">\n      <a href=\"https://facebook.com\" target=\"_blank\">f</a>\n      <a href=\"https://twitter.com\" target=\"_blank\">&#120143;</a>\n      <a href=\"https://youtube.com\" target=\"_blank\">&#9654;</a>\n      <a href=\"https://instagram.com\" target=\"_blank\">&#9678;</a>\n    </div>\n  </div>\n</footer>"},
"seal-fittings":{title:"Seal Fittings \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"this.closest('nav').querySelector('.nav-links').classList.toggle('open')\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"active\">Products \u25be</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals \u25b8</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">\u2699 Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div><div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products \u203a Seal Fittings</div>\n    <h1>Seal <em>Fittings</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.fit.hero_desc\">Precision-engineered tank roof fittings and accessories for external floating roof tanks \u2014 designed to complement and complete the Petrodek rim seal system.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">\u203a</span><span class=\"cur\">Seal Fittings</span></div>\n  </div>\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-fit\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">\ud83d\uddbc\ufe0f</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"fit\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-fit\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-fit\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">\ud83d\uddbc\ufe0f</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-fit\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div></div>\n<div style=\"max-width:1200px;margin:0 auto;padding:70px 5%\">\n  <div class=\"section-hd\"><span class=\"slbl\">Complete Tank Roof Accessories</span><h2>Fittings Range</h2><div class=\"bar\"></div></div>\n  <div class=\"features-grid\" style=\"margin-top:2.5rem\">\n    <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udd32</div><h4>Gauging Hatches</h4><p>Roof-mounted hatches for manual gauging, sampling, and thief access. Available in 8\", 10\", and 12\" NB with self-closing hinged covers and locking handles. Fitted with vapour-tight seals.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">\ud83c\udf00</div><h4>Bleeder Vents</h4><p>Automatic pressure/vacuum relief vents that equalise pressure between the underside of the floating roof and the vapour space during roof travel. Spring-loaded valve disc.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udd0c</div><h4>Deck Drain Valves</h4><p>Spring-loaded or float-operated drain valves mounted on the roof deck to discharge rainwater accumulation. Prevents roof submersion while avoiding product contamination.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udccf</div><h4>Roof Leg Assemblies</h4><p>Adjustable support legs that hold the floating roof in the landed position during tank inspection and maintenance. High and low landing positions; load-rated to API 650 requirements.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udd17</div><h4>Roof Drain Lines</h4><p>Articulated or flexible piped drain systems routed from the deck to the tank bottom. Handles rainwater drainage safely without product contamination. Swivel joints or flexible hose options.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udee0</div><h4>Sample Hatches</h4><p>Purpose-built sample access hatches with spring-return self-closing covers. Suitable for safe product sampling operations at all roof positions. Available with vapour-lock designs.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">\u26a1</div><h4>Anti-Rotation Devices</h4><p>Guide poles, rolling ladders, and anti-rotation systems to control roof movement and maintain alignment. Essential for tanks subject to wind load and seismic requirements.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udd27</div><h4>Foam Dam Systems</h4><p>Fixed foam dams for fixed-roof-foam system penetrations on EFR tanks. Required where firefighting foam injection is specified by fire safety standards.</p></div>\n  </div>\n</div>\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div><div class=\"section-label\">Standards Compliance</div><div class=\"specs-title\">Design Standards</div>\n        <p class=\"specs-sub\">All fittings are designed, fabricated, and inspected in accordance with applicable API, IS, and international standards.</p>\n        <div class=\"compliance-badges\"><span class=\"comp-badge\">API 650</span><span class=\"comp-badge\">API 2000</span><span class=\"comp-badge\">API 545</span><span class=\"comp-badge\">IS 10987</span><span class=\"comp-badge\">OISD 117</span></div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Fitting Type</th><th>Standard Size Range</th></tr></thead>\n          <tbody>\n            <tr><td>Gauging Hatches</td><td>8\", 10\", 12\" NB</td></tr>\n            <tr><td>Bleeder Vents</td><td>2\", 3\", 4\" NB</td></tr>\n            <tr><td>Deck Drain Valves</td><td>4\", 6\", 8\" NB</td></tr>\n            <tr><td>Roof Legs</td><td>Dia. 150\u2013300 mm</td></tr>\n            <tr><td>Sample Hatches</td><td>4\", 6\" NB</td></tr>\n            <tr><td>Foam Dam</td><td>To tank-specific design</td></tr>\n            <tr><td>Material Standard</td><td>ASTM A36 / A240 / A182</td></tr>\n            <tr><td>Inspection</td><td>TPIA per client requirement</td></tr>\n          </tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n<div class=\"cta-box\"><div class=\"cta-box-inner\"><h3>Request a Fittings Schedule</h3><p>Provide your tank drawings or dimensions and we'll prepare a comprehensive fitting schedule with itemised quotation.</p><div class=\"cta-btns\"><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request Quote \u2192</a></div></div></div>\n\n</div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">\ud83d\udcf0 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts \u2192</a></div>\n<div id=\"prod-blog-sidebar-fit\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\" target=\"_blank\">Buy Spares</a></li>\n        <li><a href=\"http://www.tankprotocol.com\" target=\"_blank\">Tank Protocol</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Connect</div>\n      <ul>\n        <li><a href=\"https://facebook.com\" target=\"_blank\">Facebook</a></li>\n        <li><a href=\"https://twitter.com\" target=\"_blank\">Twitter / X</a></li>\n        <li><a href=\"https://youtube.com\" target=\"_blank\">YouTube</a></li>\n        <li><a href=\"https://instagram.com\" target=\"_blank\">Instagram</a></li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\">&copy; 2026 Petrodek Systems &middot; All Rights Reserved &middot; An ESRAI GROUP Enterprise</div>\n    <div class=\"social-links\">\n      <a href=\"https://facebook.com\" target=\"_blank\">f</a>\n      <a href=\"https://twitter.com\" target=\"_blank\">&#120143;</a>\n      <a href=\"https://youtube.com\" target=\"_blank\">&#9654;</a>\n      <a href=\"https://instagram.com\" target=\"_blank\">&#9678;</a>\n    </div>\n  </div>\n</footer>"},
"lightning-protection":{title:"Lightning Protection \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"this.closest('nav').querySelector('.nav-links').classList.toggle('open')\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"active\">Products \u25be</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals \u25b8</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">\u2699 Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div><div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products \u203a Lightning Protection</div>\n    <h1>Lightning <em>Protection</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.lp.hero_desc\">Bonding and lightning protection systems for external floating roof petroleum storage tanks \u2014 protecting assets, personnel, and the environment from electrical hazards in compliance with API 545 and NFPA 780.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">\u203a</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">\u203a</span><span class=\"cur\">Lightning Protection</span></div>\n  </div>\n</div>\n\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-lp\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">\ud83d\uddbc\ufe0f</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"lp\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-lp\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-lp\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">\ud83d\uddbc\ufe0f</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-lp\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div><div class=\"product-wrap\">\n  <div class=\"product-intro\">\n    <!-- IMAGE BLOCK -->\n    <div class=\"product-img-block\">\n      <div class=\"prod-main-img-wrap\" id=\"prod-img-main-lp\">\n        <span class=\"prod-main-img-placeholder-icon\" id=\"prod-img-ph-lp\">\u26a1</span>\n        <img id=\"adm-main-img-lp\" src=\"\" alt=\"Product image\" onload=\"this.classList.add(\'loaded\');document.getElementById(\'prod-img-ph-lp\').style.display=\'none\'\" onerror=\"this.classList.remove(\'loaded\')\"/>\n        <div class=\"prod-img-admin-overlay\">\n          <button class=\"prod-img-upload-btn\" onclick=\"pickProductMainImg(\'lp\')\">\n            &#128247; Change Image\n          </button>\n        </div>\n      </div>\n      <div id=\"prod-vid-lp\" style=\"display:none;position:absolute;inset:0;z-index:0\"></div>\n            <div class=\"prod-img-thumbs-row\">\n        <div class=\"prod-img-thumb-cell\"  id=\"prod-img-t1-lp\">\n          <img id=\"adm-t1-img-lp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\"  id=\"prod-img-t2-lp\">\n          <img id=\"adm-t2-img-lp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\"  id=\"prod-img-t3-lp\">\n          <img id=\"adm-t3-img-lp\" src=\"\" alt=\"\" onload=\"this.classList.add(\'loaded\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n      </div>\n    </div>\n    <div class=\"product-intro-text\">\n      <div class=\"section-label\">Safety Systems</div>\n      <h2 data-cms=\"products.lp.title\">Floating Roof Tank Bonding</h2>\n      <div class=\"divider\"></div>\n      <p data-cms=\"products.lp.intro1\">External floating roof tanks store large volumes of highly flammable petroleum products. A direct lightning strike \u2014 or even an induced transient voltage \u2014 can ignite vapours in the rim seal space, potentially causing catastrophic tank fire and explosion.</p>\n      <p data-cms=\"products.lp.intro2\">Petrodek supplies complete lightning protection and electrical bonding systems that maintain continuous electrical continuity between the floating roof and the tank shell at all roof positions, eliminating the potential for spark discharge across the rim space.</p>\n      <div class=\"product-badges\">\n        <span class=\"prod-badge\">API 545 Compliant</span>\n        <span class=\"prod-badge\">NFPA 780</span>\n        <span class=\"prod-badge\">Continuous continuity</span>\n        <span class=\"prod-badge\">All roof positions</span>\n        <span class=\"prod-badge\">Test point provision</span>\n      </div>\n      <div style=\"display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem\">\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request Assessment \u2192</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\">Technical Enquiry</a>\n      </div>\n    </div>\n  </div>\n</div></div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">\ud83d\udcf0 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts \u2192</a></div>\n<div id=\"prod-blog-sidebar-lp\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div>\n        <div class=\"section-label\">Technical Data</div>\n        <div class=\"specs-title\">System Specifications</div>\n        <p class=\"specs-sub\">Lightning protection systems are designed to meet all applicable API, NFPA, and national electrical standards.</p>\n        <div class=\"compliance-badges\"><span class=\"comp-badge\">API 545</span><span class=\"comp-badge\">NFPA 780</span><span class=\"comp-badge\">IS 2309</span><span class=\"comp-badge\">IEC 62305</span></div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Parameter</th><th>Value</th></tr></thead>\n          <tbody>\n            <tr><td>Conductor Material</td><td>Flexible copper braid / SS cable</td></tr>\n            <tr><td>Conductor Cross-section</td><td>25\u201350 mm\u00b2 (per tank design)</td></tr>\n            <tr><td>Bonding Resistance</td><td>&lt; 0.01 \u03a9 (roof to shell)</td></tr>\n            <tr><td>Operating Temperature</td><td>-40\u00b0C to +120\u00b0C</td></tr>\n            <tr><td>Installation Points</td><td>Every 30 m of tank circumference (min)</td></tr>\n            <tr><td>Shunt Assembly</td><td>Flexible braid type, spring-loaded</td></tr>\n            <tr><td>Test Points</td><td>Provided for periodic resistance measurement</td></tr>\n            <tr><td>Cable Type Option</td><td>SS wire rope for wide clearances</td></tr>\n            <tr><td>Surface Treatment</td><td>Tinned copper / hot-dip galvanised</td></tr>\n            <tr><td>Terminations</td><td>Compression-type cable lugs</td></tr>\n          </tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div class=\"features-section\">\n  <div class=\"features-inner\">\n    <div class=\"section-hd\"><span class=\"slbl\">System Components</span><h2>What's Included</h2><div class=\"bar\"></div></div>\n    <div class=\"features-grid\">\n      <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udd0c</div><h4>Shunt Assemblies</h4><p>Flexible copper braid bonding straps that maintain electrical continuity between the floating roof and the tank shell across the full range of roof travel.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udd17</div><h4>Cable-Type Bonding</h4><p>Stainless steel wire rope systems for tanks with larger annular clearances where shunt-type assemblies are not appropriate.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">\u2699</div><h4>Rolling Contact Shoes</h4><p>Spring-loaded rolling contact shoes that maintain continuous electrical contact with the tank shell surface during roof movement.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udd27</div><h4>Grounding Accessories</h4><p>Tank shell grounding lugs, cable termination clamps, and all associated hardware for complete system installation.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udccb</div><h4>Inspection Test Points</h4><p>Dedicated test points at accessible locations for periodic bonding resistance measurement and system integrity verification.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">\ud83d\udcc4</div><h4>Documentation Package</h4><p>Material certificates, installation drawings, resistance test records, and compliance certificate supplied with every system.</p></div>\n    </div>\n  </div>\n</div>\n\n<div class=\"apps-section\">\n  <div class=\"apps-inner\">\n    <div class=\"section-hd\"><span class=\"slbl\">Where It's Needed</span><h2>Applications</h2><div class=\"bar\"></div></div>\n    <div class=\"apps-grid\">\n      <div class=\"app-item\"><div class=\"app-num\">01</div><h4>Refinery EFR Tanks</h4><p>All external floating roof tanks at petroleum refineries \u2014 mandatory under OISD 117 and API 545.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">02</div><h4>Crude Oil Terminals</h4><p>Import and export terminals handling large volumes of crude oil with high vapour pressure.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">03</div><h4>Petrochemical Plants</h4><p>Storage of aromatic feedstocks and finished chemicals in floating roof tanks.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">04</div><h4>Aviation Fuel Storage</h4><p>ATF and aviation gasoline storage where the highest electrical safety standards apply.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">05</div><h4>New Tank Construction</h4><p>Standard scope item on all new EFR tank projects in accordance with API 650 and owner specifications.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">06</div><h4>Existing Tank Assessment</h4><p>Inspection and upgrade of bonding systems on existing tanks that may not meet current standards.</p></div>\n    </div>\n  </div>\n</div>\n\n<div class=\"cta-box\"><div class=\"cta-box-inner\"><h3>Request a Safety Assessment</h3><p>We can review your existing tank bonding systems, measure installed resistance values, and recommend cost-effective upgrades to achieve full API 545 compliance.</p><div class=\"cta-btns\"><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request Assessment \u2192</a><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">View Rim Seals</a></div></div></div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanica x;background:rgba(10,22,40,.1)\">\n          <div style=\"background:var(--navy);padding:2.2rem;text-align:center\">\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.8rem;color:var(--accent);line-height:1\" data-cms=\"about_section.stat1_num\">25+</div>\n            <div style=\"font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6688aa;margin-top:.4rem\" data-cms=\"about_section.stat1_lbl\">Years Experience</div>\n          </div>\n          <div style=\"background:var(--steel);padding:2.2rem;text-align:center\">\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.8rem;color:var(--accent);line-height:1\" data-cms=\"about_section.stat2_num\">200+</div>\n            <div style=\"font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6688aa;margin-top:.4rem\" data-cms=\"about_section.stat2_lbl\">Tank Installations</div>\n          </div>\n          <div style=\"background:var(--steel);padding:2.2rem;text-align:center\">\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.8rem;color:var(--accent);line-height:1\" data-cms=\"about_section.stat3_num\">2</div>\n            <div style=\"font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6688aa;margin-top:.4rem\" data-cms=\"about_section.stat3_lbl\">Group Companies</div>\n          </div>\n          <div style=\"background:var(--navy);padding:2.2rem;text-align:center\">\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.8rem;color:var(--accent);line-height:1\" data-cms=\"about_section.stat4_num\">6+</div>\n            <div style=\"font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6688aa;margin-top:.4rem\" data-cms=\"about_section.stat4_lbl\">Specialist Brands</div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- GROUP COMPANIES -->\n  <div style= splay:flex;align-items:center;gap:.8rem\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;letter-spacing:.06em\">SEAL<span style=\"color:var(--accent)\">WORKS</span></div>\n          <span style=\"margin-left:auto;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:.18rem .55rem;border-radius:3px\">Engineering</span>\n        </div>\n        <div style=\"padding:1.2rem 1.4rem;background:#fff\">\n          <p style=\"font-size:.82rem;line-height:1.7;color:#445;margin-bottom:.8rem\">The Sealworks brand covers the full range of rim seal engineering services under Petrodek Systems \u2014 design consultation, product selection, supply, and on-site installation for floating roof tank rim sealing systems.</p>\n          <div style=\"font-size:.72rem;color:var(--mid);font-weight:600\">Under \u2192 Petrodek Systems Pvt. Ltd.</div>\n        </div>\n      </div>\n\n      <!-- AST Spares -->\n      <div style=\"border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)\">\n        <div style=\"background:var(--steel);padding:1rem 1.4rem;display:flex;align-items:center;gap:.8rem\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;letter-spacing:.06em\">AST<span style=\"color:var(--accent)\">SPARES</span></div>\n          <span style=\"margin-left:auto;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:.18rem .55rem;border-radius:3px\">Spares</span>\n        </div>\n        <div style=\"padding:1.2rem 1.4rem;background:#fff\">\n          <p style=\"font-size:.82rem;line-height:1.7;color:#445;margin-bottom:.8rem\">Replacement and aftermarket spare parts for above-ground storage tank equipment \u2014 rim seal components, drain valve parts, pontoon fittings rd-lbl\">Blog Posts</div><div class=\"scard-val\" id=\"dc-blog\">4</div><div class=\"scard-sub\">published</div></div>\n    <div class=\"scard b\" onclick=\"aNav('images',null)\"><div class=\"scard-lbl\">Images</div><div class=\"scard-val\" id=\"dc-images\">0</div><div class=\"scard-sub\">in library</div></div>\n    <div class=\"scard\" onclick=\"aNav('videos',null)\"><div class=\"scard-lbl\">Videos</div><div class=\"scard-val\" id=\"dc-videos\">0</div><div class=\"scard-sub\">embedded</div></div>\n    <div class=\"scard\" onclick=\"aNav('menus',null)\"><div class=\"scard-lbl\">Menus</div><div class=\"scard-val\" id=\"dc-menus\">2</div><div class=\"scard-sub\">configured</div></div>\n    <div class=\"scard\" onclick=\"aNav('widgets',null)\"><div class=\"scard-lbl\">Widgets</div><div class=\"scard-val\" id=\"dc-widgets\">0</div><div class=\"scard-sub\">active</div></div>\n  </div>\n  <div class=\"g2\">\n    <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Quick Actions</div></div>\n      <div class=\"acard-body\">\n        <div class=\"qa-grid\">\n          <a class=\"qa\" onclick=\"aNav('blog',null);setTimeout(openBlogForm,60)\"><div class=\"qa-ic\">\ud83d\udcf0</div><div><div class=\"qa-lbl\">New Blog Post</div><div class=\"qa-sub\">Write &amp; publish</div></div></a>\n          <a class=\"qa\" onclick=\"aNav('pages',null);setTimeout(openPageForm,60)\"><div class=\"qa-ic\">\ud83d\udcc4</div><div><div class=\"qa-lbl\">New Page</div><div class=\"qa-sub\">Create &amp; publish</div></div></a>\n          <a class=\"qa\" onclick=\"aNav('images',null)\"><div class=\"qa-ic\">\ud83d\uddbc</div><div><div class=\"qa-lbl\">Upload Image</div><div class=\"qa-sub\">Add to library</div></div></a>\n          <a class=\"qa\" onclick=\"aNav('hero',null)\"><div class=\"qa-ic\">\u270f\ufe0f</div><div><div class=\"qa-lbl\">Edit Homepage</div><div class=\"qa-sub\">Hero &amp; sections</div></div></a>\n          <a class=\"qa\" onclick=\"aNav('page-builder',null)\"><div class=\"qa-ic\">\u2756</div><div><div class=\"qa-lbl\">Page Builder</div><div class=\"qa-sub\">Drag &amp; drop layout</div></div></a>\n          <a class=\"qa\" onclick=\"aNav('menus',null)\"><div class=\"qa-ic\">\u2630</div><div><div class=\"qa-lbl\">Edit Menus</div><div class=\"qa-sub\">Navigation links</div></div></a>\n        </div>\n      </div>\n    </div>\n    <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Site Pages \u2014 Click to View</div></div>\n      <div class=\"acard-body\" id=\"dash-sitepages\"></div>\n    </div>\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 HERO \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"apane\" id=\"pn-hero\">\n  <div class=\"apane-head\">\n    <div><h1>Hero Banner</h1><p>Homepage hero section \u2014 text, stats and video background.</p></div>\n    <div class=\"apane-actions\"><button class=\"abtn abtn-ghost abtn-sm\" onclick=\"goSite('home')\">\ud83d\udc41 View Homepage</button><button class=\"abtn abtn-gold\" onclick=\"saveHero()\">\ud83d\udcbe Save Hero</button></div>\n  </div>\n  <div class=\"g2\" style=\"align-items:start\">\n    <div>\n      <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Text &amp; Buttons</div></div>\n        <div class=\"acard-body\">\n          <div class=\"frow c2\">\n            <div class=\"fg\"><label>Eyebrow</label><input type=\"text\" id=\"h_eyebrow\"/></div>\n            <div class=\"fg\"><label>Heading Line 1</label><input type=\"text\" id=\"h_h1\"/></div>\n            <div class=\"fg\"><label>Heading Line 2 (amber)</label><input type=\"text\" id=\"h_h1em\"/></div>\n            <div class=\"fg\"><label>Sub Heading</label><input type=\"text\" id=\"h_sub\"/></div>\n            <div class=\"fg\"><label>Button 1 Label</label><input type=\"text\" id=\"h_b1l\"/></div>\n            <div class=\"fg\"><label>Button 1 URL</label><input type=\"text\" id=\"h_b1u\"/></div>\n            <div class=\"fg\"><label>Button 2 Label</label><input type=\"text\" id=\"h_b2l\"/></div>\n            <div class=\"fg\"><label>Button 2 URL</label><input type=\"text\" id=\"h_b2u\"/></div>\n          </div>\n        </div>\n      </div>\n      <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Stats Bar</div></div>\n        <div class=\"acard-body\">\n          <div class=\"frow c4\">\n            <div class=\"fg\"><label>Stat 1 #</label><input type=\"text\" id=\"h_s1n\"/></div>\n            <div class=\"fg\"><label>Label</label><input type=\"text\" id=\"h_s1l\"/></div>\n            <div class=\"fg\"><label>Stat 2 #</label><input type=\"text\" id=\"h_s2n\"/></div>\n            <div class=\"fg\"><label>Label</label><input type=\"text\" id=\"h_s2l\"/></div>\n            <div class=\"fg\"><label>Stat 3 #</label><input type=\"text\" id=\"h_s3n\"/></div>\n            <div class=\"fg\"><label>Label</label><input type=\"text\" id=\"h_s3l\"/></div>\n            <div class=\"fg\"><label>Stat 4 #</label><input type=\"text\" id=\"h_s4n\"/></div>\n            <div class=\"fg\"><label>Label</label><input type=\"text\" id=\"h_s4l\"/></div>\n          </div>\n        </div>\n      </div>\n    </div>\n    <div class=\"acard\"><div class=\"acard-head\">\n      <div class=\"acard-title\">Video Background</div>\n      <span class=\"abadge abadge-n\" id=\"hvid-status\">No video</span>\n    </div><div class=\"acard-body\">\n      <div class=\"atabs\">\n        <button class=\"atab on\" onclick=\"atab(this,'hvt-url')\">URL / Embed</button>\n        <button class=\"atab\" onclick=\"atab(this,'hvt-upload')\">Upload</button>\n      </div>\n      <div class=\"atpane on\" id=\"hvt-url\">\n        <div class=\"frow c2\">\n          <div class=\"fg\"><label>Video URL</label><input type=\"text\" id=\"h_vid_url\" placeholder=\"YouTube / Vimeo / MP4\" oninput=\"prevHeroVid(this.value)\"/></div>\n          <div class=\"fg\"><label>Source</label>\n            <select id=\"h_vid_type\" onchange=\"onVidTypeChange(this.value)\">\n              <option value=\"mp4\">Direct MP4</option><option value=\"youtube\">YouTube</option><option value=\"vimeo\">Vimeo</option>\n            </select>\n          </div>\n        </div>\n        <p style=\"font-size:11px;color:var(--mid)\">Free: <a href=\"https://www.pexels.com/search/videos/oil%20refinery/\" target=\"_blank\" style=\"color:var(--gold)\">Pexels</a> \u00b7 <a href=\"https://pixabay.com/videos/search/industrial/\" target=\"_blank\" style=\"color:var(--gold)\">Pixabay</a></p>\n      </div>\n      <div class=\"atpane\" id=\"hvt-upload\">\n        <div class=\"adz\" onclick=\"document.getElementById('h_vid_file').click()\">\n          <div class=\"adz-ic\">\ud83c\udfac</div><div class=\"adz-txt\"><strong>Click to upload</strong> MP4/WebM</div>\n          <input type=\"file\" id=\"h_vid_file\" accept=\"video/*\" onchange=\"handleHeroVidUpload(this)\"/>\n        </div>\n      </div>\n      <div id=\"hvid-preview-wrap\" style=\"display:none;margin-top:8px\">\n        <div style=\"position:relative;aspect-ratio:16/9;background:#000;border-radius:5px;overflow:hidden;max-height:150px\">\n          <video id=\"hvid-preview-video\" muted loop playsinline style=\"width:100%;height:100%;object-fit:cover;display:none\"></video>\n          <iframe id=\"hvid-preview-iframe\" style=\"width:100%;height:100%;border:none;display:none\" allowfullscreen></iframe>\n          <div id=\"hvid-preview-msg\" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:12px\">Preview</div>\n        </div>\n      </div>\n      <div class=\"frow c3\" style=\"margin-top:10px\">\n        <div class=\"fg\"><label>Autoplay</label><select id=\"h_vid_auto\"><option value=\"1\">Yes (muted)</option><option value=\"0\">No</option></select></div>\n        <div class=\"fg\"><label>Loop</label><select id=\"h_vid_lo ton onclick=\"fe3('italic')\"><i>I</i></button><button onclick=\"fe3('underline')\"><u>U</u></button>\n          <span class=\"sep\"></span>\n          <button onclick=\"fe3('formatBlock','h2')\">H2</button><button onclick=\"fe3('formatBlock','h3')\">H3</button><button onclick=\"fe3('formatBlock','p')\">P</button><button onclick=\"fe3('formatBlock','blockquote')\">\u275d</button>\n          <span class=\"sep\"></span>\n          <button onclick=\"fe3('insertUnorderedList')\">\u2022 List</button><button onclick=\"fe3('insertOrderedList')\">1. List</button>\n          <span class=\"sep\"></span>\n          <button onclick=\"insLink3()\">\ud83d\udd17</button><button onclick=\"insImg3()\">\ud83d\uddbc</button><button onclick=\"fe3('removeFormat')\">\u2715 Fmt</button>\n        </div>\n        <div class=\"rte\" id=\"bf_content\" contenteditable=\"true\" style=\"min-height:180px\">Write your article...</div>\n      </div>\n      <div class=\"frow c2\">\n        <div class=\"fg\"><label>Featured Image URL</label><input type=\"text\" id=\"bf_img\" placeholder=\"https://...\"/><button class=\"abtn abtn-ghost abtn-sm\" onclick=\"pickImgIntoField(\'bf_img\')\">\U0001F5BC Add Image</button><button class=\"abtn abtn-ghost abtn-sm\" onclick=\"pickImgIntoField(\'bf_img'\')\">&#128444; Add Image</button></div>\n        <div class=\"fg\"><label>Excerpt</label><textarea id=\"bf_excerpt\" style=\"min-height:58px\" placeholder=\"2\u20133 sentence summary...\"></textarea></div>\n      </div>\n      <div class=\"frow c2\">\n        <div class=\"fg\"><label>Status</label>\n          <select id=\"bf_status\"><option value=\"published\">Published</option><option value=\"draft\">Draft</option><option value=\"scheduled\">Scheduled</option></select>\n        </div>\n        <div class=\"fg\"><label>Publish Date</label><input type=\"text\" id=\"bf_pubdate\"/></div>\n      </div>\n    </div>\n    <input type=\"hidden\" id=\"bf_edit_id\"/>\n  </div>\n  <div class=\"acard\"><div class=\"acard-head\">\n    <div class=\"acard-title\">All Articles</div>\n    <span id=\"blog-count\" style=\"font-size:11px;color:var(--mid)\"></span>\n  </div><div id=\"blog-list\" style=\"padding:4px 10px\"></div></div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 MENUS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"apane\" id=\"pn-menus\">\n  <div class=\"apane-head\">\n    <div><h1>Menu Builder</h1><p>Build site navigation up to 4 levels. Changes update the site navigation on next load.</p></div>\n    <button class=\"abtn abtn-gold\" onclick=\"openNewMenuModal()\">+ New Menu</button>\n  </div>\n  <div style=\"display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:start\">\n    <div>\n      <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">All Menus</div></div>\n        <div class=\"acard-body\" style=\"padding:8px\"><div id=\"menu-list\"></div></div>\n      </div>\n      <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Add Item</div></div>\n        <div class=\"acard-body\">\n          <div class=\"atabs\">\n            <button class=\"atab on\" onclick=\"atab(this,'mi-pg')\">Page</button>\n            <button class=\"atab\" onclick=\"atab(this,'mi-cu')\">Custom</button>\n            <button class=\"atab\" onclick=\"atab(this,'mi-ca')\">Category</button>\n          </div>\n          <div class=\"atpane on\" id=\"mi-pg\">\n            <div class=\"fg\"><label>Site Page</label>\n              <select id=\"mi-page-sel\"><option>Home</option><option>Products</option><option>Rim Seals</option><option>Mechanical Shoe Seals</option><option>Liquid Mounted Primary</option><option>Vapour Mounted Primary</option><option>Secondary Seals</option><option>Wiper Seals</option><option>Seal Fittings</option><option>Lightning Protection</option><option>Blog</option><option>Contact</option><option>About Sealworks</option></select>\n            </div>\n            <div class=\"fg\"><label>Label Override</label><input type=\"text\" id=\"mi-page-lbl\" placeholder=\"Leave blank to use page name\"/></div>\n            <button class=\"abtn abtn-gold abtn-sm\" onclick=\"addMenuItem('page')\">Add to Menu</button>\n          </div>\n          <div class=\"atpane\" id=\"mi-cu\">\n            <div class=\"frow c2\">\n              <div class=\"fg\"><label>Label</label><input type=\"text\" id=\"mi-cl\" placeholder=\"Buy Spares\"/></div>\n              <div class=\"fg\"><label>URL</label><input type=\"text\" id=\"mi-cu-url\" placeholder=\"https://...\"/></div>\n            </div>\n            <div class=\"frow c2\">\n              <div class=\"fg\"><label>Open In</label><select id=\"mi-ct\"><option value=\"_self\">Same Tab</option><option value=\"_blank\">New Tab</option></select></div>\n              <div class=\"fg\"><label>CSS Class</label><input type=\"text\" id=\"mi-cc\" placeholder=\"optional\"/></div>\n            </div>\n            <button class=\"abtn abtn-gold abtn-sm\" onclick=\"addMenuItem('custom')\">Add to Menu</button>\n          </div>\n          <div class=\"atpane\" id=\"mi-ca\">\n            <div class=\"fg\"><label>Category</label>\n              <select id=\"mi-cat-sel\"><option>Products</option><option>Rim Seals</option><option>Blog</option><option>Technical Guides</option></select>\n            </div>\n            <button class=\"abtn abtn-gold abtn-sm\" onclick=\"addMenuItem('cat')\">Add to Menu</button>\n          </div>\n        </div>\n      </div>\n      <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Jump to Site Page</div></div>\n        <div class=\"acard-body\" style=\"padding:8px;display:flex;flex-direction:column;gap:3px\"><button onclick=\"goSite('home')\" class=\"spnav-btn\"><span>\ud83c\udfe0 Home</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('products')\" class=\"spnav-btn\"><span>\u2b21 Products</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('rim-seals')\" class=\"spnav-btn\"><span>\u2b21 Rim Seals</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('mechanical-shoe-seals')\" class=\"spnav-btn\"><span>\ud83d\udd29 Mechanical Shoe Seals</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('liquid-mounted-primary-seals')\" class=\"spnav-btn\"><span>\ud83d\udca7 Liquid Mounted Primary</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('vapour-mounted-primary-seals')\" class=\"spnav-btn\"><span>\u2601 Vapour Mounted Primary</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('secondary-seals')\" class=\"spnav-btn\"><span>\ud83d\udee1 Secondary Seals</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('wiper-seals')\" class=\"spnav-btn\"><span>\ud83d\udd04 Wiper Seals</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('seal-fittings')\" class=\"spnav-btn\"><span>\u2699 Seal Fittings</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('lightning-protection')\" class=\"spnav-btn\"><span>\u26a1 Lightning Protection</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('blog')\" class=\"spnav-btn\"><span>\ud83d\udcf0 Blog</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('contact')\" class=\"spnav-btn\"><span>\ud83d\udcec Contact</span><span class=\"spnav-arr\">\u2192</span></button>\n<button onclick=\"goSite('about')\" class=\"spnav-btn\"><span>\u25c9 About Sealworks</span><span class=\"spnav-arr\">\u2192</span></button>\n        </div>\n      </div>\n    </div>\n    <div class=\"acard\">\n      <div class=\"acard-head\">\n        <div class=\"acard-title\" id=\"menu-edit-title\">Menu Structure</div>\n        <div style=\"display:flex;gap:5px\">\n          <button class=\"abtn abtn-ok abtn-sm\" onclick=\"saveMenu()\">\ud83d\udcbe Save Menu</button>\n          <button class=\"abtn abtn-ghost abtn-sm\" onclick=\"collapseAll()\">Collapse</button>\n        </div>\n      </div>\n      <div class=\"acard-body\">\n        <p style=\"font-size:11.5px;color:var(--mid);margin-bottom:10px\">Click <strong>\u25b8+ Child</strong> to add sub-items (max 4 levels). Click any label to edit inline. <strong>Save Menu</strong> to apply changes.</p>\n        <div id=\"menu-tree\" style=\"min-height:80px\"></div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 IMAGES \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"apane\" id=\"pn-images\">\n  <div class=\"apane-head\"><div><h1>Image Library</h1><p>Upload or link images. Click to copy URL.</p></div></div>\n  <div class=\"g2\" style=\"align-items:start\">\n    <div>\n      <div class=\"acard\"><div class=\"acard-head\">\n        <div class=\"acard-title\">Hosting Setup (ImgBB Free)</div>\n        <span class=\"abadge abadge-r\" id=\"imgbb-status-badge\">Not set</span>\n      </div><div class=\"acard-body\">\n        <p style=\"font-size:12px;color:var(--mid);margin-bottom:9px\">Images host on <strong>ImgBB</strong> (free, 32MB/img). Key from <a href=\"https://api.imgbb.com\" target=\"_blank\" style=\"color:var(--gold)\">api.imgbb.com</a>.</p>\n        <div style=\"display:flex;gap:6px;align-items:flex-end\">\n          <div class=\"fg\" style=\"flex:1;margin:0\"><label>API Key</label><input type=\"text\" id=\"imgbb-key-field\" placeholder=\"Paste your key...\"/></div>\n          <button class=\"abtn abtn-gold abtn-sm\" onclick=\"saveImgBBKey()\" style=\"margin-bottom:1px\">Save</button>\n          <a href=\"https://api.imgbb.com\" target=\"_blank\" class=\"abtn abtn-ghost abtn-sm\" style=\"text-decoration:none;margin-bottom:1px\">Get Free \u2192</a>\n        </div>\n      </div></div>\n      <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Add Image</div></div>\n        <div class=\"acard-body\">\n          <div class=\"atabs\">\n            <button class=\"atab on\" onclick=\"atab(this,'img-upload-tab')\">Upload</button>\n            <button class=\"atab\" onclick=\"atab(this,'img-url-tab')\">Paste URL</button>\n          </div>\n          <div class=\"atpane on\" id=\"img-upload-tab\">\n            <div class=\"adz\" id=\"drop-zone\" onclick=\"document.getElementById('img-inp').click()\" ondragover=\"event.preventDefault();this.classList.add('drag')\" ondragleave=\"this.classList.remove('drag')\" ondrop=\"handleDrop(event)\">\n              <div class=\"adz-ic\">\ud83d\uddbc</div>\n              <div class=\"adz-txt\"><strong>Click to browse</strong> or drag &amp; drop<br/><small style=\"font-size:10.5px\">PNG \u00b7 JPG \u00b7 WEBP \u00b7 stored in browser locally</small></div>\n              <input type=\"file\" id=\"img-inp\" multiple accept=\"image/*\" onchange=\"handleUpload(this)\"/>\n            </div>\n          </div>\n          <div class=\"atpane\" id=\"img-url-tab\">\n            <div class=\"frow c2\">\n              <div class=\"fg\"><label>Image URL</label><input type=\"text\" id=\"img-url-input\" placeholder=\"https://...\"/></div>\n              <div class=\"fg\"><label>Name</label><input type=\"text\" id=\"img-url-name\" placeholder=\"hero-photo.jpg\"/></div>\n            </div>\n            <button class=\"abtn abtn-gold abtn-sm\" onclick=\"addImageByUrl()\">Add Image</button>\n            <p style=\"font-size:11px;color:var(--mid);margin-top:6px\">Locally uploaded images are saved in your browser. For persistent hosting use <a href=\"https://imgbb.com\" target=\"_blank\" style=\"color:var(--gold)\">imgbb.com</a> or <a href=\"https://cloudinary.com\" target=\"_blank\" style=\"color:var(--gold)\">Cloudinary</a>.</p>\n          </div>\n        </div>\n      </div>\n    </div>\n    <div class=\"acard\"><div class=\"acard-head\">\n      <div class=\"acard-title\">Library</div>\n      <span id=\"img-lib-count\" style=\"font-size:11px;color:var(--mid)\"></span>\n    </div><div class=\"acard-body\">\n      <div class=\"img-grid\" id=\"img-grid\"></div>\n      <p style=\"font-size:11px;color:var(--mid);margin-top:7px\">Click any image to copy URL to clipboard.</p>\n    </div></div>\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 VIDEOS \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"apane\" id=\"pn-videos\">\n  <div class=\"apane-head\"><div><h1>Videos</h1><p>Embed YouTube, Vimeo or direct MP4 videos.</p></div></div>\n  <div class=\"g2\" style=\"align-items:start\">\n    <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Add Video</div></div>\n      <div class=\"acard-body\">\n        <div class=\"fg\"><label>Video URL</label>\n          <input type=\"text\" id=\"vid-url\" placeholder=\"https://youtube.com/watch?v=...\" oninput=\"prevVid(this.value)\"/>\n        </div>\n        <div class=\"frow c2\">\n          <div class=\"fg\"><label>Title</label><input type=\"text\" id=\"vid-title\" placeholder=\"Installation Overview\"/></div>\n          <div class=\"fg\"><label>Placement</label>\n            <select id=\"vid-place\"><option>Hero Section</option><option>About Section</option><option>Products</option><option>Standalone Page</option></select>\n          </div>\n        </div>\n        <div class=\"fg\"><label>Description</label><textarea id=\"vid-desc\" style=\"min-height:52px\"></textarea></div>\n        <div class=\"vid-prev\" id=\"vid-prev\">Video preview</div>\n        <div class=\"fact\"><button class=\"abtn abtn-gold\" onclick=\"saveVideo()\">\ud83d\udcbe Save Video</button></div>\n      </div>\n    </div>\n    <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Video Library</div></div>\n      <div class=\"acard-body\"><div id=\"video-list\"></div></div>\n    </div>\n  </div>\n</div>\n\n<!-- \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 PAGE BUILDER \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 -->\n<div class=\"apane\" id=\"pn-page-builder\">\n  <div class=\"apane-head\">\n    <div><h1>Page Builder</h1><p>Drag widgets onto the canvas to build custom page layouts.</p></div>\n    <div class=\"apane-actions\">\n      <select id=\"pb-target\" style=\"border:1px solid var(--slate2);border-radius:5px;padding:6px 10px;font-size:12px;color:var(--text);background:#fff;outline:none;cursor:pointer\">\n        <option value=\"\">Assign to page...</option><option value=\"home\">Home</option><option value=\"products\">Products</option><option value=\"rim-seals\">Rim Seals</option><option value=\"mechanical-shoe-seals\">Mechanical Shoe Seals</option><option value=\"liquid-mounted-primary-seals\">Liquid Mounted Primary</option><option value=\"vapour-mounted-primary-seals\">Vapour Mounted Primary</option><option value=\"secondary-seals\">Secondary Seals</option><option value=\"wiper-seals\">Wiper Seals</option><option value=\"seal-fittings\">Seal Fittings</option><option value=\"lightning-protection\">Lightning Protection</option><option value=\"blog\">Blog</option><option value=\"contact\">Contact</option><option value=\"about\">About Sealworks</option>\n      </select>\n      <button class=\"abtn abtn-ok\" onclick=\"savePageLayout()\">\ud83d\udcbe Save Layout</button>\n    </div>\n  </div>\n  <div style=\"display:grid;grid-template-columns:180px 1fr;gap:14px;align-items:start\">\n    <div class=\"acard\"><div class=\"acard-head\"><div class=\"acard-title\">Widgets</div></div>\n      <div class=\"acard-body\" style=\"padding:8px\">\n        <div style=\"display:flex;flex-direction:column;gap:5px\"><div class=\"wlitem\" draggable=\"true\" ondragstart=\"pbDragStart(event,'hero')\" style=\"te function cmsGet(){try{const s=localStorage.getItem(KEY);if(!s)return JSON.parse(JSON.stringify(DEF));return deepMerge(JSON.parse(JSON.stringify(DEF)),JSON.parse(s));}catch(e){return JSON.parse(JSON.stringify(DEF));}}
function cmsSet(d){try{localStorage.setItem(KEY,JSON.stringify(d));return true;}catch(e){showToast('Storage error','bad');return false;}}
function cmsUpd(sec,vals){const d=cmsGet();d[sec]={...(d[sec]||{}),...vals};cmsSet(d);}
function deepMerge(def,stored){const out={...def};for(const k in stored){if(stored[k]!==null&&typeof stored[k]==='object'&&!Array.isArray(stored[k])&&typeof def[k]==='object'&&!Array.isArray(def[k])){out[k]=deepMerge(def[k],stored[k]);}else{out[k]=stored[k];}}return out;}
