og');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">&#9881; Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div>\n  <div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products › Rim Seals › Wiper Seals</div>\n    <h1>Wiper <em>Seals</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.wip.hero_desc\">Periphery-mounted wiper seals maintain continuous contact with the tank shell during roof movement, preventing product carry-up, reducing shell contamination, and minimising vapour release.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">›</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">›</span><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a><span class=\"sep\">›</span><span class=\"cur\">Wiper Seals</span></div>\n  </div>\n</div>\n\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-wip\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">🖼️</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"wip\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-wip\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-wip\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">🖼️</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-wip\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div><div class=\"product-wrap\">\n  <div class=\"product-intro\">\n    <!-- IMAGE BLOCK -->\n    <div class=\"product-img-block\">\n      <div class=\"prod-main-img-wrap\" id=\"prod-img-main-wip\">\n        <span class=\"prod-main-img-placeholder-icon\" id=\"prod-img-ph-wip\">🔄</span>\n        <img id=\"adm-main-img-wip\" src=\"\" alt=\"Product image\" onload=\"this.classList.add(\\'loaded\\');document.getElementById(\\'prod-img-ph-wip\\').style.display=\\'none\\'\" onerror=\"this.classList.remove(\\'loaded\\')\"/>\n        <div class=\"prod-img-admin-overlay\">\n          <button class=\"prod-img-upload-btn\" onclick=\"pickProductMainImg(\\'wip\\')\">\n            &#128247; Change Image\n          </button>\n        </div>\n      </div>\n      <div id=\"prod-vid-wip\" style=\"display:none;position:absolute;inset:0;z-index:0\"></div>\n            <div class=\"prod-img-thumbs-row\">\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\\'admin-active\\')&&pickProductThumb(\\'wip\\',1)\" id=\"prod-img-t1-wip\">\n          <img id=\"adm-t1-img-wip\" src=\"\" alt=\"\" onload=\"this.classList.add(\\'loaded\\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\\'admin-active\\')&&pickProductThumb(\\'wip\\',2)\" id=\"prod-img-t2-wip\">\n          <img id=\"adm-t2-img-wip\" src=\"\" alt=\"\" onload=\"this.classList.add(\\'loaded\\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\\'admin-active\\')&&pickProductThumb(\\'wip\\',3)\" id=\"prod-img-t3-wip\">\n          <img id=\"adm-t3-img-wip\" src=\"\" alt=\"\" onload=\"this.classList.add(\\'loaded\\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n      </div>\n    </div>\n    <!-- INTRO TEXT -->\n    <div class=\"product-intro-text\">\n      <div class=\"section-label\">Product Detail</div>\n      <h2 data-cms=\"products.wip.title\">Wiper Seals</h2>\n      <div class=\"divider\"></div>\n      <p data-cms=\"products.wip.intro1\">Wiper seals are fitted to the outermost edge of the floating roof rim and maintain physical contact with the inner tank shell surface at all times. As the roof rises and falls with changing product levels, the wiper continuously cleans the shell surface, preventing liquid hydrocarbon from being dragged upward on the shell wall.</p>\n      <p data-cms=\"products.wip.intro2\">Product carry-up on the tank shell creates contamination on the shell surface above the roof, increasing evaporative losses and creating a fire and safety hazard. Wiper seals eliminate this mechanism and are often used in conjunction with secondary seals to achieve the lowest possible total emission factors.</p>\n      <div class=\"product-badges\"><span class=\"prod-badge\">Prevents product carry-up</span><span class=\"prod-badge\">Continuous wiper contact</span><span class=\"prod-badge\">PTFE or PU wiper blade</span><span class=\"prod-badge\">In-service replaceable</span><span class=\"prod-badge\">Works with all primary seals</span></div>\n      <div style=\"display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem\">\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request a Quote →</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\">Technical Enquiry</a>\n      </div>\n    </div>\n  </div>\n</div></div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">📰 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts →</a></div>\n<div id=\"prod-blog-sidebar-wip\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n\n<!-- SPECS -->\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div>\n        <div class=\"section-label\">Technical Data</div>\n        <div class=\"specs-title\">Specifications</div>\n        <p class=\"specs-sub\">All specifications are standard values. Custom configurations available based on tank dimensions, product stored, and operating conditions.</p>\n        <div class=\"compliance-badges\">\n          <span class=\"comp-badge\">API 650</span>\n          <span class=\"comp-badge\">API MPMS 19.2</span>\n          <span class=\"comp-badge\">API 545</span>\n          <span class=\"comp-badge\">IS 10987</span>\n        </div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Parameter</th><th>Specification</th></tr></thead>\n          <tbody><tr><td>Wiper Material</td><td>PTFE / Polyurethane / Nitrile rubber</td></tr><tr><td>Contact Type</td><td>Continuous shell contact</td></tr><tr><td>Mounting Position</td><td>Outermost roof rim periphery</td></tr><tr><td>Application</td><td>External floating roof tanks (EFR)</td></tr><tr><td>Tank Diameter</td><td>All sizes</td></tr><tr><td>Operating Temperature</td><td>-30°C to +100°C</td></tr><tr><td>Shell Surface</td><td>Standard mill finish / smooth</td></tr><tr><td>Replacement</td><td>In-service wiper blade replacement</td></tr><tr><td>Standards</td><td>Compatible with API 650</td></tr><tr><td>Frequency of Replacement</td><td>Typically 3–5 years depending on service</td></tr></tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- FEATURES -->\n<div class=\"features-section\">\n  <div class=\"features-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Why Choose This Product</span>\n      <h2>Key Features & Benefits</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"features-grid\">\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">🔄</div>\n      <h4>Prevents Shell Contamination</h4>\n      <p>Continuously wipes the shell surface as the roof travels, preventing product carry-up that would otherwise evaporate above the roof.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">🛡</div>\n      <h4>Reduces Fire Risk</h4>\n      <p>By preventing hydrocarbon film on the shell above the roof, wiper seals reduce the risk of vapour ignition in the rim space.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">🔧</div>\n      <h4>Easy Blade Replacement</h4>\n      <p>Wiper blades can be replaced individually or in sections during routine inspection without major disassembly.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">⚙</div>\n      <h4>Works with All Seal Types</h4>\n      <p>Compatible as an addition to any primary seal system — mechanical shoe, liquid, or vapour-mounted.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">💰</div>\n      <h4>Low Operating Cost</h4>\n      <p>Inexpensive to maintain; replacement blades are readily available and quick to install during routine maintenance.</p>\n    </div>\n    <div class=\"feat-card\">\n      <div class=\"feat-icon\">📋</div>\n      <h4>Multiple Material Options</h4>\n      <p>PTFE for chemical resistance, polyurethane for abrasion resistance, nitrile for hydrocarbon service.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- APPLICATIONS -->\n<div class=\"apps-section\">\n  <div class=\"apps-inner\">\n    <div class=\"section-hd\">\n      <span class=\"slbl\">Where It's Used</span>\n      <h2>Applications</h2>\n      <div class=\"bar\"></div>\n    </div>\n    <div class=\"apps-grid\">\n    <div class=\"app-item\">\n      <div class=\"app-num\">01</div>\n      <h4>All External Floating Roof Tanks</h4>\n      <p>Standard addition to rim seal systems on EFR tanks handling any petroleum product.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">02</div>\n      <h4>High-Throughput Tanks</h4>\n      <p>Tanks with frequent product movements and large changes in roof travel particularly benefit from wiper seals.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">03</div>\n      <h4>Hot Product Service</h4>\n      <p>Tanks storing warm products where carry-up evaporation rates are higher.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">04</div>\n      <h4>Shell Corrosion Prevention</h4>\n      <p>Wiper action removes corrosive product residues from the shell surface above the roof.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">05</div>\n      <h4>Stringent Environmental Sites</h4>\n      <p>Facilities where minimum total emission factors are mandated by environmental authorities.</p>\n    </div>\n    <div class=\"app-item\">\n      <div class=\"app-num\">06</div>\n      <h4>Refinery Product Tanks</h4>\n      <p>Finished product storage where product contamination from shell carry-up must be prevented.</p>\n    </div>\n    </div>\n  </div>\n</div>\n\n<!-- RELATED -->\n<div class=\"related-section\">\n  <div class=\"related-inner\">\n    <div class=\"section-hd\" style=\"text-align:left\">\n      <span class=\"slbl\">Complete Your System</span>\n      <h2 style=\"text-align:left\">Related Products</h2>\n      <div class=\"bar\" style=\"margin-left:0\"></div>\n    </div>\n    <div class=\"related-grid\">\n    <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">🔩</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Mechanical Shoe Seals</h4>\n        <p>High-efficiency metallic primary seals for all floating roof tank types.</p>\n        <span class=\"rel-card-link\">Learn More →</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">🛡</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Rim Seals</div>\n        <h4>Secondary Seals</h4>\n        <p>Additional vapour barrier reducing combined emission factors by up to 96%.</p>\n        <span class=\"rel-card-link\">Learn More →</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">⚙</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Seal Fittings</div>\n        <h4>Seal Fittings</h4>\n        <p>Gauging hatches, bleeder vents and deck drain valves for complete roof systems.</p>\n        <span class=\"rel-card-link\">Learn More →</span>\n      </div>\n    </a>\n    <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\" class=\"rel-card\">\n      <div class=\"rel-card-img\">⚡</div>\n      <div class=\"rel-card-body\">\n        <div class=\"rel-card-tag\">Lightning Protection</div>\n        <h4>Lightning Protection Systems</h4>\n        <p>API 545 compliant bonding and grounding for floating roof tanks.</p>\n        <span class=\"rel-card-link\">Learn More →</span>\n      </div>\n    </a>\n    </div>\n  </div>\n</div>\n\n<!-- CTA -->\n<div class=\"cta-box\">\n  <div class=\"cta-box-inner\">\n    <h3>Request a Technical Quotation</h3>\n    <p>Provide your tank dimensions, product stored, and operating conditions — our engineers will recommend the optimal seal configuration and provide a detailed quotation.</p>\n    <div class=\"cta-btns\">\n      <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Contact Our Engineers →</a>\n      <a href=\"http://www.tankprotocol.com\" target=\"_blank\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">Calculate Emissions</a>\n    </div>\n  </div>\n</div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\" target=\"_blank\">Buy Spares</a></li>\n        <li><a href=\"http://www.tankprotocol.com\" target=\"_blank\">Tank Protocol</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Connect</div>\n      <ul>\n        <li><a href=\"https://facebook.com\" target=\"_blank\">Facebook</a></li>\n        <li><a href=\"https://twitter.com\" target=\"_blank\">Twitter / X</a></li>\n        <li><a href=\"https://youtube.com\" target=\"_blank\">YouTube</a></li>\n        <li><a href=\"https://instagram.com\" target=\"_blank\">Instagram</a></li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\">&copy; 2026 Petrodek Systems &middot; All Rights Reserved &middot; An ESRAI GROUP Enterprise</div>\n    <div class=\"social-links\">\n      <a href=\"https://facebook.com\" target=\"_blank\">f</a>\n      <a href=\"https://twitter.com\" target=\"_blank\">&#120143;</a>\n      <a href=\"https://youtube.com\" target=\"_blank\">&#9654;</a>\n      <a href=\"https://instagram.com\" target=\"_blank\">&#9678;</a>\n    </div>\n  </div>\n</footer>"},
"seal-fittings":{title:"Seal Fittings \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"var nl=this.closest('nav').querySelector('.nav-links');nl.classList.toggle('open');\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"if(window.innerWidth<=900){this.closest('.has-dropdown').classList.toggle('open');return false;}showPage('products');return false;\">Products &#9662;</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\" style=\"font-weight:600;color:var(--accent);\">Rim Seals &#9658;</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">&#9881; Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div><div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products › Seal Fittings</div>\n    <h1>Seal <em>Fittings</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.fit.hero_desc\">Precision-engineered tank roof fittings and accessories for external floating roof tanks — designed to complement and complete the Petrodek rim seal system.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">›</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">›</span><span class=\"cur\">Seal Fittings</span></div>\n  </div>\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-fit\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">🖼️</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"fit\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-fit\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-fit\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">🖼️</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-fit\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div></div>\n<div style=\"max-width:1200px;margin:0 auto;padding:70px 5%\">\n  <div class=\"section-hd\"><span class=\"slbl\">Complete Tank Roof Accessories</span><h2>Fittings Range</h2><div class=\"bar\"></div></div>\n  <div class=\"features-grid\" style=\"margin-top:2.5rem\">\n    <div class=\"feat-card\"><div class=\"feat-icon\">🔲</div><h4>Gauging Hatches</h4><p>Roof-mounted hatches for manual gauging, sampling, and thief access. Available in 8\", 10\", and 12\" NB with self-closing hinged covers and locking handles. Fitted with vapour-tight seals.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">🌀</div><h4>Bleeder Vents</h4><p>Automatic pressure/vacuum relief vents that equalise pressure between the underside of the floating roof and the vapour space during roof travel. Spring-loaded valve disc.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">🔌</div><h4>Deck Drain Valves</h4><p>Spring-loaded or float-operated drain valves mounted on the roof deck to discharge rainwater accumulation. Prevents roof submersion while avoiding product contamination.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">📏</div><h4>Roof Leg Assemblies</h4><p>Adjustable support legs that hold the floating roof in the landed position during tank inspection and maintenance. High and low landing positions; load-rated to API 650 requirements.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">🔗</div><h4>Roof Drain Lines</h4><p>Articulated or flexible piped drain systems routed from the deck to the tank bottom. Handles rainwater drainage safely without product contamination. Swivel joints or flexible hose options.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">🛠</div><h4>Sample Hatches</h4><p>Purpose-built sample access hatches with spring-return self-closing covers. Suitable for safe product sampling operations at all roof positions. Available with vapour-lock designs.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">⚡</div><h4>Anti-Rotation Devices</h4><p>Guide poles, rolling ladders, and anti-rotation systems to control roof movement and maintain alignment. Essential for tanks subject to wind load and seismic requirements.</p></div>\n    <div class=\"feat-card\"><div class=\"feat-icon\">🔧</div><h4>Foam Dam Systems</h4><p>Fixed foam dams for fixed-roof-foam system penetrations on EFR tanks. Required where firefighting foam injection is specified by fire safety standards.</p></div>\n  </div>\n</div>\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div><div class=\"section-label\">Standards Compliance</div><div class=\"specs-title\">Design Standards</div>\n        <p class=\"specs-sub\">All fittings are designed, fabricated, and inspected in accordance with applicable API, IS, and international standards.</p>\n        <div class=\"compliance-badges\"><span class=\"comp-badge\">API 650</span><span class=\"comp-badge\">API 2000</span><span class=\"comp-badge\">API 545</span><span class=\"comp-badge\">IS 10987</span><span class=\"comp-badge\">OISD 117</span></div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Fitting Type</th><th>Standard Size Range</th></tr></thead>\n          <tbody>\n            <tr><td>Gauging Hatches</td><td>8\", 10\", 12\" NB</td></tr>\n            <tr><td>Bleeder Vents</td><td>2\", 3\", 4\" NB</td></tr>\n            <tr><td>Deck Drain Valves</td><td>4\", 6\", 8\" NB</td></tr>\n            <tr><td>Roof Legs</td><td>Dia. 150–300 mm</td></tr>\n            <tr><td>Sample Hatches</td><td>4\", 6\" NB</td></tr>\n            <tr><td>Foam Dam</td><td>To tank-specific design</td></tr>\n            <tr><td>Material Standard</td><td>ASTM A36 / A240 / A182</td></tr>\n            <tr><td>Inspection</td><td>TPIA per client requirement</td></tr>\n          </tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n<div class=\"cta-box\"><div class=\"cta-box-inner\"><h3>Request a Fittings Schedule</h3><p>Provide your tank drawings or dimensions and we'll prepare a comprehensive fitting schedule with itemised quotation.</p><div class=\"cta-btns\"><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request Quote →</a></div></div></div>\n\n</div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">📰 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts →</a></div>\n<div id=\"prod-blog-sidebar-fit\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">ESRAI Group</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">About ESRAI GROUP</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n        <li><a href=\"http://www.astspares.com\" target=\"_blank\">Buy Spares</a></li>\n        <li><a href=\"http://www.tankprotocol.com\" target=\"_blank\">Tank Protocol</a></li>\n      </ul>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Connect</div>\n      <ul>\n        <li><a href=\"https://facebook.com\" target=\"_blank\">Facebook</a></li>\n        <li><a href=\"https://twitter.com\" target=\"_blank\">Twitter / X</a></li>\n        <li><a href=\"https://youtube.com\" target=\"_blank\">YouTube</a></li>\n        <li><a href=\"https://instagram.com\" target=\"_blank\">Instagram</a></li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"footer-bottom\">\n    <div class=\"footer-copy\">&copy; 2026 Petrodek Systems &middot; All Rights Reserved &middot; An ESRAI GROUP Enterprise</div>\n    <div class=\"social-links\">\n      <a href=\"https://facebook.com\" target=\"_blank\">f</a>\n      <a href=\"https://twitter.com\" target=\"_blank\">&#120143;</a>\n      <a href=\"https://youtube.com\" target=\"_blank\">&#9654;</a>\n      <a href=\"https://instagram.com\" target=\"_blank\">&#9678;</a>\n    </div>\n  </div>\n</footer>"},
"lightning-protection":{title:"Lightning Protection \u2014 PETRODEK SYSTEMS",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"var nl=this.closest('nav').querySelector('.nav-links');nl.classList.toggle('open');\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"if(window.innerWidth<=900){this.closest('.has-dropdown').classList.toggle('open');return false;}showPage('products');return false;\">Products &#9662;</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\" style=\"font-weight:600;color:var(--accent);\">Rim Seals &#9658;</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">&#9881; Admin</a></li>\n  </ul>\n</nav>\n\n<div class=\"page-hero\">\n  <div class=\"ph-grid\"></div><div class=\"ph-glow\"></div>\n  <div class=\"ph-inner\">\n    <div class=\"ph-eyebrow\">Products › Lightning Protection</div>\n    <h1>Lightning <em>Protection</em></h1>\n    <p class=\"ph-desc\" data-cms=\"products.lp.hero_desc\">Bonding and lightning protection systems for external floating roof petroleum storage tanks — protecting assets, personnel, and the environment from electrical hazards in compliance with API 545 and NFPA 780.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a><span class=\"sep\">›</span><a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\">Products</a><span class=\"sep\">›</span><span class=\"cur\">Lightning Protection</span></div>\n  </div>\n</div>\n\n<div class=\"prod-page-layout\">\n<div class=\"prod-sidebar-left\">\n<div class=\"prod-img-sidebar-widget\" id=\"pisw-lp\">\n<div class=\"prod-doc-wh\">\n<span style=\"font-size:.9rem\">🖼️</span>\n<div class=\"prod-doc-wt\">Factsheet</div>\n<button class=\"pisw-add-btn\" data-pid=\"lp\" onclick=\"pickSidebarImg(this.dataset.pid)\" style=\"background:rgba(232,160,32,.15);border:1px solid rgba(232,160,32,.45);color:#e8a020;font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .55rem;border-radius:4px;cursor:pointer;font-family:inherit\">+ Add from Gallery</button>\n</div>\n<div class=\"pisw-body\" id=\"pisw-body-lp\">\n<div class=\"pisw-placeholder\" id=\"pisw-ph-lp\">\n<div style=\"font-size:2rem;opacity:.25;margin-bottom:.4rem\">🖼️</div>\n<div style=\"font-size:.68rem;color:#aabbc8;text-align:center;line-height:1.5\">No image yet.<br/>Click <em>+ Add from Gallery</em></div>\n</div>\n<img class=\"pisw-img\" id=\"pisw-img-lp\" src=\"\" alt=\"\" style=\"width:100%;height:auto;display:none\"/>\n</div>\n</div></div>\n<div><div class=\"product-wrap\">\n  <div class=\"product-intro\">\n    <!-- IMAGE BLOCK -->\n    <div class=\"product-img-block\">\n      <div class=\"prod-main-img-wrap\" id=\"prod-img-main-lp\">\n        <span class=\"prod-main-img-placeholder-icon\" id=\"prod-img-ph-lp\">⚡</span>\n        <img id=\"adm-main-img-lp\" src=\"\" alt=\"Product image\" onload=\"this.classList.add(\\'loaded\\');document.getElementById(\\'prod-img-ph-lp\\').style.display=\\'none\\'\" onerror=\"this.classList.remove(\\'loaded\\')\"/>\n        <div class=\"prod-img-admin-overlay\">\n          <button class=\"prod-img-upload-btn\" onclick=\"pickProductMainImg(\\'lp\\')\">\n            &#128247; Change Image\n          </button>\n        </div>\n      </div>\n      <div id=\"prod-vid-lp\" style=\"display:none;position:absolute;inset:0;z-index:0\"></div>\n            <div class=\"prod-img-thumbs-row\">\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\\'admin-active\\')&&pickProductThumb(\\'lp\\',1)\" id=\"prod-img-t1-lp\">\n          <img id=\"adm-t1-img-lp\" src=\"\" alt=\"\" onload=\"this.classList.add(\\'loaded\\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\\'admin-active\\')&&pickProductThumb(\\'lp\\',2)\" id=\"prod-img-t2-lp\">\n          <img id=\"adm-t2-img-lp\" src=\"\" alt=\"\" onload=\"this.classList.add(\\'loaded\\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n        <div class=\"prod-img-thumb-cell\" onclick=\"body.classList.contains(\\'admin-active\\')&&pickProductThumb(\\'lp\\',3)\" id=\"prod-img-t3-lp\">\n          <img id=\"adm-t3-img-lp\" src=\"\" alt=\"\" onload=\"this.classList.add(\\'loaded\\')\"/>\n          <div class=\"prod-img-thumb-overlay\">&#128247; Change</div>\n        </div>\n      </div>\n    </div>\n    <div class=\"product-intro-text\">\n      <div class=\"section-label\">Safety Systems</div>\n      <h2 data-cms=\"products.lp.title\">Floating Roof Tank Bonding</h2>\n      <div class=\"divider\"></div>\n      <p data-cms=\"products.lp.intro1\">External floating roof tanks store large volumes of highly flammable petroleum products. A direct lightning strike — or even an induced transient voltage — can ignite vapours in the rim seal space, potentially causing catastrophic tank fire and explosion.</p>\n      <p data-cms=\"products.lp.intro2\">Petrodek supplies complete lightning protection and electrical bonding systems that maintain continuous electrical continuity between the floating roof and the tank shell at all roof positions, eliminating the potential for spark discharge across the rim space.</p>\n      <div class=\"product-badges\">\n        <span class=\"prod-badge\">API 545 Compliant</span>\n        <span class=\"prod-badge\">NFPA 780</span>\n        <span class=\"prod-badge\">Continuous continuity</span>\n        <span class=\"prod-badge\">All roof positions</span>\n        <span class=\"prod-badge\">Test point provision</span>\n      </div>\n      <div style=\"display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem\">\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request Assessment →</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\">Technical Enquiry</a>\n      </div>\n    </div>\n  </div>\n</div></div>\n<div class=\"prod-sidebar-right\">\n<div class=\"prod-blog-widget\">\n<div class=\"prod-bw-head\"><div class=\"prod-bw-title\">📰 Latest Articles</div><a onclick=\"showPage('blog');return false;\" href=\"javascript:void(0)\" class=\"prod-bw-all\">All Posts →</a></div>\n<div id=\"prod-blog-sidebar-lp\"><div class=\"prod-bw-empty\">No articles yet.</div></div></div></div>\n</div>\n\n<div class=\"specs-section\">\n  <div class=\"specs-inner\">\n    <div class=\"specs-grid\">\n      <div>\n        <div class=\"section-label\">Technical Data</div>\n        <div class=\"specs-title\">System Specifications</div>\n        <p class=\"specs-sub\">Lightning protection systems are designed to meet all applicable API, NFPA, and national electrical standards.</p>\n        <div class=\"compliance-badges\"><span class=\"comp-badge\">API 545</span><span class=\"comp-badge\">NFPA 780</span><span class=\"comp-badge\">IS 2309</span><span class=\"comp-badge\">IEC 62305</span></div>\n      </div>\n      <div>\n        <table class=\"spec-tbl\">\n          <thead><tr><th>Parameter</th><th>Value</th></tr></thead>\n          <tbody>\n            <tr><td>Conductor Material</td><td>Flexible copper braid / SS cable</td></tr>\n            <tr><td>Conductor Cross-section</td><td>25–50 mm² (per tank design)</td></tr>\n            <tr><td>Bonding Resistance</td><td>&lt; 0.01 Ω (roof to shell)</td></tr>\n            <tr><td>Operating Temperature</td><td>-40°C to +120°C</td></tr>\n            <tr><td>Installation Points</td><td>Every 30 m of tank circumference (min)</td></tr>\n            <tr><td>Shunt Assembly</td><td>Flexible braid type, spring-loaded</td></tr>\n            <tr><td>Test Points</td><td>Provided for periodic resistance measurement</td></tr>\n            <tr><td>Cable Type Option</td><td>SS wire rope for wide clearances</td></tr>\n            <tr><td>Surface Treatment</td><td>Tinned copper / hot-dip galvanised</td></tr>\n            <tr><td>Terminations</td><td>Compression-type cable lugs</td></tr>\n          </tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n</div>\n\n<div class=\"features-section\">\n  <div class=\"features-inner\">\n    <div class=\"section-hd\"><span class=\"slbl\">System Components</span><h2>What's Included</h2><div class=\"bar\"></div></div>\n    <div class=\"features-grid\">\n      <div class=\"feat-card\"><div class=\"feat-icon\">🔌</div><h4>Shunt Assemblies</h4><p>Flexible copper braid bonding straps that maintain electrical continuity between the floating roof and the tank shell across the full range of roof travel.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">🔗</div><h4>Cable-Type Bonding</h4><p>Stainless steel wire rope systems for tanks with larger annular clearances where shunt-type assemblies are not appropriate.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">⚙</div><h4>Rolling Contact Shoes</h4><p>Spring-loaded rolling contact shoes that maintain continuous electrical contact with the tank shell surface during roof movement.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">🔧</div><h4>Grounding Accessories</h4><p>Tank shell grounding lugs, cable termination clamps, and all associated hardware for complete system installation.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">📋</div><h4>Inspection Test Points</h4><p>Dedicated test points at accessible locations for periodic bonding resistance measurement and system integrity verification.</p></div>\n      <div class=\"feat-card\"><div class=\"feat-icon\">📄</div><h4>Documentation Package</h4><p>Material certificates, installation drawings, resistance test records, and compliance certificate supplied with every system.</p></div>\n    </div>\n  </div>\n</div>\n\n<div class=\"apps-section\">\n  <div class=\"apps-inner\">\n    <div class=\"section-hd\"><span class=\"slbl\">Where It's Needed</span><h2>Applications</h2><div class=\"bar\"></div></div>\n    <div class=\"apps-grid\">\n      <div class=\"app-item\"><div class=\"app-num\">01</div><h4>Refinery EFR Tanks</h4><p>All external floating roof tanks at petroleum refineries — mandatory under OISD 117 and API 545.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">02</div><h4>Crude Oil Terminals</h4><p>Import and export terminals handling large volumes of crude oil with high vapour pressure.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">03</div><h4>Petrochemical Plants</h4><p>Storage of aromatic feedstocks and finished chemicals in floating roof tanks.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">04</div><h4>Aviation Fuel Storage</h4><p>ATF and aviation gasoline storage where the highest electrical safety standards apply.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">05</div><h4>New Tank Construction</h4><p>Standard scope item on all new EFR tank projects in accordance with API 650 and owner specifications.</p></div>\n      <div class=\"app-item\"><div class=\"app-num\">06</div><h4>Existing Tank Assessment</h4><p>Inspection and upgrade of bonding systems on existing tanks that may not meet current standards.</p></div>\n    </div>\n  </div>\n</div>\n\n<div class=\"cta-box\"><div class=\"cta-box-inner\"><h3>Request a Safety Assessment</h3><p>We can review your existing tank bonding systems, measure installed resistance values, and recommend cost-effective upgrades to achieve full API 545 compliance.</p><div class=\"cta-btns\"><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\">Request Assessment →</a><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\" class=\"btn-outline\" style=\"border-color:rgba(232,160,32,.4);color:var(--accent)\">View Rim Seals</a></div></div></div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-tit "about":{title:"About ESRAI GROUP — Petrodek Systems",html:"<nav>\n  <a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\" class=\"logo\">PETRO<span>DEK</span> SYSTEMS</a>\n  <div class=\"hamburger\" onclick=\"var nl=this.closest('nav').querySelector('.nav-links');nl.classList.toggle('open');\">\n    <span></span><span></span><span></span>\n  </div>\n  <ul class=\"nav-links\">\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a></li>\n    <li class=\"has-dropdown\">\n      <a href=\"javascript:void(0)\" onclick=\"if(window.innerWidth<=900){this.closest('.has-dropdown').classList.toggle('open');return false;}showPage('products');return false;\">Products &#9662;</a>\n      <div class=\"dropdown\">\n        <div class=\"sub-dropdown\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\" style=\"font-weight:600;color:var(--accent);\">Rim Seals &#9658;</a>\n          <div class=\"sub-dropdown-menu\">\n            <a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('liquid-mounted-primary-seals');return false;\">Liquid Mounted Primary</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('vapour-mounted-primary-seals');return false;\">Vapour Mounted Primary</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('secondary-seals');return false;\">Secondary Seals</a>\n            <a href=\"javascript:void(0)\" onclick=\"showPage('wiper-seals');return false;\">Wiper Seals</a>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('seal-fittings');return false;\">Seal Fittings</a>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('lightning-protection');return false;\">Lightning Protection</a>\n      </div>\n    </li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('blog');return false;\">Blog</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('about');return false;\">ESRAI Group</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\">Contact Us</a></li>\n    <li><a href=\"javascript:void(0)\" onclick=\"showPage('admin');return false;\" class=\"nav-admin\">&#9881; Admin</a></li>\n  </ul>\n</nav>\n\n<!-- PAGE HERO -->\n<div class=\"page-hero\">\n  <div class=\"page-hero-grid\"></div>\n  <div class=\"page-hero-inner\">\n    <div class=\"page-hero-label\">The Group Behind the Brand</div>\n    <h1>About <em>ESRAI GROUP</em></h1>\n    <p>Petrodek Systems Private Limited is the flagship engineering entity of ESRAI GROUP — a diversified industrial and technology group serving the global storage tanks and terminals industry.</p>\n    <div class=\"breadcrumb\"><a href=\"javascript:void(0)\" onclick=\"showPage('home');return false;\">Home</a> › <span>About</span></div>\n  </div>\n</div>\n\n<div class=\"page-body\">\n\n  <!-- GROUP INTRO -->\n  <div style=\"margin-bottom:3.5rem\">\n    <div class=\"section-label\">Who We Are</div>\n    <h2 class=\"section-title\" data-cms=\"about_section.title\">ESRAI GROUP</h2>\n    <div class=\"section-divider\"></div>\n    <div class=\"two-col\" style=\"margin-top:1.5rem\">\n      <div class=\"prose\">\n        <p data-cms=\"about_section.body1\">ESRAI GROUP brings together two incorporated entities and a family of specialist brands — all focused on the storage tanks, terminals, and allied logistics industry. From engineering products and spare parts to digital platforms for networking, market intelligence and supplier discovery, the group provides an integrated ecosystem for industry professionals.</p>\n        <p data-cms=\"about_section.body2\">Each entity and brand operates with deep domain expertise, a commitment to quality, and a focus on solving real problems faced by tank farm owners, terminal operators, contractors, and engineering professionals across India and globally.</p>\n      </div>\n      <div>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(10,22,40,.1)\">\n          <div style=\"background:var(--navy);padding:2.2rem;text-align:center\">\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.8rem;color:var(--accent);line-height:1\" data-cms=\"about_section.stat1_num\">25+</div>\n            <div style=\"font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6688aa;margin-top:.4rem\" data-cms=\"about_section.stat1_lbl\">Years Experience</div>\n          </div>\n          <div style=\"background:var(--steel);padding:2.2rem;text-align:center\">\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.8rem;color:var(--accent);line-height:1\" data-cms=\"about_section.stat2_num\">200+</div>\n            <div style=\"font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6688aa;margin-top:.4rem\" data-cms=\"about_section.stat2_lbl\">Tank Installations</div>\n          </div>\n          <div style=\"background:var(--steel);padding:2.2rem;text-align:center\">\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.8rem;color:var(--accent);line-height:1\" data-cms=\"about_section.stat3_num\">2</div>\n            <div style=\"font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6688aa;margin-top:.4rem\" data-cms=\"about_section.stat3_lbl\">Group Companies</div>\n          </div>\n          <div style=\"background:var(--navy);padding:2.2rem;text-align:center\">\n            <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:2.8rem;color:var(--accent);line-height:1\" data-cms=\"about_section.stat4_num\">6+</div>\n            <div style=\"font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#6688aa;margin-top:.4rem\" data-cms=\"about_section.stat4_lbl\">Specialist Brands</div>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- GROUP COMPANIES -->\n  <div style=\"margin-bottom:3.5rem\">\n    <div class=\"section-label\">Group Companies</div>\n    <h2 class=\"section-title\">Our Incorporated Entities</h2>\n    <div class=\"section-divider\"></div>\n    <p style=\"color:#556;font-size:.88rem;line-height:1.75;max-width:680px;margin-bottom:2rem\">Two registered companies form the foundation of ESRAI GROUP, each with its own specialist mandate and a portfolio of brands operating under them.</p>\n\n    <!-- Company 1: Petrodek -->\n    <div style=\"display:grid;grid-template-columns:220px 1fr;border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;margin-bottom:1.4rem;box-shadow:0 2px 12px rgba(0,0,0,.06)\">\n      <div style=\"background:var(--navy);padding:2rem 1.6rem;display:flex;flex-direction:column;justify-content:center\">\n        <div style=\"font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.6rem\">Group Entity 01</div>\n        <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:.06em;line-height:1.1\">PETRO<span style=\"color:var(--accent)\">DEK</span></div>\n        <div style=\"font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:.3rem;margin-bottom:1.2rem\">Systems Private Limited</div>\n        <span style=\"display:inline-block;padding:.22rem .65rem;border:1px solid rgba(232,160,32,.4);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);width:fit-content\">Incorporated</span>\n      </div>\n      <div style=\"padding:1.8rem 2.2rem;background:#fff\">\n        <h3 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.15rem;color:var(--navy);margin-bottom:.5rem\">Engineering Products for Floating Roof Tanks</h3>\n        <p style=\"font-size:.85rem;line-height:1.75;color:#445;margin-bottom:.8rem\">Petrodek Systems Private Limited is the group’s engineering flagship — designing, supplying and installing floating roof tank rim seals, seal fittings, and lightning protection systems for refineries, petrochemical plants, and bulk liquid storage terminals across India.</p>\n        <p style=\"font-size:.82rem;line-height:1.7;color:#667;margin-bottom:1.1rem\">All products comply with API 650, API MPMS Chapter 19.2, and IS 10987. Key clients include Reliance Industries Limited, Nayara Energy, Bridge &amp; Roof Co., and Haldia Petrochemicals Limited.</p>\n        <div style=\"background:var(--light);padding:.75rem 1rem;border-left:3px solid var(--accent);border-radius:0 4px 4px 0;margin-bottom:1.1rem\">\n          <div style=\"font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:.35rem\">Brands Under This Entity</div>\n          <div style=\"display:flex;gap:.5rem;flex-wrap:wrap\">\n            <span style=\"background:rgba(10,22,40,.06);padding:.2rem .65rem;font-size:.72rem;font-weight:600;color:var(--navy);border-radius:3px\">Sealworks</span>\n            <span style=\"background:rgba(10,22,40,.06);padding:.2rem .65rem;font-size:.72rem;font-weight:600;color:var(--navy);border-radius:3px\">AST Spares</span>\n          </div>\n        </div>\n        <div style=\"display:flex;gap:.7rem;flex-wrap:wrap\">\n          <a href=\"javascript:void(0)\" onclick=\"showPage('products');return false;\" class=\"btn-primary\" style=\"font-size:.75rem;padding:.55rem 1.4rem\">View Products →</a>\n          <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\" style=\"font-size:.75rem;padding:.55rem 1.4rem\">Get a Quote</a>\n        </div>\n      </div>\n    </div>\n\n    <!-- Company 2: Esrai Technologies -->\n    <div style=\"display:grid;grid-template-columns:220px 1fr;border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;margin-bottom:1.4rem;box-shadow:0 2px 12px rgba(0,0,0,.06)\">\n      <div style=\"background:linear-gradient(160deg,#0d1e3a,var(--steel));padding:2rem 1.6rem;display:flex;flex-direction:column;justify-content:center\">\n        <div style=\"font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:.6rem\">Group Entity 02</div>\n        <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;color:#fff;letter-spacing:.06em;line-height:1.1\">ESRAI<span style=\"color:var(--accent)\">TECH</span></div>\n        <div style=\"font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:.3rem;margin-bottom:1.2rem\">Technologies Private Limited</div>\n        <span style=\"display:inline-block;padding:.22rem .65rem;border:1px solid rgba(232,160,32,.4);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);width:fit-content\">Incorporated</span>\n      </div>\n      <div style=\"padding:1.8rem 2.2rem;background:#fafbfc\">\n        <h3 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.15rem;color:var(--navy);margin-bottom:.5rem\">Digital Platforms for the Tank &amp; Terminal Industry</h3>\n        <p style=\"font-size:.85rem;line-height:1.75;color:#445;margin-bottom:.8rem\">Esrai Technologies Private Limited is the group’s technology arm — building and operating digital platforms that serve professionals, operators, suppliers and contractors working in storage tanks, terminals, and allied logistics.</p>\n        <p style=\"font-size:.82rem;line-height:1.7;color:#667;margin-bottom:1.1rem\">From emissions compliance calculators and global terminal intelligence to professional networking and supplier directories, Esrai Technologies is digitising the industry’s information infrastructure.</p>\n        <div style=\"background:#fff;padding:.75rem 1rem;border-left:3px solid var(--accent);border-radius:0 4px 4px 0;margin-bottom:1.1rem;border:1px solid rgba(10,22,40,.08)\">\n          <div style=\"font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:.35rem\">Brands Under This Entity</div>\n          <div style=\"display:flex;gap:.5rem;flex-wrap:wrap\">\n            <span style=\"background:rgba(10,22,40,.06);padding:.2rem .65rem;font-size:.72rem;font-weight:600;color:var(--navy);border-radius:3px\">Tank Protocol</span>\n            <span style=\"background:rgba(10,22,40,.06);padding:.2rem .65rem;font-size:.72rem;font-weight:600;color:var(--navy);border-radius:3px\">Tank Bazaar</span>\n            <span style=\"background:rgba(10,22,40,.06);padding:.2rem .65rem;font-size:.72rem;font-weight:600;color:var(--navy);border-radius:3px\">Tankonomics</span>\n            <span style=\"background:rgba(10,22,40,.06);padding:.2rem .65rem;font-size:.72rem;font-weight:600;color:var(--navy);border-radius:3px\">Tank World India</span>\n          </div>\n        </div>\n        <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-outline\" style=\"font-size:.75rem;padding:.55rem 1.4rem\">Get in Touch</a>\n      </div>\n    </div>\n  </div>\n\n  <!-- BRANDS -->\n  <div style=\"margin-bottom:3.5rem\">\n    <div class=\"section-label\">Brand Portfolio</div>\n    <h2 class=\"section-title\">Our Specialist Brands</h2>\n    <div class=\"section-divider\"></div>\n    <p style=\"color:#556;font-size:.88rem;line-height:1.75;max-width:680px;margin-bottom:2rem\">Each brand is purpose-built for a specific need within the storage tanks and terminals industry — from engineering products and spare parts to digital tools for compliance, market intelligence, networking and supplier discovery.</p>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem\">\n\n      <!-- Sealworks -->\n      <div style=\"border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)\">\n        <div style=\"background:var(--navy);padding:1rem 1.4rem;display:flex;align-items:center;gap:.8rem\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;letter-spacing:.06em\">SEAL<span style=\"color:var(--accent)\">WORKS</span></div>\n          <span style=\"margin-left:auto;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:.18rem .55rem;border-radius:3px\">Engineering</span>\n        </div>\n        <div style=\"padding:1.2rem 1.4rem;background:#fff\">\n          <p style=\"font-size:.82rem;line-height:1.7;color:#445;margin-bottom:.8rem\">The Sealworks brand covers the full range of rim seal engineering services under Petrodek Systems — design consultation, product selection, supply, and on-site installation for floating roof tank rim sealing systems.</p>\n          <div style=\"font-size:.72rem;color:var(--mid);font-weight:600\">Under → Petrodek Systems Pvt. Ltd.</div>\n        </div>\n      </div>\n\n      <!-- AST Spares -->\n      <div style=\"border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)\">\n        <div style=\"background:var(--steel);padding:1rem 1.4rem;display:flex;align-items:center;gap:.8rem\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;letter-spacing:.06em\">AST<span style=\"color:var(--accent)\">SPARES</span></div>\n          <span style=\"margin-left:auto;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:.18rem .55rem;border-radius:3px\">Spares</span>\n        </div>\n        <div style=\"padding:1.2rem 1.4rem;background:#fff\">\n          <p style=\"font-size:.82rem;line-height:1.7;color:#445;margin-bottom:.8rem\">Replacement and aftermarket spare parts for above-ground storage tank equipment — rim seal components, drain valve parts, pontoon fittings, gauge hatch parts, and rolling ladder assemblies. Fast, pan-India delivery.</p>\n          <div style=\"display:flex;align-items:center;justify-content:space-between\">\n            <div style=\"font-size:.72rem;color:var(--mid);font-weight:600\">Under → Petrodek Systems Pvt. Ltd.</div>\n            <a href=\"http://www.astspares.com\" target=\"_blank\" style=\"font-size:.72rem;color:var(--accent);font-weight:600;text-decoration:none\">astspares.com →</a>\n          </div>\n        </div>\n      </div>\n\n      <!-- Tank Protocol -->\n      <div style=\"border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)\">\n        <div style=\"background:linear-gradient(135deg,#0d1e38,#1a3050);padding:1rem 1.4rem;display:flex;align-items:center;gap:.8rem\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;letter-spacing:.06em\">TANK<span style=\"color:var(--accent)\">PROTOCOL</span></div>\n          <span style=\"margin-left:auto;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:.18rem .55rem;border-radius:3px\">Compliance</span>\n        </div>\n        <div style=\"padding:1.2rem 1.4rem;background:#fff\">\n          <p style=\"font-size:.82rem;line-height:1.7;color:#445;margin-bottom:.8rem\">A web-based VOC emissions calculator for floating roof storage tanks, built on API MPMS Chapter 19.2 methodology. Enables engineers and HSE teams to model seal configurations and generate audit-ready compliance reports.</p>\n          <div style=\"display:flex;align-items:center;justify-content:space-between\">\n            <div style=\"font-size:.72rem;color:var(--mid);font-weight:600\">Under → Esrai Technologies Pvt. Ltd.</div>\n            <a href=\"http://www.tankprotocol.com\" target=\"_blank\" style=\"font-size:.72rem;color:var(--accent);font-weight:600;text-decoration:none\">tankprotocol.com →</a>\n          </div>\n        </div>\n      </div>\n\n      <!-- Tank Bazaar -->\n      <div style=\"border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)\">\n        <div style=\"background:linear-gradient(135deg,#112030,#1c3448);padding:1rem 1.4rem;display:flex;align-items:center;gap:.8rem\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;letter-spacing:.06em\">TANK<span style=\"color:var(--accent)\">BAZAAR</span></div>\n          <span style=\"margin-left:auto;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:.18rem .55rem;border-radius:3px\">Intelligence</span>\n        </div>\n        <div style=\"padding:1.2rem 1.4rem;background:#fff\">\n          <p style=\"font-size:.82rem;line-height:1.7;color:#445;margin-bottom:.8rem\">A comprehensive global listing and intelligence platform for storage tank terminals worldwide. Provides operators, traders, and logistics professionals with terminal profiles, capacity data, and market intelligence across global hubs.</p>\n          <div style=\"font-size:.72rem;color:var(--mid);font-weight:600\">Under → Esrai Technologies Pvt. Ltd.</div>\n        </div>\n      </div>\n\n      <!-- Tankonomics -->\n      <div style=\"border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)\">\n        <div style=\"background:linear-gradient(135deg,#0e1f35,#182d45);padding:1rem 1.4rem;display:flex;align-items:center;gap:.8rem\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;letter-spacing:.06em\">TANKO<span style=\"color:var(--accent)\">NOMICS</span></div>\n          <span style=\"margin-left:auto;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:.18rem .55rem;border-radius:3px\">Networking</span>\n        </div>\n        <div style=\"padding:1.2rem 1.4rem;background:#fff\">\n          <p style=\"font-size:.82rem;line-height:1.7;color:#445;margin-bottom:.8rem\">A professional networking platform for the storage tanks, terminals, and allied logistics industry — connecting engineers, operators, contractors, suppliers, and consultants for knowledge exchange, collaboration, and career development.</p>\n          <div style=\"font-size:.72rem;color:var(--mid);font-weight:600\">Under → Esrai Technologies Pvt. Ltd.</div>\n        </div>\n      </div>\n\n      <!-- Tank World India -->\n      <div style=\"border:1px solid rgba(10,22,40,.1);border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)\">\n        <div style=\"background:linear-gradient(135deg,#101e34,#1e3050);padding:1rem 1.4rem;display:flex;align-items:center;gap:.8rem\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;letter-spacing:.06em\">TANK WORLD<span style=\"color:var(--accent)\"> INDIA</span></div>\n          <span style=\"margin-left:auto;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.35);background:rgba(255,255,255,.07);padding:.18rem .55rem;border-radius:3px\">Directory</span>\n        </div>\n        <div style=\"padding:1.2rem 1.4rem;background:#fff\">\n          <p style=\"font-size:.82rem;line-height:1.7;color:#445;margin-bottom:.8rem\">A curated database of suppliers, contractors, and service providers for the storage tanks, terminals, and allied logistics industry in India — enabling operators and project teams to discover verified vendors across all disciplines.</p>\n          <div style=\"font-size:.72rem;color:var(--mid);font-weight:600\">Under → Esrai Technologies Pvt. Ltd.</div>\n        </div>\n      </div>\n\n    </div>\n  </div>\n\n  <!-- CLIENTS + CTA -->\n  <div class=\"two-col\" style=\"margin-bottom:3rem\">\n    <div class=\"prose\">\n      <h3>Our Mission</h3>\n      <p>To build the most comprehensive ecosystem of engineering products, spare parts, and digital tools serving the global storage tanks and terminals industry — helping operators reduce emissions, improve compliance, and connect with the right partners.</p>\n      <h3>Key Clients &amp; Users</h3>\n      <p>Across the group we serve major refinery and petrochemical operators including Reliance Industries Limited, Nayara Energy, Bridge &amp; Roof Co., and Haldia Petrochemicals Limited, as well as a growing community of tank industry professionals using our digital platforms.</p>\n    </div>\n    <div class=\"cta-box\" style=\"margin-top:0;padding:2rem;align-self:start\">\n      <h3 style=\"font-size:1.2rem\">Work With ESRAI GROUP</h3>\n      <p style=\"font-size:.83rem;line-height:1.65;margin-bottom:.4rem\">For rim seal engineering, spare parts supply, or digital platform enquiries — our team is ready to help.</p>\n      <a href=\"javascript:void(0)\" onclick=\"showPage('contact');return false;\" class=\"btn-primary\" style=\"font-size:.78rem;padding:.7rem 1.8rem;margin-top:.8rem;display:inline-block\">Get in Touch →</a>\n    </div>\n  </div>\n\n</div>\n\n<footer>\n  <div class=\"footer-main\">\n    <div>\n      <div class=\"footer-logo\">PETRO<span>DEK</span> SYSTEMS</div>\n      <div class=\"footer-tagline\" data-cms=\"footer_section.tagline\">An ESRAI GROUP Enterprise. Specialists in floating roof tank rim seals, seal fittings and lightning protection systems.</div>\n    </div>\n    <div class=\"footer-col\">\n      <div class=\"footer-col-title\">Products</div>\n      <ul>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('rim-seals');return false;\">Rim Seals</a></li>\n        <li><a href=\"javascript:void(0)\" onclick=\"showPage('mechanical-shoe-seals');return false;\">Mechanical Shoe Seals</a></li>\n        <li><a href= n:fixed;inset:0;z-index:99999;background:rgba(10,22,40,.75);align-items:center;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:10px;width:min(92vw,820px);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;\">\n    <div style=\"padding:.85rem 1.1rem;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:.7rem;\">\n      <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.08em;text-transform:uppercase;color:#0a1628;flex:1;\">Image Library</div>\n      <input id=\"imglib-search\" type=\"text\" placeholder=\"Search...\" oninput=\"renderImgLibGrid(this.value)\" style=\"border:1px solid #dde4ed;border-radius:5px;padding:.3rem .65rem;font-size:.78rem;width:130px;outline:none;\"/>\n      <label style=\"background:#e8a020;color:#0a1628;border-radius:5px;padding:.3rem .72rem;font-size:.7rem;font-weight:700;cursor:pointer;\">Upload<input type=\"file\" accept=\"image/*\" multiple style=\"display:none\" onchange=\"handleImgLibModalUpload(this)\"/></label>\n      <button onclick=\"closeImgLibModal()\" style=\"background:none;border:1px solid #dde4ed;border-radius:5px;padding:.3rem .55rem;cursor:pointer;font-size:.9rem;color:#6677aa;\">&#215;</button>\n    </div>\n    <div id=\"imglib-grid\" style=\"flex:1;overflow-y:auto;padding:1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.6rem;min-height:200px;align-content:start;\"></div>\n    <div style=\"padding:.65rem 1.1rem;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:.6rem;background:#fafafa;\">\n      <div id=\"imglib-sel-preview\" style=\"flex:1;display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:#6677aa;min-height:36px;\"></div>\n      <button id=\"imglib-insert-btn\" onclick=\"confirmImgLibSelection()\" disabled style=\"background:#0a1628;color:#fff;border:none;border-radius:5px;padding:.38rem .9rem;font-size:.78rem;cursor:pointer;opacity:.5;font-weight:600;\">Insert &#8594;</button>\n    </div>\n  </div>\n</div>\n\n<div id=\"modal-imgurl\" style=\"display:none;position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,.6);align-items:center;justify-content:center;\">\n  <div style=\"background:#fff;border-radius:10px;padding:1.5rem;width:min(92vw,480px);box-shadow:0 20px 60px rgba(0,0,0,.25);\">\n    <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.08em;text-transform:uppercase;color:#0a1628;margin-bottom:1rem;\">Add Image to Library</div>\n    <!-- Asset path helper -->\n    <div style=\"background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:.65rem .8rem;margin-bottom:.8rem;font-size:.75rem;\">\n      <div style=\"color:#6677aa;margin-bottom:.35rem;font-weight:600;\">&#128230; GitHub Assets quick-fill</div>\n      <div style=\"display:flex;gap:.4rem;align-items:center;\">\n        <span style=\"color:#6677aa;font-size:.72rem;white-space:nowrap;\">Base:</span>\n        <input id=\"asset-base-display\" style=\"flex:1;border:1px solid #dde;border-radius:4px;padding:.28rem .5rem;font-size:.72rem;color:#344054;background:#fff;outline:none;\" placeholder=\"/assets/images/\" />\n        <button onclick=\"saveAssetBase(document.getElementById('asset-base-display').value);document.getElementById('img-url-input').value=document.getElementById('asset-base-display').value;\" style=\"background:#0a1628;color:#fff;border:none;border-radius:4px;padding:.28rem .6rem;font-size:.72rem;cursor:pointer;white-space:nowrap;\">Save &amp; Use</button>\n      </div>\n      <div style=\"color:#8899aa;font-size:.68rem;margin-top:.3rem;\">Set once. Then type just the filename after the base path.</div>\n    </div>\n    <div style=\"font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6677aa;margin-bottom:.3rem;\">Image Name / Label</div>\n    <input id=\"img-url-name\" placeholder=\"e.g. MSS Hero Image\" style=\"width:100%;box-sizing:border-box;border:1px solid #dde4ed;border-radius:6px;padding:.5rem .7rem;margin-bottom:.6rem;font-size:.84rem;outline:none;\"/>\n    <div style=\"font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6677aa;margin-bottom:.3rem;\">Image URL or Path</div>\n    <div style=\"display:flex;gap:.4rem;margin-bottom:.5rem;\">\n      <input id=\"img-url-input\" placeholder=\"/assets/images/photo.jpg or https://...\" style=\"flex:1;border:1px solid #dde4ed;border-radius:6px;padding:.5rem .7rem;font-size:.84rem;outline:none;\" oninput=\"prevImgUrl(this.value)\"/>\n      <button onclick=\"var b=ASSET_BASE_URL||'/assets/images/';document.getElementById('img-url-input').value=b;document.getElementById('img-url-input').focus();\" style=\"background:#f0f4f8;border:1px solid #dde;border-radius:6px;padding:.5rem .65rem;font-size:.75rem;cursor:pointer;white-space:nowrap;\">&#128230; Fill base</button>\n    </div>\n    <div id=\"img-url-preview\" style=\"width:100%;height:90px;border:1px solid #e2e8f0;border-radius:6px;background:#f8fafc;margin-bottom:.8rem;display:flex;align-items:center;justify-content:center;overflow:hidden;\">\n      <span style=\"font-size:.75rem;color:#aabbc8;\">Preview appears here</span>\n    </div>\n    <div style=\"display:flex;gap:.5rem;justify-content:flex-end;\">\n      <button onclick=\"closeModal('modal-imgurl')\" style=\"border:1px solid #dde;background:#fff;border-radius:5px;padding:.4rem .9rem;cursor:pointer;font-size:.84rem;\">Cancel</button>\n      <button onclick=\"addImageByUrl();closeModal('modal-imgurl')\" style=\"background:#e8a020;border:none;border-radius:5px;padding:.4rem .9rem;color:#0a1628;font-weight:700;cursor:pointer;font-size:.84rem;\">Add Image</button>\n    </div>\n  </div>\n</div\"\""}
