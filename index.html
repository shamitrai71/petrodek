// Slugs of phantom "custom pages" that previously shipped in DEF and shadowed real
// built-in SPA pages — strip them out of any localStorage carried over from v4.
var PHANTOM_SLUGS=['petrodek.html','products.html','blog.html','contact.html','about.html','rim-seals.html','mechanical-shoe-seals.html','liquid-mounted-primary-seals.html','vapour-mounted-primary-seals.html','secondary-seals.html','wiper-seals.html','seal-fittings.html','lightning-protection.html'];
function stripPhantomPages(pages){
  if(!Array.isArray(pages))return [];
  return pages
    .filter(function(p){return p&&PHANTOM_SLUGS.indexOf((p.slug||'').toLowerCase())===-1;})
    .map(function(p){return Object.assign({},p,{children:stripPhantomPages(p.children||[])});});
}
// ────────────────────────────────────────────────────────────────────
//  CMS PERSISTENCE LAYER
//  ─────────────────────
//  Three layers:
//    1. _cmsCache (in-memory)   — source of truth during a session.
//                                 cmsGet() reads from here synchronously.
//    2. localStorage             — offline fallback + cache for next page load.
//    3. Netlify Blobs server     — source of truth across sessions/visitors.
//                                 cmsBootstrap() loads it before render;
//                                 cmsSet() writes it in the background.
//  This keeps the existing 100+ synchronous cmsGet()/cmsSet() call sites
//  working unchanged while making saves visible to all visitors.
// ────────────────────────────────────────────────────────────────────
var _cmsCache = null;
var _cmsSavePending = null;     // Promise for the most recent in-flight save
var _cmsSaveTimer = null;       // debounce handle so rapid edits coalesce
var CMS_SAVE_DEBOUNCE_MS = 350;

function _cmsBuildFromRaw(raw){
  // Merge a raw stored blob with DEF so that fields added in newer versions of
  // DEF are present even if the stored blob is older. Also strips phantom pages.
  var merged = deepMerge(JSON.parse(JSON.stringify(DEF)), raw || {});
  merged.pages = stripPhantomPages(merged.pages || []);
  return merged;
}

// Synchronous read — never blocks. Returns the in-memory cache, falling back
// to localStorage, falling back to DEF.
function cmsGet(){
  if(_cmsCache) return _cmsCache;
  try {
    var s = localStorage.getItem(KEY);
    _cmsCache = _cmsBuildFromRaw(s ? JSON.parse(s) : null);
  } catch(e){
    _cmsCache = _cmsBuildFromRaw(null);
  }
  return _cmsCache;
}

// Synchronous write — updates cache and localStorage immediately, schedules a
// debounced background POST to the server. Never blocks the caller.
function cmsSet(d){
  _cmsCache = d;
  try { localStorage.setItem(KEY, JSON.stringify(d)); }
  catch(e){ if(typeof showToast==='function') showToast('Local cache full','warn'); }
  _cmsScheduleServerSave();
  return true;
}

function cmsUpd(sec, vals){
  const d = cmsGet();
  d[sec] = { ...(d[sec] || {}), ...vals };
  cmsSet(d);
}

function _cmsScheduleServerSave(){
  if(_cmsSaveTimer) clearTimeout(_cmsSaveTimer);
  _cmsSaveTimer = setTimeout(_cmsFlushToServer, CMS_SAVE_DEBOUNCE_MS);
}

// Sections persisted to the server. Anything not in this list stays in
// localStorage only. Keep in sync with ALLOWED_SECTIONS in
// netlify/functions/cms-save.mjs.
var LIVE_SECTIONS = [
  'theme', 'hero', 'products_section', 'about_section', 'cta_section',
  'footer_section', 'pages', 'posts', 'blog_posts', 'menus', 'images',
  'videos', 'widgets', 'cta_buttons', 'links', 'products', 'asset_base'
];
// Soft warning threshold — Netlify Functions accept up to ~6MB request
// bodies. We warn the admin before they hit the hard limit so they can
// move large embedded images to Cloudinary instead.
var CMS_PAYLOAD_WARN_BYTES = 4_500_000;

function _cmsFlushToServer(){
  _cmsSaveTimer = null;
  if(!_cmsCache) return;
  // Only send sections that are currently migrated to the server. Clipping
  // server-bound data to the migrated set means a bug elsewhere in the app
  // (e.g. corrupt pages[] in localStorage) can never clobber the server.
  var payload = {};
  LIVE_SECTIONS.forEach(function(key){
    if(_cmsCache[key] !== undefined) payload[key] = _cmsCache[key];
  });
  if(Object.keys(payload).length === 0){
    return; // nothing to send
  }
  var snapshot = JSON.stringify(payload);
  if(snapshot.length > CMS_PAYLOAD_WARN_BYTES){
    var mb = (snapshot.length / 1_000_000).toFixed(1);
    console.warn('CMS payload is ' + mb + 'MB — approaching the ~6MB server limit. Move large embedded images to Cloudinary to keep saves working.');
    if(typeof showToast === 'function'){
      showToast('CMS data is ' + mb + 'MB. Approaching server limit — consider moving uploads to Cloudinary.', 'warn');
    }
  }
  _cmsSavePending = fetch('/api/cms-save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: snapshot,
    keepalive: true,
  }).then(function(r){
    if(!r.ok){
      return r.text().then(function(t){
        var detail = t ? t.slice(0,300) : '(empty body)';
        throw new Error('HTTP ' + r.status + ' ' + r.statusText + ' — ' + detail);
      });
    }
    console.info('[cms] saved', snapshot.length, 'bytes to server');
    if(typeof _cmsOnSaveOk==='function') _cmsOnSaveOk();
  }).catch(function(err){
    console.warn('[cms] server save failed (' + snapshot.length + ' bytes):', err.message || err);
    if(typeof _cmsOnSaveError==='function') _cmsOnSaveError(err);
  });
  return _cmsSavePending;
}

// Hooks the admin can override to surface save status in the UI.
var _cmsOnSaveOk = null;
var _cmsOnSaveError = null;

// Called once on page load (from bindCMS or admin startup) to fetch the latest
// server state before any rendering happens. The server only holds sections
// that are in LIVE_SECTIONS — everything else stays local. So we MERGE server
// data on top of local data rather than replacing.
//
// If the server is unreachable, we soldier on with the local cache.
function cmsBootstrap(){
  return fetch('/api/cms-get', { headers: { 'Accept': 'application/json' } })
    .then(function(r){
      if(!r.ok) throw new Error('cms-get HTTP ' + r.status);
      return r.json();
    })
    .then(function(serverData){
      // Start from whatever's already in the cache/localStorage (DEF-merged)
      var local = cmsGet();
      // Overlay only the live sections from the server
      LIVE_SECTIONS.forEach(function(key){
        if(serverData && serverData[key] !== undefined){
          local[key] = serverData[key];
        }
      });
      _cmsCache = local;
      try { localStorage.setItem(KEY, JSON.stringify(_cmsCache)); } catch(e){}
      // Re-apply the theme now that we potentially have new colours from the server
      try { if (typeof applyTheme === 'function') applyTheme(_cmsCache.theme || {}); } catch(e){}
      return _cmsCache;
    })
    .catch(function(err){
      console.warn('CMS bootstrap from server failed, using local cache:', err);
      // Fall through — cmsGet() will lazily build from localStorage on next call.
      return cmsGet();
    });
}


// ════════════════════════════════
//  THEME / COLOUR PALETTE
//  Applies saved theme colours as :root overrides on every page render.
//  Uses a dedicated <style id="cms-theme"> block so reapplying replaces
//  all variables atomically rather than accumulating inline overrides.
// ════════════════════════════════
var THEME_KEYS = ['accent','navy','steel','light','mid','text','white'];
var THEME_DEFAULTS = {accent:'#e8a020',navy:'#0a1628',steel:'#1c2e4a',light:'#f4f6f9',mid:'#8899aa',text:'#2c3e50',white:'#ffffff'};

function applyTheme(theme){
  try {
    theme = theme || {};
    var css = ':root{';
    THEME_KEYS.forEach(function(k){
      var v = theme[k] || THEME_DEFAULTS[k];
      // Basic hex validation — anything non-hex falls back to default
      if(!/^#[0-9a-fA-F]{3,8}$/.test(v)) v = THEME_DEFAULTS[k];
      css += '--' + k + ':' + v + ';';
    });
    css += '}';
    var el = document.getElementById('cms-theme');
    if(!el){
      el = document.createElement('style');
      el.id = 'cms-theme';
      document.head.appendChild(el);
    }
    el.textContent = css;
  } catch(e){ console.warn('applyTheme error:', e); }
}

function applyThemeFromCMS(){
  try {
    var d = cmsGet();
    applyTheme(d.theme || {});
  } catch(e){ applyTheme({}); }
}

// Apply saved theme as soon as this script executes so the site never
// flashes default colours before the CMS layer is ready.
try { applyThemeFromCMS(); } catch(e){}

function deepMerge(def,stored){const out={...def};for(const k in stored){if(stored[k]!==null&&typeof stored[k]==='object'&&!Array.isArray(stored[k])&&typeof def[k]==='object'&&!Array.isArray(def[k])){out[k]=deepMerge(def[k],stored[k]);}else{out[k]=stored[k];}}return out;}

/* ═══════════════════════ IMAGE LIBRARY ═══════════════════════
   Hooks into existing cmsGet/cmsSet.
   Local blobs: localStorage key 'petrodek_imgdata_<id>'
   ════════════════════════════════════════════════════════════ */

function resolveImgUrl(img) {
  if (img && img.local) {
    try { var b = localStorage.getItem('petrodek_imgdata_' + img.id); if (b) return b; } catch(e) {}
  }
  return (img && img.url) || '';
}

function libStoreBlob(id, dataUrl) {
  try { localStorage.setItem('petrodek_imgdata_' + id, dataUrl); return true; }
  catch(e) { showToast('Image too large for local storage. Use URL instead.', 'warn'); return false; }
}

function libAddLocalFile(file, onDone) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var id = 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    if (!libStoreBlob(id, ev.target.result)) return;
    var d = cmsGet(); if (!d.images) d.images = [];
    d.images.unshift({ id:id, name:file.name, url:'', local:true, ts:Date.now() });
    cmsSet(d);
    renderImages();
    showToast('Uploaded: ' + file.name);
    if (onDone) onDone(id, ev.target.result);
  };
  reader.readAsDataURL(file);
}

function libDeleteImg(id) {
  if (!confirm('Remove this image from the library?')) return;
  try { localStorage.removeItem('petrodek_imgdata_' + id); } catch(e) {}
  var d = cmsGet();
  d.images = (d.images || []).filter(function(i) { return i.id !== id; });
  cmsSet(d);
  renderImages();
  showToast('Image removed');
}

function libCopyUrl(id) {
  var imgs = (cmsGet().images || []);
  var img = imgs.find ? imgs.find(function(i){ return i.id===id; }) : null;
  if (!img) { for(var k=0;k<imgs.length;k++){if(imgs[k].id===id){img=imgs[k];break;}} }
  if (!img) return;
  var url = resolveImgUrl(img);
  if (!url) { showToast('No URL available','warn'); return; }
  try { navigator.clipboard.writeText(url).then(function(){ showToast('URL copied!'); }); }
  catch(e) { var t=document.createElement('textarea'); t.value=url; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); showToast('URL copied!'); }
}

//  stored in cmsGet().pages has a blocks[] array describing its
//  content. showPage() renders from blocks when present, falling
//  back to the legacy hardcoded PAGES[id].html otherwise.

// Pages where admins can use block editing. Gate this carefully —
// enabling a slug here means the stored blocks[] will OVERRIDE the
// built-in PAGES[slug].html for site visitors. Pages that haven't
// been seeded yet will auto-populate from _PAGE_SEEDS on first view.
var BLOCK_EDITOR_SLUGS = [
  'home',

  'about'
];

// Helper: produce a fresh block of the given type, deeply merging
// `overrides` over the type's defaults. Used by _PAGE_SEEDS to keep
// page definitions readable.
function _seedBlock(type, overrides){
  var spec = BLOCK_TYPES[type];
  if (!spec){
    console.error('_seedBlock: unknown type ' + type);
    return null;
  }
  var data = spec.defaults();
  if (overrides){
    for (var k in overrides){
      if (Object.prototype.hasOwnProperty.call(overrides, k)){
        data[k] = overrides[k];
      }
    }
  }
  return { id: beNewBlockId(), type: type, data: data };
}

// Block type registry. Each entry describes a block type: its label,
// icon, default data (used when newly added), a render(data) → HTML
// function, and an edit(data, onChange) → HTML function for the
// inline edit form. Keep this additive — adding a new type never
// requires editing existing stored pages.
var BLOCK_TYPES = {
  'nav': {
    label: 'Site Navigation',
    icon: '☰',
    desc: 'Logo + kebab dropdown. Reads its menu items from Admin → Menu Builder.',
    defaults: function(){
      return {
        menu_id: 1,             // ID of the menu to render (from cmsGet().menus)
        show_admin_link: true,
        logo_text_main: 'PETRO',
        logo_text_accent: 'DEK',
        logo_text_suffix: ' SYSTEMS'
      };
    },
    render: function(data){
      // Find the menu the admin selected
      var menus = (cmsGet().menus) || [];
      var menu = null;
      for (var i = 0; i < menus.length; i++){
        if (menus[i] && String(menus[i].id) === String(data.menu_id)) { menu = menus[i]; break; }
      }
      if (!menu) menu = menus[0] || { items: [] };

      // Recursive renderer for menu items. `level` controls indentation;
      // children of children get progressively indented.
      function renderItems(items, level){
        if (!Array.isArray(items) || !items.length) return '';
        return items.map(function(it){
          var resolved = _navResolveUrl(it.url || '');
          var hasChildren = Array.isArray(it.children) && it.children.length > 0;
          var childExpander = hasChildren
            ? '<button class="kn-expand" type="button" onclick="event.stopPropagation();var li=this.closest(\'.kn-li\');li.classList.toggle(\'kn-open\');" aria-label="Toggle submenu">▾</button>'
            : '';
          var linkAttrs = '';
          if (resolved) {
            if (resolved.external) {
              linkAttrs = ' href="' + beEscape(resolved.href) + '" target="_blank" rel="noopener"';
            } else {
              linkAttrs = ' href="' + beEscape(resolved.href) + '" onclick="' + beEscape(resolved.onclick) + '"';
            }
          } else {
            linkAttrs = ' href="javascript:void(0)" onclick="return false;"';
          }
          var indent = 'padding-left:' + (1 + level * 0.9) + 'rem;';
          return (
            '<li class="kn-li' + (level === 0 ? ' kn-li-top' : '') + '">' +
              '<div class="kn-row" style="' + indent + '">' +
                '<a class="kn-link"' + linkAttrs + '>' + beEscape(it.label || '') + '</a>' +
                childExpander +
              '</div>' +
              (hasChildren ? '<ul class="kn-sub">' + renderItems(it.children, level + 1) + '</ul>' : '') +
            '</li>'
          );
        }).join('');
      }

      var menuHtml = renderItems(menu.items || [], 0);
      var adminLink = (data.show_admin_link !== false)
        ? '<li class="kn-li kn-li-top kn-li-admin">' +
            '<div class="kn-row" style="padding-left:1rem;">' +
              '<a class="kn-link" href="javascript:void(0)" onclick="showPage(\'admin\');return false;">⚙  Admin</a>' +
            '</div>' +
          '</li>'
        : '';

      return (
        '<nav class="kebab-nav">' +
          '<a href="javascript:void(0)" onclick="showPage(\'home\');return false;" class="logo">' +
            beEscape(data.logo_text_main || 'PETRO') +
            '<span>' + beEscape(data.logo_text_accent || 'DEK') + '</span>' +
            beEscape(data.logo_text_suffix || ' SYSTEMS') +
          '</a>' +
          '<button class="kebab-btn" type="button" aria-label="Open menu" aria-expanded="false" onclick="(function(b){var p=b.parentNode.querySelector(\'.kebab-panel\');var open=p.classList.toggle(\'open\');b.setAttribute(\'aria-expanded\',open?\'true\':\'false\');})(this);">' +
            '<span></span><span></span><span></span>' +
          '</button>' +
          '<div class="kebab-panel" onclick="(function(p,e){if(e.target.closest(\'.kn-link\')&&!e.target.closest(\'.kn-expand\')){p.classList.remove(\'open\');var b=p.parentNode.querySelector(\'.kebab-btn\');if(b)b.setAttribute(\'aria-expanded\',\'false\');}})(this,event);">' +
            '<ul class="kn-list">' +
              menuHtml +
              adminLink +
            '</ul>' +
          '</div>' +
        '</nav>'
      );
    },
    edit: function(data, idPrefix){
      var menus = (cmsGet().menus) || [];
      var menuOptions = menus.map(function(m){
        return { value: String(m.id), label: m.name + ' (' + ((m.items && m.items.length) || 0) + ' items)' };
      });
      if (!menuOptions.length) {
        menuOptions = [{ value: '1', label: 'No menus yet — create one in Menu Builder' }];
      }
      return (
        beField(idPrefix, 'Menu source', 'menu_id', String(data.menu_id || 1), {
          type: 'select',
          options: menuOptions
        }) +
        beInfoBox('Menu items, links, and submenus are edited in <strong>Admin → Menu Builder</strong>. The kebab dropdown will render the menu you select above. The logo and admin link are this nav block\'s own settings.') +
        '<div style="display:grid;grid-template-columns:1fr 80px 1fr;gap:.4rem;margin-top:.7rem;">' +
          beField(idPrefix, 'Logo (main)', 'logo_text_main', data.logo_text_main || 'PETRO') +
          beField(idPrefix, 'Accent', 'logo_text_accent', data.logo_text_accent || 'DEK') +
          beField(idPrefix, 'Suffix', 'logo_text_suffix', data.logo_text_suffix || ' SYSTEMS') +
        '</div>' +
        '<label style="display:flex;align-items:center;gap:.5rem;margin-top:.7rem;font-size:.84rem;">' +
          '<input type="checkbox" ' + (data.show_admin_link !== false ? 'checked' : '') + ' ' +
            'onchange="beUpdateBlockField(\'' + idPrefix + '\',\'show_admin_link\',this.checked)"/>' +
          'Show the “⚙ Admin” link at the bottom of the menu' +
        '</label>'
      );
    }
  },

  'blog-grid': {

    render: function(data){
      var d = cmsGet();

        ? d.blog_posts
        : (Array.isArray(d.posts) ? d.posts : []);

        if (data.filter_tag) {
          var tag = String(data.filter_tag).toLowerCase().trim();
          var pTag = String(p.tag || p.tags || p.cat || '').toLowerCase();
          if (pTag.indexOf(tag) < 0) return false;
        }
        return true;
      });
      var max = parseInt(data.max_posts, 10) || 6;
      filtered = filtered.slice(0, max);

      var head = '';
      if (data.eyebrow || data.title) {
        head = '<div style="text-align:center;margin-bottom:2rem;">' +
          (data.eyebrow ? '<div class="section-label">' + beEscape(data.eyebrow) + '</div>' : '') +
          (data.title ? '<h2 class="section-title">' + beEscape(data.title) + '</h2>' : '') +

      } else {
        cardsHtml = '<div class="blog-grid">' + filtered.map(function(p){
          var tag = beEscape(p.tag || p.cat || '');
          var title = beEscape(p.title || '');
          var excerpt = beEscape(p.excerpt || '');
          var date = beEscape(p.pubdate || p.date || '');
          var icon = beEscape(p.icon || '📄');
          // Image fallback to icon
          var img = p.img
            ? '<div class="blog-card-img" style="background-image:url(\'' + beEscape(p.img) + '\');background-size:cover;background-position:center;"></div>'
            : '<div class="blog-card-img">' + icon + '</div>';
          return (
            '<article class="blog-card">' +
              img +
              '<div class="blog-card-body">' +
                (tag ? '<div class="blog-tag">' + tag + '</div>' : '') +
                '<h3>' + title + '</h3>' +
                (excerpt ? '<p>' + excerpt + '</p>' : '') +
                (date ? '<div class="blog-meta">' + date + '</div>' : '') +
              '</div>' +
            '</article>'
          );
        }).join('') + '</div>';

      return (

        '</div>' +

          '<input type="checkbox" ' + (data.show_drafts ? 'checked' : '') + ' ' +

    render: function(data){

      function renderColumn(colNum){
        var prefix = 'col' + colNum + '_';
        var type = data[prefix + 'type'] || (colNum === 1 ? 'image' : 'text');

          var url = data[prefix + 'image_url'] || '';
          var alt = data[prefix + 'image_alt'] || '';
          var cap = data[prefix + 'caption'] || '';
          var img;

            img = '<img src="' + beEscape(url) + '" alt="' + beEscape(alt) + '" ' +
                  'style="display:block;width:100%;height:auto;border-radius:8px;"/>';
          } else {

          var eyebrow = data[prefix + 'eyebrow'] || '';
          var heading = data[prefix + 'heading'] || '';
          var body    = data[prefix + 'body'] || '';
          var eyebrowHtml = eyebrow

            beField(idPrefix, label + ' — heading', prefix + 'heading', data[prefix + 'heading']) +
            beField(idPrefix, label + ' — body', prefix + 'body', data[prefix + 'body'], {type:'textarea', rows:5}) +
          '</div>';
        return (
          '<div style="border:1px solid #e8eef5;border-radius:6px;padding:.7rem .8rem;margin-bottom:.6rem;background:#f8fafc;">' +

          '</div>'

      return (

          beField(idPrefix, 'Column ratio', 'ratio', data.ratio || 'equal', {
            type:'select',

          beField(idPrefix, 'Gap', 'gap', data.gap || 'standard', {

            options:[

              {value:'standard', label:'Standard'},
              {value:'wide',     label:'Wide'}
            ]
          }) +
          beField(idPrefix, 'Vertical align', 'align', data.align || 'center', {
            type:'select',
            options:[
              {value:'top',    label:'Top'},
              {value:'center', label:'Center'},
              {value:'bottom', label:'Bottom'}
            ]
          }) +
        '</div>' +
        columnFields(1) +
        columnFields(2) +
        beBgPicker(idPrefix, data) +
        beInfoBox('Each column independently shows an <strong>image</strong> or a <strong>text block</strong>. Combine them however you like — image+image for comparisons, image+text for visual explainers, text+text for two related ideas.')
      );
    }

// ════════════════════════════════════════════════════════════════════
//  BLOCK EDITOR STATE & HELPERS
// ════════════════════════════════════════════════════════════════════
var _beCurrentSlug = null;    // slug of the page currently being edited
var _beDraft = null;          // in-progress draft (array of blocks). Null = no dirty edits.
var _beOrigSnapshot = null;   // JSON snapshot of original, for revert

function beEscape(s){
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function beNewBlockId(){
  return 'b' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// Resolve a Menu Builder URL into a renderable link. Examples:
//   'rim-seals'         → internal page → uses showPage('rim-seals')
//   'rim-seals.html'    → strip .html → showPage('rim-seals')
//   'http://...'        → external link → real href, target="_blank"
//   'mailto:...'        → external link → real href
//   '#anchor'           → in-page anchor → real href
//   ''                  → no link (returns null)
//
// Returns { external: bool, href: string, onclick: string|null }.
function _navResolveUrl(url){
  if (!url) return null;
  url = String(url).trim();
  if (!url) return null;
  // External / scheme URLs
  if (/^(https?:|mailto:|tel:)/i.test(url)) {
    return { external: true, href: url, onclick: null };
  }
  // In-page anchor
  if (url.charAt(0) === '#') {
    return { external: true, href: url, onclick: null };
  }
  // Treat as internal page slug. Strip .html / .htm / leading slash.
  var slug = url.replace(/^\//, '').replace(/\.html?$/i, '');
  if (slug === '' || slug === 'index' || slug === 'petrodek') slug = 'home';
  // Escape single quotes for use inside an inline onclick="...'<slug>'..."
  var safe = slug.replace(/'/g, "\\'");
  return {
    external: false,
    href: 'javascript:void(0)',
    onclick: "showPage('" + safe + "');return false;"
  };
}

// Resolve a download-link URL.
//
// Like _navResolveUrl but specialised for files. Accepts:
//   - Google Drive sharing URL (https://drive.google.com/file/d/<ID>/view?usp=...)
//     → converted to direct-download URL (https://drive.google.com/uc?export=download&id=<ID>)
//   - Any other URL → passed through, with the `download` attribute hint
//     so browsers force-download self-hosted files instead of navigating.
//   - Internal slug → showPage() onclick (same as _navResolveUrl)
//   - Empty/null → null
//
// Returns { external, href, onclick, download } where download is a bool
// that callers can use to add the HTML `download` attribute.
function _beResolveDownloadUrl(url){
  if (!url) return null;
  url = String(url).trim();
  if (!url) return null;

  // Drive sharing URL: extract file ID from /file/d/<ID>/ or /open?id=<ID>
  var driveMatch = url.match(/^https?:\/\/(?:drive|docs)\.google\.com\/(?:file\/d\/|open\?id=|uc\?(?:[^#]*&)?id=)([a-zA-Z0-9_-]{10,})/);
  if (driveMatch) {
    var fileId = driveMatch[1];
    return {
      external: true,
      href: 'https://drive.google.com/uc?export=download&id=' + fileId,
      onclick: null,
      download: false  // Drive ignores the download attribute (cross-origin)
    };
  }

  // Other external URL — http(s)/mailto/tel/anchor
  if (/^(https?:|mailto:|tel:)/i.test(url) || url.charAt(0) === '#') {
    return {
      external: true,
      href: url,
      onclick: null,
      download: /^https?:/i.test(url)  // hint download for http(s) only
    };
  }

  // Treat as internal page slug
  var slug = url.replace(/^\//, '').replace(/\.html?$/i, '');
  if (slug === '' || slug === 'index' || slug === 'petrodek') slug = 'home';
  var safe = slug.replace(/'/g, "\\'");
  return {
    external: false,
    href: 'javascript:void(0)',
    onclick: "showPage('" + safe + "');return false;",
    download: false
  };
}

// Background-colour helpers used by content blocks.
//
// _beBackgroundCSS(data) returns CSS values derived from a block's
// bg_preset (and bg_custom when preset='custom'). Presets:
//   'default' / undefined → transparent, inherits page bg
//   'soft'                 → soft grey (#f8fafc)
//   'tinted'               → light tinted (theme --light)
//   'navy'                 → navy gradient, light text
//   'steel'                → steel gradient, light text
//   'accent'               → brand accent, dark text
//   'custom'               → uses bg_custom hex; text auto-flips by luminance
//
// Returns:
//   { wrapStyle, textColor, mutedColor, headingColor, isDark }
function _beBackgroundCSS(data){
  data = data || {};
  var preset = data.bg_preset || 'default';
  var custom = data.bg_custom;
  var bg = '', isDark = false;

  switch (preset){
    case 'soft':
      bg = 'background:#f8fafc;';
      break;
    case 'tinted':
      bg = 'background:var(--light);';
      break;
    case 'navy':
      bg = 'background:linear-gradient(135deg, var(--navy), var(--steel));';
      isDark = true;
      break;
    case 'steel':
      bg = 'background:linear-gradient(160deg, var(--steel), var(--navy));';
      isDark = true;
      break;
    case 'accent':
      bg = 'background:var(--accent);';
      // Accent is brand yellow — keep dark text for readability
      break;
    case 'custom':
      if (custom && /^#[0-9a-fA-F]{6}$/.test(custom)){
        bg = 'background:' + custom + ';';
        isDark = _beHexIsDark(custom);
      }
      break;
    case 'default':
    default:
      // No background — block stays transparent.
      bg = '';
  }

  return {
    wrapStyle: bg,
    textColor: isDark ? '#ffffff' : 'var(--text)',
    headingColor: isDark ? '#ffffff' : 'var(--text)',
    mutedColor: isDark ? 'rgba(255,255,255,.75)' : 'var(--mid)',
    eyebrowColor: isDark ? 'var(--accent)' : 'var(--accent)',
    isDark: isDark
  };
}

// Returns true if the given #RRGGBB hex would need light text on it
// (i.e. the colour itself is dark). Uses perceptual luminance —
// good enough for content-block text contrast decisions.
function _beHexIsDark(hex){
  if (!hex || !/^#[0-9a-fA-F]{6}$/.test(hex)) return false;
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  // Standard ITU-R BT.601 luma weights
  var lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum < 0.55;
}

// Picker UI for the edit form. Drops a "Background" select + conditional
// hex/swatch input that live-update the block's bg_preset / bg_custom.
function beBgPicker(idPrefix, data){
  data = data || {};
  var preset = data.bg_preset || 'default';
  var custom = data.bg_custom || '#f8fafc';
  var presetSelect = beField(idPrefix, 'Background', 'bg_preset', preset, {
    type: 'select',
    options: [
      { value:'default', label:'Default — transparent (inherits page)' },
      { value:'soft',    label:'Soft grey — #f8fafc' },
      { value:'tinted',  label:'Tinted — theme light' },
      { value:'navy',    label:'Navy gradient — dark, light text' },
      { value:'steel',   label:'Steel gradient — dark, light text' },
      { value:'accent',  label:'Accent — brand colour' },
      { value:'custom',  label:'Custom — pick a hex colour…' }
    ]
  });
  // Hex picker only visible when preset==='custom'. We use a plain conditional
  // wrapper rather than a full re-render so the colour change is instant.
  var hexHidden = (preset !== 'custom') ? 'display:none;' : '';
  var hexPicker =
    '<div id="' + idPrefix + '-bgcustom" style="' + hexHidden + 'margin:.4rem 0 .8rem;display:' + (preset === 'custom' ? 'grid' : 'none') + ';grid-template-columns:60px 1fr 100px;gap:.5rem;align-items:center;">' +
      '<input type="color" value="' + beEscape(custom) + '" oninput="beUpdateBgCustom(\'' + idPrefix + '\',this.value)" style="width:60px;height:36px;padding:0;border:1px solid #dde4ed;border-radius:5px;cursor:pointer;background:none;"/>' +
      '<input type="text" value="' + beEscape(custom) + '" placeholder="#f8fafc" oninput="beUpdateBgCustom(\'' + idPrefix + '\',this.value)" style="border:1px solid #dde4ed;border-radius:5px;padding:.4rem .6rem;font-size:.85rem;font-family:monospace;"/>' +
      '<div style="font-size:.7rem;color:#6677aa;line-height:1.3;">Text contrast auto-adjusts</div>' +
    '</div>';
  return presetSelect + hexPicker;
}

// Update the bg_custom hex on a block. Called from both the colour-input
// and the text input. Re-rendering the preview happens automatically;
// we don't re-render the block list (it would steal focus while typing).
function beUpdateBgCustom(blockId, value){
  // Light validation — only accept things that look hex-shaped, but allow
  // partial entries while typing (e.g. '#f' on its way to '#f8fafc').
  var i = beFindBlockIndex(blockId);
  if (i < 0) return;
  if (!_beDraft[i].data) _beDraft[i].data = {};
  _beDraft[i].data.bg_custom = value;
  // Sync the two inputs (color + text) so they show the same value.
  // Look them up under the form's wrapper.
  try {
    var wrapId = blockId + '-bgcustom';
    var wrap = document.getElementById(wrapId);
    if (wrap){
      var inputs = wrap.querySelectorAll('input');
      for (var k = 0; k < inputs.length; k++){
        if (inputs[k].value !== value) inputs[k].value = value;
      }
    }
  } catch(e){ /* shrug — non-critical */ }
  beRenderPreview();
  beSetStatus('Unsaved changes.', 'warn');
}

function beCreateBlock(type){
  var spec = BLOCK_TYPES[type];
  if (!spec) { console.error('Unknown block type:', type); return null; }
  return { id: beNewBlockId(), type: type, data: spec.defaults() };
}

// Shared helper: render a labelled field (text / textarea / select) that
// writes back to the block's data via beUpdateBlockField. Used by every
// block's edit() function to avoid re-declaring the same boilerplate.
function beField(idPrefix, lbl, key, val, opts){
  opts = opts || {};
  var type = opts.type || 'text';
  var rows = opts.rows || 2;
  var placeholder = opts.placeholder || '';
  var baseStyle = 'width:100%;box-sizing:border-box;border:1px solid #dde4ed;border-radius:5px;padding:.5rem;font-size:.85rem;font-family:inherit;';
  var labelHtml = '<label style="font-size:.7rem;font-weight:700;color:#6677aa;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.25rem;">' + beEscape(lbl) + '</label>';
  var control;
  if (type === 'textarea') {
    control = '<textarea rows="' + rows + '" placeholder="' + beEscape(placeholder) + '" style="' + baseStyle + '" oninput="beUpdateBlockField(\'' + idPrefix + '\',\'' + key + '\',this.value)">' + beEscape(val || '') + '</textarea>';
  } else if (type === 'select') {
    var options = (opts.options || []).map(function(o){
      var v = (typeof o === 'string') ? o : o.value;
      var l = (typeof o === 'string') ? o : o.label;
      var sel = (v === val) ? ' selected' : '';
      return '<option value="' + beEscape(v) + '"' + sel + '>' + beEscape(l) + '</option>';
    }).join('');
    control = '<select style="' + baseStyle + '" onchange="beUpdateBlockField(\'' + idPrefix + '\',\'' + key + '\',this.value)">' + options + '</select>';
  } else {
    control = '<input type="' + type + '" value="' + beEscape(val || '') + '" placeholder="' + beEscape(placeholder) + '" style="' + baseStyle + '" oninput="beUpdateBlockField(\'' + idPrefix + '\',\'' + key + '\',this.value)"/>';
  }
  return '<div style="margin-bottom:.6rem;">' + labelHtml + control + '</div>';
}

// Shared helper: render a labelled info block (for blocks whose content
// is edited elsewhere in the admin, like nav and footer).
function beInfoBox(msg){
  return '<div style="font-size:.76rem;color:#6677aa;line-height:1.6;background:#f8fafc;border:1px solid #eef2f7;border-left:3px solid #dde4ed;border-radius:0 6px 6px 0;padding:.65rem .9rem;">' + msg + '</div>';
}

// Return the page object from cmsGet().pages matching slug, or null.
function beFindPage(slug){
  var d = cmsGet();
  var pages = d.pages || [];
  for (var i = 0; i < pages.length; i++){
    if (pages[i] && pages[i].slug === slug) return pages[i];
  }
  return null;
}

function beSetPage(slug, pageObj){
  var d = cmsGet();
  if (!d.pages) d.pages = [];
  var found = -1;
  for (var i = 0; i < d.pages.length; i++){
    if (d.pages[i] && d.pages[i].slug === slug) { found = i; break; }
  }
  if (found >= 0) d.pages[found] = pageObj; else d.pages.push(pageObj);
  cmsSet(d);
}

// Render an entire page (ordered blocks) to HTML. This is what
// showPage uses when a slug has block-editor data.
function beRenderPage(blocks){
  if (!Array.isArray(blocks)) return '';
  return blocks.map(function(b){
    var spec = BLOCK_TYPES[b.type];
    if (!spec) return '<!-- unknown block type: ' + beEscape(b.type) + ' -->';
    try { return spec.render(b.data || {}); }
    catch(err){ console.error('Block render failed:', b.type, err); return '<!-- render failed: ' + beEscape(b.type) + ' -->'; }
  }).join('\n');
}

// ════════════════════════════════════════════════════════════════════
//  BLOCK EDITOR UI
// ════════════════════════════════════════════════════════════════════
function initBlockEditor(){
  // Populate page dropdown — only BLOCK_EDITOR_SLUGS are editable
  var sel = document.getElementById('be-page');
  if (sel){
    var titles = {
      'rim-seals': 'Rim Seals'
    };
    sel.innerHTML = '<option value="">— select a page —</option>' +
      BLOCK_EDITOR_SLUGS.map(function(s){
        return '<option value="' + s + '">' + (titles[s] || s) + '</option>';
      }).join('');
  }
  // Populate the add-a-block library
  var lib = document.getElementById('be-library');
  if (lib){
    lib.innerHTML = Object.keys(BLOCK_TYPES).map(function(type){
      var spec = BLOCK_TYPES[type];
      return (
        '<button onclick="beAddBlock(\'' + type + '\')" style="text-align:left;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:.7rem .8rem;cursor:pointer;display:flex;align-items:flex-start;gap:.6rem;font-family:inherit;">' +
          '<div style="font-size:1.4rem;line-height:1;flex-shrink:0;">' + spec.icon + '</div>' +
          '<div>' +
            '<div style="font-weight:700;font-size:.85rem;color:#0a1628;">' + beEscape(spec.label) + '</div>' +
            '<div style="font-size:.72rem;color:#6677aa;margin-top:.2rem;line-height:1.4;">' + beEscape(spec.desc) + '</div>' +
          '</div>' +
        '</button>'
      );
    }).join('');
  }
  // Restore previously-selected page (for re-entries to admin)
  if (_beCurrentSlug && sel){
    sel.value = _beCurrentSlug;
    beLoadPage(_beCurrentSlug);
  }
}

function beLoadPage(slug){
  _beCurrentSlug = slug || null;
  _beDraft = null;
  _beOrigSnapshot = null;
  var blocksEl = document.getElementById('be-blocks');
  var previewPh = document.getElementById('be-preview-ph');
  var previewIframe = document.getElementById('be-preview-iframe');
  if (!slug){
    if (blocksEl) blocksEl.innerHTML = '<div style="text-align:center;padding:2.5rem 1rem;color:#aabbc8;font-size:.84rem;">Select a page above to start editing.</div>';
    if (previewPh) previewPh.style.display = 'flex';
    if (previewIframe) previewIframe.style.display = 'none';
    beSetStatus('');
    return;
  }
  var existing = beFindPage(slug);
  if (!existing){
    // No saved page — seed from _PAGE_SEEDS if available, else fall back
    // to a minimal hero-only stub.
    var seed = (typeof _PAGE_SEEDS === 'function') ? _PAGE_SEEDS(slug) : null;
    if (Array.isArray(seed) && seed.length){
      _beDraft = seed;
    } else {
      _beDraft = [ beCreateBlock('hero-page') ];
    }
  } else {
    _beDraft = JSON.parse(JSON.stringify(existing.blocks || []));
  }
  _beOrigSnapshot = JSON.stringify(_beDraft);
  beRenderBlockList();
  beRenderPreview();
  beSetStatus('Loaded. Changes are held as a draft until you click Save.', 'info');
}

function beSetStatus(msg, kind){
  var el = document.getElementById('be-status');
  if (!el) return;
  el.textContent = msg || '';
  var color = '#6677aa';
  if (kind === 'ok') color = '#16a34a';
  else if (kind === 'warn') color = '#c97a00';
  else if (kind === 'err') color = '#c0392b';
  el.style.color = color;
}

function beRenderBlockList(){
  var el = document.getElementById('be-blocks');
  if (!el) return;
  if (!_beDraft || !_beDraft.length){
    el.innerHTML = '<div style="text-align:center;padding:2.5rem 1rem;color:#aabbc8;font-size:.84rem;">No blocks yet. Click a block type on the right to add one.</div>';
    return;
  }
  el.innerHTML = _beDraft.map(function(b, i){
    var spec = BLOCK_TYPES[b.type];
    if (!spec){
      return '<div style="border:1px solid #e0c0c0;border-radius:8px;padding:.7rem;background:#fff5f5;margin-bottom:.6rem;color:#833;font-size:.8rem;">Unknown block type: ' + beEscape(b.type) + ' <button onclick="beDeleteBlock(\'' + b.id + '\')" style="margin-left:.5rem;background:#f0f4f8;border:1px solid #dde4ed;border-radius:4px;padding:.2rem .5rem;font-size:.72rem;cursor:pointer;">Delete</button></div>';
    }
    var editHtml = '';
    try { editHtml = spec.edit(b.data || {}, b.id); }
    catch(err){ editHtml = '<div style="color:#c0392b;font-size:.75rem;">Editor failed: ' + beEscape(err.message) + '</div>'; }
    var isOpen = b._editorOpen !== false; // default open
    return (
      '<div style="border:1px solid #dde4ed;border-radius:8px;background:#fff;margin-bottom:.7rem;overflow:hidden;">' +
        '<div style="display:flex;align-items:center;gap:.5rem;padding:.65rem .8rem;background:#f8fafc;border-bottom:1px solid #eef2f7;">' +
          '<span style="font-size:1.1rem;line-height:1;">' + spec.icon + '</span>' +
          '<div style="font-weight:700;font-size:.85rem;color:#0a1628;">' + beEscape(spec.label) + '</div>' +
          '<div style="margin-left:auto;display:flex;gap:.3rem;">' +
            '<button title="Move up" onclick="beMoveBlock(\'' + b.id + '\',-1)" ' + (i === 0 ? 'disabled' : '') + ' style="background:#fff;border:1px solid #dde4ed;border-radius:4px;padding:.25rem .5rem;font-size:.75rem;cursor:pointer;' + (i === 0 ? 'opacity:.4;cursor:not-allowed;' : '') + '">↑</button>' +
            '<button title="Move down" onclick="beMoveBlock(\'' + b.id + '\',1)" ' + (i === _beDraft.length - 1 ? 'disabled' : '') + ' style="background:#fff;border:1px solid #dde4ed;border-radius:4px;padding:.25rem .5rem;font-size:.75rem;cursor:pointer;' + (i === _beDraft.length - 1 ? 'opacity:.4;cursor:not-allowed;' : '') + '">↓</button>' +
            '<button title="Duplicate" onclick="beDuplicateBlock(\'' + b.id + '\')" style="background:#fff;border:1px solid #dde4ed;border-radius:4px;padding:.25rem .5rem;font-size:.75rem;cursor:pointer;">⎘</button>' +
            '<button title="Delete" onclick="beDeleteBlock(\'' + b.id + '\')" style="background:#fff;border:1px solid #f0c0c0;color:#c0392b;border-radius:4px;padding:.25rem .5rem;font-size:.75rem;cursor:pointer;">🗑</button>' +
            '<button title="Collapse" onclick="beToggleBlock(\'' + b.id + '\')" style="background:#fff;border:1px solid #dde4ed;border-radius:4px;padding:.25rem .5rem;font-size:.75rem;cursor:pointer;">' + (isOpen ? '▾' : '▸') + '</button>' +
          '</div>' +
        '</div>' +
        (isOpen ? '<div style="padding:.7rem .8rem;">' + editHtml + '</div>' : '') +
      '</div>'
    );
  }).join('');
}

// Re-render only the preview iframe to reflect current draft state.
function beRenderPreview(){
  var iframe = document.getElementById('be-preview-iframe');
  var ph = document.getElementById('be-preview-ph');
  if (!iframe || !ph) return;
  if (!_beDraft){
    ph.style.display = 'flex';
    iframe.style.display = 'none';
    return;
  }
  var html = beRenderPage(_beDraft);
  // Inject the site's <style> into the preview so blocks are styled correctly.
  var st = document.querySelector('style');
  var themeStyle = document.getElementById('cms-theme');
  var doc =
    '<!DOCTYPE html><html><head><meta charset="utf-8"/>' +
    (st ? st.outerHTML : '') +
    (themeStyle ? themeStyle.outerHTML : '') +
    '</head><body style="margin:0;">' + html + '</body></html>';
  iframe.srcdoc = doc;
  iframe.style.display = 'block';
  ph.style.display = 'none';
}

function beFindBlockIndex(blockId){
  if (!_beDraft) return -1;
  for (var i = 0; i < _beDraft.length; i++){
    if (_beDraft[i].id === blockId) return i;
  }
  return -1;
}

function beAddBlock(type){
  if (!_beCurrentSlug){
    beSetStatus('Pick a page from the dropdown first.', 'warn');
    return;
  }
  if (!_beDraft) _beDraft = [];
  var nb = beCreateBlock(type);
  if (!nb) return;
  _beDraft.push(nb);
  beRenderBlockList();
  beRenderPreview();
  beSetStatus('Block added. Unsaved changes — click Save to persist.', 'warn');
}

function beDeleteBlock(blockId){
  var i = beFindBlockIndex(blockId);
  if (i < 0) return;
  if (!confirm('Delete this block?')) return;
  _beDraft.splice(i, 1);
  beRenderBlockList();
  beRenderPreview();
  beSetStatus('Block deleted. Unsaved changes.', 'warn');
}

function beDuplicateBlock(blockId){
  var i = beFindBlockIndex(blockId);
  if (i < 0) return;
  var copy = JSON.parse(JSON.stringify(_beDraft[i]));
  copy.id = beNewBlockId();
  _beDraft.splice(i + 1, 0, copy);
  beRenderBlockList();
  beRenderPreview();
  beSetStatus('Block duplicated. Unsaved changes.', 'warn');
}

function beMoveBlock(blockId, delta){
  var i = beFindBlockIndex(blockId);
  if (i < 0) return;
  var j = i + delta;
  if (j < 0 || j >= _beDraft.length) return;
  var tmp = _beDraft[i]; _beDraft[i] = _beDraft[j]; _beDraft[j] = tmp;
  beRenderBlockList();
  beRenderPreview();
  beSetStatus('Block moved. Unsaved changes.', 'warn');
}

// Called from inline oninput handlers. Updates a single field on the

  if (i < 0) return;
  if (!_beDraft[i].data) _beDraft[i].data = {};
  _beDraft[i].data[key] = value;
  // Special case: when bg_preset changes, toggle the conditional hex picker
  // without re-rendering the whole edit form (which would steal focus).
  if (key === 'bg_preset'){
    try {
      var wrap = document.getElementById(blockId + '-bgcustom');
      if (wrap) wrap.style.display = (value === 'custom') ? 'grid' : 'none';
    } catch(e){ /* non-critical */ }
  }
  // Special case: side-by-side column type toggle. When col1_type / col2_type
  // changes, swap which set of fields (image vs text) is visible.
  if (key === 'col1_type' || key === 'col2_type'){
    try {
      var prefix = key === 'col1_type' ? 'col1_' : 'col2_';
      var imgWrap = document.getElementById(blockId + '-' + prefix + 'imgfields');
      var txtWrap = document.getElementById(blockId + '-' + prefix + 'txtfields');
      if (imgWrap) imgWrap.style.display = (value === 'image') ? '' : 'none';
      if (txtWrap) txtWrap.style.display = (value === 'text')  ? '' : 'none';
    } catch(e){ /* non-critical */ }
  }
  beRenderPreview();
  beSetStatus('Unsaved changes.', 'warn');
}

// Generic array-mutation helper used by the newer block types.
// Operates on _beDraft[i].data[arrKey] (a JS array). Callers pass a
// mutator function that receives the array and mutates it in place.
// Caller decides whether to re-render the block list (for structural
// changes like add/remove) or just the preview (for field edits).
function beMutateBlockArray(blockId, arrKey, mutator, renderList){
  var i = beFindBlockIndex(blockId);
  if (i < 0) return;
  var d = _beDraft[i].data || {};
  if (!Array.isArray(d[arrKey])) d[arrKey] = [];
  mutator(d[arrKey]);
  _beDraft[i].data = d;
  if (renderList) beRenderBlockList();
  beRenderPreview();
  beSetStatus('Unsaved changes.', 'warn');
}

// Save the draft to CMS. Fires server save via cmsSet.
function beSavePage(){
  if (!_beCurrentSlug){ beSetStatus('Pick a page first.', 'warn'); return; }
  if (!_beDraft){ beSetStatus('Nothing to save.', 'warn'); return; }
  // Strip the _editorOpen UI-state flag from saved blocks
  var cleanBlocks = _beDraft.map(function(b){
    var copy = { id: b.id, type: b.type, data: b.data };
    return copy;
  });
  var existing = beFindPage(_beCurrentSlug);
  var pageObj = existing ? Object.assign({}, existing) : { slug: _beCurrentSlug };
  if (!pageObj.title) pageObj.title = _beCurrentSlug.replace(/-/g, ' ').replace(/\b\w/g, function(c){ return c.toUpperCase(); }) + ' — PETRODEK SYSTEMS';
  if (!pageObj.status) pageObj.status = 'published';
  pageObj.blocks = cleanBlocks;
  beSetPage(_beCurrentSlug, pageObj);
  _beOrigSnapshot = JSON.stringify(_beDraft);
  beSetStatus('Saving…', 'warn');
  _cmsOnSaveOk = function(){
    beSetStatus('Saved live ✓', 'ok');
    if (typeof showToast === 'function') showToast('Page saved — changes live for all visitors');
    _cmsOnSaveOk = null; _cmsOnSaveError = null;
  };
  _cmsOnSaveError = function(err){
    var msg = (err && err.message) ? err.message : String(err);
    beSetStatus('Save failed — ' + msg, 'err');
    if (typeof showToast === 'function') showToast('Save failed: ' + msg, 'bad');
    console.error('[block editor] save failed:', err);
    _cmsOnSaveOk = null; _cmsOnSaveError = null;
  };
}

function beRevert(){
  if (!_beCurrentSlug){ beSetStatus('Pick a page first.', 'warn'); return; }
  if (_beOrigSnapshot === null){ beSetStatus('Nothing to revert.', 'info'); return; }
  if (!confirm('Discard all unsaved changes and revert to the last saved state?')) return;
  _beDraft = JSON.parse(_beOrigSnapshot);
  beRenderBlockList();
  beRenderPreview();
  beSetStatus('Reverted to last saved state.', 'info');
}

function loadTheme() {
  var d = cmsGet();
  var theme = d.theme || {};
  THEME_KEYS.forEach(function(k){
    var v = theme[k] || THEME_DEFAULTS[k];
    var cp = document.getElementById('tcp-' + k);
    var hx = document.getElementById('thx-' + k);
    var sw = document.getElementById('tsw-' + k);
    if (cp) cp.value = v;
    if (hx) hx.value = v;
    if (sw) sw.style.background = v;
  });
  setThemeStatus('');
}

// Called when the <input type="color"> picker changes
function onThemeFieldChange(key) {
  var cp = document.getElementById('tcp-' + key);
  if (!cp) return;
  var v = cp.value;
  var hx = document.getElementById('thx-' + key);
  if (hx) hx.value = v;
  applyThemeFieldLive(key, v);
}

// Called when the hex text input changes; validate, update picker, apply
function onThemeHexInput(key) {
  var hx = document.getElementById('thx-' + key);
  if (!hx) return;
  var v = (hx.value || '').trim().toLowerCase();
  if (v && v[0] !== '#') { v = '#' + v; hx.value = v; }
  if (!/^#[0-9a-f]{6}$/i.test(v)) return; // only apply when fully typed
  var cp = document.getElementById('tcp-' + key);
  if (cp) cp.value = v;
  applyThemeFieldLive(key, v);
}

function applyThemeFieldLive(key, value) {
  var sw = document.getElementById('tsw-' + key);
  if (sw) sw.style.background = value;
  // Build a live-only theme from the current picker/hex values (not persisted yet)
  var theme = {};
  THEME_KEYS.forEach(function(k){
    var cp = document.getElementById('tcp-' + k);
    theme[k] = cp ? cp.value : THEME_DEFAULTS[k];
  });
  applyTheme(theme);
  setThemeStatus('Previewing — click Save Palette to persist.', 'warn');
}

function saveTheme() {
  var theme = {};
  THEME_KEYS.forEach(function(k){
    var cp = document.getElementById('tcp-' + k);
    var v = cp ? cp.value : THEME_DEFAULTS[k];
    if (!/^#[0-9a-fA-F]{6}$/.test(v)) v = THEME_DEFAULTS[k];
    theme[k] = v;
  });
  cmsUpd('theme', theme);
  applyTheme(theme);
  setThemeStatus('Saving…', 'warn');
  // Wire one-shot status callbacks so the admin sees when the network save
  // actually completes (or fails). Debounced save fires ~350ms after cmsUpd.
  _cmsOnSaveOk = function(){
    setThemeStatus('Saved live ✓', 'ok');
    if (typeof showToast === 'function') showToast('Palette saved live');
    _cmsOnSaveOk = null; _cmsOnSaveError = null;
  };
  _cmsOnSaveError = function(err){
    setThemeStatus('Save failed — retry or reload', 'err');
    if (typeof showToast === 'function') showToast('Server save failed: ' + (err && err.message ? err.message : err), 'bad');
    _cmsOnSaveOk = null; _cmsOnSaveError = null;
  };
}

function resetTheme() {
  if (!confirm('Reset all colours to the site defaults?')) return;
  var theme = {};
  THEME_KEYS.forEach(function(k){ theme[k] = THEME_DEFAULTS[k]; });
  cmsUpd('theme', theme);
  applyTheme(theme);
  loadTheme();
  setThemeStatus('Resetting…', 'warn');
  _cmsOnSaveOk = function(){
    setThemeStatus('Reset live ✓', 'ok');
    if (typeof showToast === 'function') showToast('Palette reset live');
    _cmsOnSaveOk = null; _cmsOnSaveError = null;
  };
  _cmsOnSaveError = function(err){
    setThemeStatus('Reset failed — retry or reload', 'err');
    if (typeof showToast === 'function') showToast('Server save failed: ' + (err && err.message ? err.message : err), 'bad');
    _cmsOnSaveOk = null; _cmsOnSaveError = null;
  };
}

function setThemeStatus(msg, kind) {
  var el = document.getElementById('theme-status');
  if (!el) return;
  el.textContent = msg;
  var color = '#6677aa';
  if (kind === 'ok') color = '#16a34a';
  else if (kind === 'warn') color = '#c97a00';
  else if (kind === 'err') color = '#c0392b';
  el.style.color = color;
}

function pbLoadPage(slug) {
  if(!slug) return;
  var iframe=document.getElementById('pb-preview-iframe');
  var ph=document.getElementById('pb-preview-ph');
  if(iframe&&ph){
    ph.style.display='none'; iframe.style.display='block';

      var st=document.querySelector('style');
      var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">'+
        (st?st.outerHTML:'')+'</head><body style="margin:0;">'+PAGES[slug].html+'</body></html>';
      var blob=new Blob([html],{type:'text/html'});
      if(iframe._burl)URL.revokeObjectURL(iframe._burl);
      iframe._burl=URL.createObjectURL(blob);
      iframe.src=iframe._burl;
    } else {
      iframe.srcdoc='<html><body style="padding:2rem;font-family:sans-serif;color:#6677aa;text-align:center;"><p>Built-in page preview<br>not available in builder.</p></body></html>';
    }
  }
  var d = cmsGet();
  var layouts = d.page_layouts || {};
  var canvas = document.getElementById('pb-canvas');
  if(!canvas) return;
  pbClear();
  var layout = layouts[slug] || [];
  layout.forEach(function(row) {
    var r = pbAddRow(row.cols, true);
    row.columns.forEach(function(col, ci) {
      col.widgets.forEach(function(w) {
        if(r && r.children[ci]) {
          var cell = r.children[ci];
          pbAddWidgetToCell(cell, w);
        }
      });
    });
  });
  pbCheckEmpty();
  // Populate page builder widget lib
  var wlib = document.getElementById('pb-widget-lib');
  if(wlib) {
    var widgets = (d.widgets||[]);
    if(!widgets.length) { wlib.innerHTML='<p style="font-size:.8rem;color:#aabbc8;">No widgets added yet. Go to <a onclick="adminGo(\'widgets\')" href="javascript:void(0)" style="color:#e8a020;">Widgets</a> to add some.</p>'; return; }
    wlib.innerHTML = widgets.map(function(w){
      return '<div draggable="true" ondragstart="pbDragStart(event,\''+w.name+'\',\''+w.icon+'\',\''+w.id+'\')" style="border:1px solid #e2e8f0;border-radius:6px;padding:.7rem;background:#fff;cursor:grab;display:flex;align-items:center;gap:.5rem;">' +
        '<span style="font-size:1.2rem;">'+w.icon+'</span><div style="font-size:.78rem;font-weight:600;">'+w.name+'</div></div>';
    }).join('');
  }
}

function pbAddWidgetToCell(cell, w) {
  cell.style.minHeight = 'auto';
  var tag = document.createElement('div');
  tag.style.cssText = 'background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:.5rem .7rem;font-size:.78rem;display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem;';
  tag.innerHTML = (w.icon||'⬡')+' <span>'+w.name+'</span>' +
    '<button onclick="pbRemoveWidget(this)" style="margin-left:auto;background:none;border:none;color:#aaa;cursor:pointer;font-size:.9rem;">×</button>';
  tag.dataset.wid = w.id || w.name;
  tag.dataset.wname = w.name;
  tag.dataset.wicon = w.icon || '⬡';
  cell.appendChild(tag);
}

        { label:'Buy Spares', url:'http://www.astspares.com' },
        { label:'Tank Protocol', url:'http://www.tankprotocol.com' }
      ]}
    ];

}
function _fcSave(columns){
  var d = cmsGet();
  if (!d.footer_section) d.footer_section = {};
  d.footer_section.columns = columns;
  cmsSet(d);
}
function _fcEsc(s){
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function _fcNewId(){
  return 'col-' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

function fcRenderColumns(){
  var el = document.getElementById('fc-list');
  if (!el) return;
  var cols = _fcGetColumns();
  if (!cols.length){
    el.innerHTML = '<div style="text-align:center;padding:1.4rem;color:#aabbc8;font-size:.82rem;border:1px dashed #dde4ed;border-radius:8px;background:#f8fafc;">No columns yet. Click <strong>+ Add column</strong> below.</div>';
    return;
  }
  el.innerHTML = cols.map(function(col, ci){
    var itemsHtml = (col.items || []).map(function(it, ii){
      return (
        '<div style="display:grid;grid-template-columns:1fr 1.4fr auto;gap:.45rem;margin-bottom:.4rem;align-items:center;">' +
          '<input type="text" placeholder="Link label" value="' + _fcEsc(it.label || '') + '" oninput="fcUpdateItem(\'' + col.id + '\',' + ii + ',\'label\',this.value)" style="border:1px solid #dde4ed;border-radius:5px;padding:.4rem .55rem;font-size:.82rem;font-family:inherit;"/>' +
          '<input type="text" placeholder="Page slug or full URL" value="' + _fcEsc(it.url || '') + '" oninput="fcUpdateItem(\'' + col.id + '\',' + ii + ',\'url\',this.value)" style="border:1px solid #dde4ed;border-radius:5px;padding:.4rem .55rem;font-size:.82rem;font-family:inherit;"/>' +
          '<button onclick="fcRemoveItem(\'' + col.id + '\',' + ii + ')" title="Remove link" style="background:#fff;border:1px solid #f0c0c0;color:#c0392b;border-radius:5px;padding:.35rem .55rem;font-size:.78rem;cursor:pointer;font-family:inherit;">✕</button>' +
        '</div>'
      );
    }).join('');
    return (
      '<div style="border:1px solid #dde4ed;border-radius:8px;background:#fff;overflow:hidden;">' +
        '<div style="display:flex;align-items:center;gap:.5rem;padding:.6rem .8rem;background:#f8fafc;border-bottom:1px solid #eef2f7;">' +
          '<input type="text" value="' + _fcEsc(col.title || '') + '" placeholder="Column title" oninput="fcUpdateTitle(\'' + col.id + '\',this.value)" style="flex:1;border:1px solid #dde4ed;border-radius:5px;padding:.35rem .55rem;font-size:.85rem;font-weight:600;font-family:inherit;background:#fff;"/>' +
          '<button onclick="fcMoveColumn(\'' + col.id + '\',-1)" ' + (ci === 0 ? 'disabled' : '') + ' title="Move up" style="background:#fff;border:1px solid #dde4ed;border-radius:4px;padding:.3rem .55rem;font-size:.78rem;cursor:pointer;font-family:inherit;' + (ci === 0 ? 'opacity:.4;cursor:not-allowed;' : '') + '">↑</button>' +
          '<button onclick="fcMoveColumn(\'' + col.id + '\',1)" ' + (ci === cols.length - 1 ? 'disabled' : '') + ' title="Move down" style="background:#fff;border:1px solid #dde4ed;border-radius:4px;padding:.3rem .55rem;font-size:.78rem;cursor:pointer;font-family:inherit;' + (ci === cols.length - 1 ? 'opacity:.4;cursor:not-allowed;' : '') + '">↓</button>' +
          '<button onclick="fcRemoveColumn(\'' + col.id + '\')" title="Delete column" style="background:#fff;border:1px solid #f0c0c0;color:#c0392b;border-radius:4px;padding:.3rem .55rem;font-size:.78rem;cursor:pointer;font-family:inherit;">🗑</button>' +
        '</div>' +
        '<div style="padding:.7rem .8rem;">' +
          itemsHtml +
          '<button onclick="fcAddItem(\'' + col.id + '\')" style="background:#f0f4f8;border:1px solid #dde4ed;border-radius:5px;padding:.35rem .65rem;font-size:.78rem;cursor:pointer;margin-top:.2rem;font-family:inherit;">+ Add link</button>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

function fcAddColumn(){
  var cols = _fcGetColumns();
  cols.push({ id: _fcNewId(), title: 'New Column', items: [] });
  _fcSave(cols);
  fcRenderColumns();
  showToast('Column added');
}
function fcRemoveColumn(id){
  if (!confirm('Delete this column and all its links?')) return;
  var cols = _fcGetColumns().filter(function(c){ return c.id !== id; });
  _fcSave(cols);
  fcRenderColumns();
  showToast('Column removed');
}
function fcMoveColumn(id, delta){
  var cols = _fcGetColumns();
  var i = -1;
  for (var k = 0; k < cols.length; k++){ if (cols[k].id === id) { i = k; break; } }
  if (i < 0) return;
  var j = i + delta;
  if (j < 0 || j >= cols.length) return;
  var tmp = cols[i]; cols[i] = cols[j]; cols[j] = tmp;
  _fcSave(cols);
  fcRenderColumns();
}
function fcUpdateTitle(id, val){
  var cols = _fcGetColumns();
  for (var i = 0; i < cols.length; i++){ if (cols[i].id === id) { cols[i].title = val; break; } }
  _fcSave(cols);
  // Don't re-render — admin is mid-typing
}
function fcAddItem(colId){
  var cols = _fcGetColumns();
  for (var i = 0; i < cols.length; i++){
    if (cols[i].id === colId){
      if (!Array.isArray(cols[i].items)) cols[i].items = [];
      cols[i].items.push({ label:'New link', url:'' });
      break;
    }
  }
  _fcSave(cols);
  fcRenderColumns();
}
function fcRemoveItem(colId, idx){
  var cols = _fcGetColumns();
  for (var i = 0; i < cols.length; i++){
    if (cols[i].id === colId && Array.isArray(cols[i].items)){
      cols[i].items.splice(idx, 1);
      break;
    }
  }
  _fcSave(cols);
  fcRenderColumns();
}
function fcUpdateItem(colId, idx, key, val){
  var cols = _fcGetColumns();
  for (var i = 0; i < cols.length; i++){
    if (cols[i].id === colId && Array.isArray(cols[i].items) && cols[i].items[idx]){
      cols[i].items[idx][key] = val;
      break;
    }
  }
  _fcSave(cols);
  // Don't re-render — admin is mid-typing
}

function openBuiltinPageEditor(pageId,pageTitle){
  editingPageId=null;
  var _pf=document.getElementById('page-form');if(!_pf)return showToast('Navigate to Pages section first','warn');_pf.style.display='block';
  document.getElementById('pf-title').textContent='Editing: '+pageTitle;
  document.getElementById('pf-save-btn').textContent='Save Changes';
  var tEl=document.getElementById('pf_title');if(tEl)tEl.value=pageTitle;
  var sEl=document.getElementById('pf_slug');if(sEl)sEl.value=pageId;
  var stEl=document.getElementById('pf_status');if(stEl)stEl.value='Published';
  var tmEl=document.getElementById('pf_template');if(tmEl)tmEl.value='Default';
  var cEl=document.getElementById('pf_content');
  if(cEl&&typeof PAGES!=='undefined'&&PAGES[pageId]){
    var full=PAGES[pageId].html||'';
    var s=full.indexOf('<div class="page-hero"');
    if(s<0)s=full.indexOf('<div class="page-body"');
    if(s<0)s=full.indexOf('<section ');
    var e=full.lastIndexOf('<footer');
    if(s>=0&&e>s){cEl.innerHTML=full.substring(s,e);}
    else{cEl.innerHTML=full;}
    showToast('Page content loaded into editor','ok');
  } else {cEl.innerHTML='Start writing...';}
  var pfEl=document.getElementById('page-form');
  if(pfEl)pfEl.scrollIntoView({behavior:'smooth'});
}
function renderPageNodes(pages,container,level){
  pages.forEach(page=>{
    const item=document.createElement('div');item.className='pg-item';item.style.marginLeft=level?'1.2rem':'0';
    const statusColor={published:'bg',draft:'ba',private:'br'}[page.status?.toLowerCase()]||'ba';
    item.innerHTML=`<div class="pg-hd" onclick="togglePgChildren(this)">
      ${page.children&&page.children.length?'<span style="color:var(--mid);margin-right:.3rem">▸</span>':'<span style="width:1rem;display:inline-block"></span>'}
      <span class="pg-nm">${page.title}</span>
      <span class="pg-meta">${page.slug}</span>
      <span class="b ${statusColor}" style="margin:0 .5rem">${page.status||'Draft'}</span>
      <button class="btn btn-g btn-xs" onclick="event.stopPropagation();openPageForm(${page.id})">Edit</button>
      <a href="${page.slug}" target="_blank" class="btn btn-b btn-xs" style="text-decoration:none" onclick="event.stopPropagation()">View</a>
      <button class="btn btn-d btn-xs" onclick="event.stopPropagation();deletePage(${page.id})">Del</button>
    </div>`;
    container.appendChild(item);
    if(page.children&&page.children.length){
      const ch=document.createElement('div');ch.className='pg-children';ch.style.display='none';
      renderPageNodes(page.children,ch,level+1);
      item.appendChild(ch);
    }
  });
}
function togglePgChildren(hd){const ch=hd.parentElement.querySelector('.pg-children');if(ch){ch.style.display=ch.style.display==='none'?'block':'none';const arr=hd.querySelector('span');if(arr&&arr.textContent.includes('▸'))arr.textContent=ch.style.display==='none'?'▸ ':'▾ ';}}

let activeMenuId=1;
const PAGES_FOR_MENU=['Home','Products','Rim Seals','Mechanical Shoe Seals','Liquid Mounted Primary Seals','Vapour Mounted Primary Seals','Secondary Seals','Wiper Seals','Seal Fittings','Lightning Protection','Blog','Contact Us','About Sealworks'];

function renderMenuList(){

    d.innerHTML=`<span style="flex:1;font-size:.82rem;font-weight:${m.id===activeMenuId?700:500};color:${m.id===activeMenuId?'var(--accent)':'var(--text)'}">${m.name}</span><span style="font-size:.65rem;color:var(--mid)">${m.location||''}</span><button class="btn btn-d btn-xs" onclick="event.stopPropagation();deleteMenu(${m.id})">Del</button>`;
    d.onclick=()=>{activeMenuId=m.id;renderMenuList();renderMenuTree();document.getElementById('menu-edit-title').textContent=m.name;};

function renderMenuTree(){
  const d=cmsGet();
  const menu=(d.menus||[]).find(m=>m.id===activeMenuId);
  const el=document.getElementById('menu-tree');el.innerHTML='';
  if(!menu){el.innerHTML='<p style="color:var(--mid);font-size:.8rem;padding:.5rem 0">Select a menu to edit.</p>';return;}
  menu.items.forEach(item=>el.appendChild(renderMenuItem(item,menu)));
}

function renderMenuItem(item,menu){
  const wrap=document.createElement('div');wrap.className='menu-item';
  const indent=item.level*18;
  const canAddChild=item.level<MAX_LEVEL;
  const hasChildren=item.children&&item.children.length>0;

  wrap.innerHTML=`
    <div class="mi-hd" style="padding-left:calc(.8rem + ${indent}px)">
      <span class="mi-drag">⠿</span>
      <span class="mi-lbl" onclick="toggleMiEdit(this.closest('.menu-item'))">${item.label}</span>
      <span class="mi-type">${item.type}</span>
      <span class="mi-lvl">L${item.level+1}</span>
      <div style="display:flex;gap:3px;flex-shrink:0">
        ${hasChildren?`<button class="btn btn-g btn-xs" onclick="toggleChildren(${item.id},${menu.id})">▸${item.open?'▲':'▼'}</button>`:''}
        ${canAddChild?`<button class="btn btn-b btn-xs" onclick="addChild(${item.id},${menu.id})">▸+ Child</button>`:''}
        <button class="btn btn-g btn-xs" onclick="toggleMiEdit(this.closest('.menu-item'))">✎ Edit</button>
        <button class="btn btn-d btn-xs" onclick="removeMenuItem(${item.id},${menu.id})">✕</button>
      </div>
    </div>
    <div class="mi-edit" id="mie-${item.id}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;padding:.55rem 0">
        <div class="f"><label>Label</label><input type="text" value="${item.label}" onchange="updateMiLabel(${item.id},${menu.id},this.value)"/></div>
        <div class="f"><label>URL</label><input type="text" value="${item.url||''}" onchange="updateMiUrl(${item.id},${menu.id},this.value)"/></div>
        <div class="f"><label>Open In</label><select onchange="updateMiTarget(${item.id},${menu.id},this.value)"><option value="_self" ${item.target!=='_blank'?'selected':''}>Same Tab</option><option value="_blank" ${item.target==='_blank'?'selected':''}>New Tab</option></select></div>
        <div class="f"><label>CSS Class</label><input type="text" value="${item.cssClass||''}" placeholder="btn-primary"/></div>
      </div>
    </div>
    <div class="mi-children" id="mic-${item.id}" style="display:${item.open?'block':'none'}"></div>
  `;

  if(hasChildren){
    const ch=wrap.querySelector(`#mic-${item.id}`);
    item.children.forEach(c=>ch.appendChild(renderMenuItem(c,menu)));
  }
  return wrap;
}

function toggleMiEdit(item){const ed=item.querySelector('.mi-edit');ed.classList.toggle('open');}
function toggleChildren(id,menuId){const d=cmsGet();const m=d.menus.find(x=>x.id===menuId);if(!m)return;const item=findMenuItem(m.items,id);if(item){item.open=!item.open;cmsSet(d);renderMenuTree();}}
function collapseAll(){const d=cmsGet();const m=d.menus.find(x=>x.id===activeMenuId);if(!m)return;collapseItems(m.items);cmsSet(d);renderMenuTree();}
function collapseItems(items){items.forEach(i=>{i.open=false;if(i.children)collapseItems(i.children);});}

function findMenuItem(items,id){for(const i of items){if(i.id===id)return i;if(i.children){const f=findMenuItem(i.children,id);if(f)return f;}}return null;}
function updateMiLabel(id,menuId,val){const d=cmsGet();const m=d.menus.find(x=>x.id===menuId);if(!m)return;const item=findMenuItem(m.items,id);if(item){item.label=val;cmsSet(d);}}
function updateMiUrl(id,menuId,val){const d=cmsGet();const m=d.menus.find(x=>x.id===menuId);if(!m)return;const item=findMenuItem(m.items,id);if(item){item.url=val;cmsSet(d);}}
function updateMiTarget(id,menuId,val){const d=cmsGet();const m=d.menus.find(x=>x.id===menuId);if(!m)return;const item=findMenuItem(m.items,id);if(item){item.target=val;cmsSet(d);}}

function addMenuItem(type){
  const d=cmsGet();const menu=d.menus.find(m=>m.id===activeMenuId);if(!menu)return;
  let label='New Item',url='#';
  if(type==='page'){const sel=gf('mi-page-sel');label=gf('mi-page-lbl')||sel;url=PAGE_URLS[sel]||'#';}
  else if(type==='custom'){label=gf('mi-cl')||'New Link';url=gf('mi-cu')||'#';}
  else if(type==='cat'){label=gf('mi-cat-sel');url='#';}
  menu.items.push({id:Date.now(),label,type,url,level:0,open:false,children:[],target:type==='custom'?gf('mi-ct'):'_self'});
  cmsSet(d);renderMenuTree();showToast(label+' added to menu');
}

function addChild(parentId,menuId){
  const d=cmsGet();const menu=d.menus.find(m=>m.id===menuId);if(!menu)return;
  function tryInsert(items){
    for(const item of items){
      if(item.id===parentId){
        if(item.level>=MAX_LEVEL){showToast('Maximum 4 levels reached','warn');return true;}
        if(!item.children)item.children=[];
        item.children.push({id:Date.now(),label:'New Sub Item',type:'custom',url:'#',level:item.level+1,open:false,children:[],target:'_self'});
        item.open=true;return true;
      }
      if(item.children&&tryInsert(item.children))return true;
    }
    return false;
  }
  tryInsert(menu.items);cmsSet(d);renderMenuTree();showToast('Sub-item added');
}

function removeMenuItem(id,menuId){
  const d=cmsGet();const menu=d.menus.find(m=>m.id===menuId);if(!menu)return;
  function rm(items){return items.filter(i=>i.id!==id).map(i=>({...i,children:rm(i.children||[])}));}
  menu.items=rm(menu.items);cmsSet(d);renderMenuTree();showToast('Item removed');
}

function saveMenu(){
  const d=cmsGet();cmsSet(d);showToast('Menu saved successfully!');renderMenuList();
}

function openNewMenuModal(){document.getElementById('nm-name').value='';document.getElementById('modal-menu').classList.add('open');}
function createMenu(){
  const n=gf('nm-name').trim();if(!n){showToast('Enter a menu name','warn');return;}
  const d=cmsGet();if(!d.menus)d.menus=[];
  d.menus.push({id:Date.now(),name:n,location:gf('nm-loc')||'Primary Navigation',items:[]});
  cmsSet(d);closeModal('modal-menu');renderMenuList();renderMenuTree();updateDashCounts();showToast('Menu "'+n+'" created');
}
function deleteMenu(id){
  if((cmsGet().menus||[]).length===1&&!confirm('Delete the only menu?'))return;
  const d=cmsGet();d.menus=(d.menus||[]).filter(m=>m.id!==id);
  if(activeMenuId===id&&d.menus.length)activeMenuId=d.menus[0].id;
  cmsSet(d);renderMenuList();renderMenuTree();updateDashCounts();showToast('Menu deleted');
}

function prevVid(url){

function prevHeroVid(url){
  if(!url || !url.trim()){
    var w0=document.getElementById('hvid-preview-wrap');if(w0)w0.style.display='none';
    return;
  }
  var resolvedUrl = (typeof resolveVideoUrl==='function') ? resolveVideoUrl(url) : url;
  const wrap=document.getElementById('hvid-preview-wrap');
  if(!wrap) return;
  const vidEl=document.getElementById('hvid-preview-video');
  const iframeEl=document.getElementById('hvid-preview-iframe');
  const msgEl=document.getElementById('hvid-preview-msg');
  const type=gf('h_vid_type');

  wrap.style.display='block';
  vidEl.style.display='none';
  iframeEl.style.display='none';
  msgEl.style.display='none';

  if(type==='youtube' || resolvedUrl.includes('youtube.com') || resolvedUrl.includes('youtu.be')){
    const m=resolvedUrl.match(/(?:v=|youtu\.be\/)([^&?\/]+)/);
    if(m){
      iframeEl.src='https://www.youtube.com/embed/'+m[1]+'?autoplay=1&mute=1&loop=1&playlist='+m[1]+'&controls=0&modestbranding=1';
      iframeEl.style.display='block';
    } else {
      msgEl.textContent='Invalid YouTube URL';
      msgEl.style.display='flex';
    }
  } else if(type==='vimeo' || resolvedUrl.includes('vimeo.com')){
    const m=resolvedUrl.match(/vimeo\.com\/(\d+)/);
    if(m){
      iframeEl.src='https://player.vimeo.com/video/'+m[1]+'?autoplay=1&muted=1&loop=1&background=1';
      iframeEl.style.display='block';
    } else {
      msgEl.textContent='Invalid Vimeo URL';
      msgEl.style.display='flex';
    }
  } else {
    // Direct MP4/WebM (including Cloudinary-resolved URLs)
    vidEl.src=resolvedUrl;
    vidEl.style.display='block';
    vidEl.muted=true;vidEl.loop=true;
    vidEl.play().catch(()=>{
      vidEl.style.display='none';
      msgEl.textContent='Cannot preview — URL may be unreachable. It may still work on the site page.';
      msgEl.style.display='flex';
    });
  }
}

function onVidTypeChange(type){
  // Re-trigger preview when type changes
  const url=gf('h_vid_url').trim();
  if(url) prevHeroVid(url);
}

function handleHeroVidUpload(inp){
  if(!inp.files||!inp.files[0]) return;
  const file=inp.files[0];
  if(file.size>50*1024*1024){
    showToast('File is '+Math.round(file.size/1024/1024)+'MB. Max 50MB recommended. For larger files use URL tab.','warn');
  }
  if(file.size>5*1024*1024){
    showToast('Large file ('+Math.round(file.size/1024/1024)+'MB) — storing as data URL may be slow. Consider hosting externally.','warn');
  }
  const reader=new FileReader();
  reader.onload=function(e){
    sf('h_vid_url', e.target.result);
    sf('h_vid_type','mp4');
    prevHeroVid(e.target.result);
    showToast('Video loaded: '+file.name+'. Click Save Video Settings to apply.');
  };
  reader.onerror=function(){showToast('Failed to read file','bad');};
  reader.readAsDataURL(file);
  inp.value='';
}

// Write video config into the site page localStorage so petrodek.html picks it up
// Cloudinary cloud name for video assets (matches the image fetch config in netlify.toml).
var CLOUDINARY_CLOUD = 'petrodek';

// Accepts a full URL (http/https/data:) and returns it unchanged, OR accepts a
// Cloudinary public ID (with or without extension, with or without folder) and
// wraps it into a fully-qualified Cloudinary delivery URL. Empty strings pass
// through unchanged so callers can still detect "no video set".
function resolveVideoUrl(input){
  if(!input) return '';
  var s = String(input).trim();
  if(!s) return '';
  // Pass through anything that's already a URL or data blob
  if(/^(https?:|data:|blob:)/i.test(s)) return s;
  // Treat as Cloudinary public ID — strip leading slashes, strip a trailing
  // extension (f_auto picks the best format for the browser).
  var id = s.replace(/^\/+/, '').replace(/\.(mp4|webm|mov|m4v|ogv)$/i, '');
  return 'https://res.cloudinary.com/' + CLOUDINARY_CLOUD +
         '/video/upload/f_auto,q_auto/' + id;
}

function applyHeroVideoToPage(url, type, auto, loop, overlay){
  // Apply immediately to live page without requiring reload
  try {
    var heroVidEl = document.getElementById('hero-video');
    if (!heroVidEl) return;
    if (!url || !url.trim()) {
      // Clear video
      var src = heroVidEl.querySelector('source');
      if (src) { src.setAttribute('src',''); }
      heroVidEl.pause(); heroVidEl.load();
      heroVidEl.style.display = 'none';
      var iframe = document.getElementById('hero-video-iframe');
      if (iframe) iframe.remove();
      return;
    }
    var resolvedUrl = resolveVideoUrl(url);
    var isYT = resolvedUrl.indexOf('youtube') >= 0 || resolvedUrl.indexOf('youtu.be') >= 0;
    var isVimeo = resolvedUrl.indexOf('vimeo') >= 0;
    if (isYT || isVimeo) {
      heroVidEl.style.display = 'none';
      var existing = document.getElementById('hero-video-iframe');
      if (!existing) {
        existing = document.createElement('iframe');
        existing.id = 'hero-video-iframe';
        existing.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;border:none;';
        existing.allow = 'autoplay; muted';
        heroVidEl.parentNode.insertBefore(existing, heroVidEl);
      }
      if (isYT) {
        var ytm = resolvedUrl.match(/(?:v=|youtu\.be\/)([^&?\/]+)/);
        if (ytm) existing.src = 'https://www.youtube.com/embed/' + ytm[1] + '?autoplay=1&mute=1&loop=1&playlist=' + ytm[1] + '&controls=0&modestbranding=1&playsinline=1';
      } else {
        var vim = resolvedUrl.match(/vimeo\.com\/(\d+)/);
        if (vim) existing.src = 'https://player.vimeo.com/video/' + vim[1] + '?autoplay=1&muted=1&loop=1&background=1';
      }
    } else {
      // MP4/WebM direct (includes Cloudinary-resolved URLs)
      var ifrEl = document.getElementById('hero-video-iframe');
      if (ifrEl) ifrEl.remove();
      var src = heroVidEl.querySelector('source');
      if (src) {
        src.setAttribute('src', resolvedUrl);
        src.setAttribute('type', type === 'webm' ? 'video/webm' : 'video/mp4');
      }
      heroVidEl.muted = true;
      heroVidEl.loop = loop !== '0';
      heroVidEl.load();
      heroVidEl.style.display = '';
      if (auto !== '0') heroVidEl.play().catch(function(){});
    }
  } catch(e) { console.warn('applyHeroVideoToPage error:', e); }
}

// Panel navigation (replaces nav())


function atab(btn, paneId) {
  var par = btn.closest('.acard-body,.acard,.apane,.amodal');
  if (!par) {
    var el = btn.parentElement;
    while(el && el !== document.body) {
      if(el.querySelector('.atab') && el.querySelector('.atpane')) { par = el; break; }
      el = el.parentElement;
    }
  }
  if(!par) par = btn.parentElement.parentElement;
  par.querySelectorAll('.atab').forEach(function(t) {
    t.classList.remove('on');
    t.style.borderBottomColor = 'transparent';
    t.style.color = '#6677aa';
  });
  par.querySelectorAll('.atpane').forEach(function(t) {
    t.classList.remove('on');
    t.style.display = 'none';
  });
  btn.classList.add('on');
  btn.style.borderBottomColor = '#e8a020';
  btn.style.color = '#0a1628';
  var pane = document.getElementById(paneId);
  if(pane) { pane.classList.add('on'); pane.style.display = 'block'; }
}
function stab(el, pane) { atab(el, pane); }

function pbDragStart(e, wid) {
  pbDragWidget = wid;

}

function pbAddRow(cols) {
  cols = cols || 1;
  var canvas = document.getElementById('pb-canvas');
  var empty = canvas.querySelector('.pb-empty');
  if (empty) empty.remove();
  var row = document.createElement('div');
  row.className = 'pb-row';
  row.style.gridTemplateColumns = Array(cols).fill('1fr').join(' ');
  row.setAttribute('data-cols', cols);
  var toolbar = document.createElement('div');
  toolbar.className = 'pb-row-toolbar';
  toolbar.innerHTML = '<span class="pb-row-label">Row — ' + cols + ' col' + (cols > 1 ? 's' : '') + '</span>' +
    '<button class="abtn abtn-ghost abtn-xs" onclick="this.closest(\'.pb-row\').remove();pbCheckEmpty()">✕ Remove Row</button>';
  row.appendChild(toolbar);
  for (var i = 0; i < cols; i++) {
    var col = document.createElement('div');
    col.className = 'pb-col';
    col.setAttribute('data-col', i);
    col.innerHTML = '<span style="font-size:11px;color:var(--dim)">Drop widget here</span>';
    col.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('over'); });
    col.addEventListener('dragleave', function() { this.classList.remove('over'); });
    col.addEventListener('drop', function(e) {
      e.preventDefault(); this.classList.remove('over');
      if (pbDragWidget) pbDropInCol(this, pbDragWidget);
    });
    row.appendChild(col);
  }
  canvas.appendChild(row);
}

function pbDropInCol(col, wid) {
  var names = {
    'hero':'Hero Banner','text':'Text Block','image':'Image Block','gallery':'Gallery',
    'video':'Video Embed','cta':'CTA Banner','stats':'Stats Counter','cards':'Card Grid',
    'faq':'FAQ Accordion','contact':'Contact Form','spacer':'Spacer','divider':'Divider'
  };

    'hero':'🏠','text':'📝','image':'🖼','gallery':'🗂','video':'▶','cta':'🎯',
    'stats':'📊','cards':'⬡','faq':'❓','contact':'📬','spacer':'⬜','divider':'—'
  };
  col.innerHTML = '';
  col.classList.add('has-widget');
  var w = document.createElement('div');
  w.className = 'pb-widget';
  w.setAttribute('data-widget', wid);

    '<button class="pb-w-del" onclick="pbRemoveWidget(this)" title="Remove">✕</button>';

function pbCanvasDrop(e) {
  // If dropped on canvas background (not a col), add a new row

    e.preventDefault();
    if (pbDragWidget) { pbAddRow(1); var cols = document.querySelectorAll('#pb-canvas .pb-col'); pbDropInCol(cols[cols.length-1], pbDragWidget); }
